name: Download With Direct Link

on:
  workflow_dispatch:
    inputs:
      file_url1:
        description: 'URL #1 (required)'
        required: true
      file_url2:
        description: 'URL #2 (optional)'
        required: false
        default: ''
      file_url3:
        description: 'URL #3 (optional)'
        required: false
        default: ''
      file_url4:
        description: 'URL #4 (optional)'
        required: false
        default: ''
      file_url5:
        description: 'URL #5 (optional)'
        required: false
        default: ''
      folder_name:
        description: 'Folder to store everything (default: Download)'
        required: false
        default: 'Download'

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log url_list.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Write URLs to file (bypass YAML expression parser)
        run: |
          > url_list.txt
          for url in "${{ github.event.inputs.file_url1 }}" \
                     "${{ github.event.inputs.file_url2 }}" \
                     "${{ github.event.inputs.file_url3 }}" \
                     "${{ github.event.inputs.file_url4 }}" \
                     "${{ github.event.inputs.file_url5 }}"; do
            [ -n "$url" ] && echo "$url" >> url_list.txt
          done
          echo "URL list created with $(wc -l < url_list.txt) entries."

      - name: Download, split (if needed) and upload all files
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            Write-Host $msg
            Add-Content -Path $logFile -Value $msg
          }

          # Read URLs from file – force array with @()
          $urls = @(Get-Content url_list.txt | Where-Object { $_ -and $_ -ne '' })
          if ($urls.Count -eq 0) {
            Write-Log "No URLs provided. Exiting."
            exit 1
          }

          Write-Log "Processing $($urls.Count) URL(s)."
          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $fileInfos = [System.Collections.Generic.List[hashtable]]::new()

          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            $success = $false
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                $success = $true
                break
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "FATAL: upload failed after $maxRetries attempts."
                  throw
                }
              }
            }
          }

          for ($i = 0; $i -lt $urls.Count; $i++) {
            $url = $urls[$i]
            Write-Log "--- Processing URL $($i+1): $url ---"
            $tempFile = "temp_$($i).download"
            try {
              $response = Invoke-WebRequest -Uri $url -OutFile $tempFile -PassThru -MaximumRedirection 10 -ErrorAction Stop
            } catch {
              Write-Log "Download failed: $_"
              exit 1
            }
            if (-not (Test-Path $tempFile) -or (Get-Item $tempFile).Length -eq 0) {
              Write-Log "Download returned empty file. Aborting."
              exit 1
            }
            $fileName = $null
            if ($response.Headers['Content-Disposition']) {
              $match = [System.Text.RegularExpressions.Regex]::Match($response.Headers['Content-Disposition'], 'filename="?([^"]+)"?')
              if ($match.Success) { $fileName = $match.Groups[1].Value }
            }
            if (-not $fileName) {
              $uriObj = [System.Uri]::new($url)
              $fileName = [System.IO.Path]::GetFileName($uriObj.AbsolutePath)
            }
            if (-not $fileName) { $fileName = "downloaded_file_$($i+1)" }
            $fileName = [System.IO.Path]::GetFileName($fileName)

            $fileSize = (Get-Item $tempFile).Length
            Write-Log "File: $fileName, Size: $([math]::Round($fileSize / 1MB, 1)) MB"

            if ($fileSize -lt $chunkSize) {
              Write-Log "Small file, uploading directly."
              $remotePath = "$chunksDir/$fileName"
              Upload-File -localPath $tempFile -remotePath $remotePath
              $fileInfos.Add(@{ Name = $fileName; HasChunks = $false })
            } else {
              Write-Log "Splitting into $([math]::Round($chunkSize/1MB)) MB chunks..."
              $stream = [System.IO.File]::OpenRead($tempFile)
              $partIdx = 0
              $buffer = New-Object byte[] $chunkSize
              while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
                $chunkPath = Join-Path $chunksDir $chunkName
                [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
                Write-Log "Uploading $chunkName ($([math]::Round($n/1MB,1)) MB)"
                Upload-File -localPath $chunkPath -remotePath "$chunksDir/$chunkName"
                Remove-Item $chunkPath -Force
                $partIdx++
                Start-Sleep -Milliseconds 500
              }
              $stream.Close()
              $fileInfos.Add(@{ Name = $fileName; HasChunks = $true; ChunkCount = $partIdx })
            }
            Remove-Item $tempFile -Force
          }

          Write-Log "Generating reassemble.bat..."
          $batPath = Join-Path $chunksDir "reassemble.bat"
          $batLines = @(
            "@echo off",
            "setlocal enabledelayedexpansion",
            "echo ========================================",
            "echo  Reassembling all downloaded files...",
            "echo ========================================"
          )
          foreach ($fi in $fileInfos) {
            $name = $fi.Name
            if ($fi.HasChunks) {
              $batLines += "echo --- Rebuilding $name ---"
              $batLines += "copy /b $name.part* $name"
              $batLines += "if %errorlevel% equ 0 ("
              $batLines += "    echo Successfully created $name"
              $batLines += "    del $name.part*"
              $batLines += "    echo Deleted temporary parts for $name"
              $batLines += ") else ("
              $batLines += "    echo ERROR: Failed to reassemble $name. Parts kept intact."
              $batLines += ")"
            } else {
              $batLines += "echo $name was downloaded as a single file (no chunks)."
            }
          }
          $batLines += "echo ========================================"
          $batLines += "echo All done! Press any key to exit."
          $batLines += "pause >nul"
          $batLines | Out-File -FilePath $batPath -Encoding ASCII

          Write-Log "Uploading reassemble.bat..."
          Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat"
          Write-Log "✅ All files processed and uploaded."

      - name: Final log commit (always)
        if: always()
        run: |
          git add download.log
          git commit -m "Final download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true
