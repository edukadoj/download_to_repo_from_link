name: Download With Direct Link

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloaded folder
        run: |
          rm -rf "Download"
          rm -f downloaded.file
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old download folder" || true
          git push || true

      - name: Download, Split, and Upload Chunks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import base64
          import requests
          import sys
          import time
          from pathlib import Path
          from urllib.parse import urlparse, unquote

          # --- Configuration ---
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          file_url = "${{ github.event.inputs.file_url }}"

          # Extract filename from URL
          parsed = urlparse(file_url)
          filename = unquote(os.path.basename(parsed.path))
          if not filename:
              filename = "downloaded_file"
          base_name = filename

          # Hardcoded safe chunk size (20 MB)
          chunk_size_mb = 20
          chunk_size = chunk_size_mb * 1024 * 1024

          print(f"=== Download From Direct Link 1 ===")
          print(f"Repository: {repo}")
          print(f"Branch: {branch}")
          print(f"Source URL: {file_url}")
          print(f"Base filename: {base_name}")
          print(f"Chunk size: {chunk_size_mb} MB")
          print("=" * 50)

          # --- Step 1: Download the file ---
          print("\n[1/3] Downloading file...")
          temp_file = "downloaded.file"
          response = requests.get(file_url, stream=True)
          response.raise_for_status()
          total_size = 0
          with open(temp_file, "wb") as f:
              for chunk in response.iter_content(chunk_size=8192):
                  f.write(chunk)
                  total_size += len(chunk)
                  if total_size % (50 * 1024 * 1024) < 8192:
                      print(f"  Downloaded: {total_size / (1024**3):.2f} GB")
          file_size_gb = total_size / (1024**3)
          print(f"✓ Download complete: {file_size_gb:.2f} GB")

          # --- Step 2: Split into chunks ---
          print(f"\n[2/3] Splitting file into {chunk_size_mb} MB chunks...")
          chunks_dir = "Download"
          Path(chunks_dir).mkdir(exist_ok=True)
          chunk_files = []
          with open(temp_file, "rb") as f:
              idx = 0
              while True:
                  data = f.read(chunk_size)
                  if not data:
                      break
                  chunk_filename = f"{base_name}.part{idx:04d}"
                  chunk_path = os.path.join(chunks_dir, chunk_filename)
                  with open(chunk_path, "wb") as cf:
                      cf.write(data)
                  chunk_files.append((chunk_path, chunk_filename, len(data)))
                  idx += 1
          print(f"✓ Created {len(chunk_files)} chunks in '{chunks_dir}/'")

          # --- Step 2.5: Create reassemble.bat for Windows users ---
          bat_path = os.path.join(chunks_dir, "reassemble.bat")
          with open(bat_path, "w") as bat:
              bat.write(f"@echo off\n")
              bat.write(f"echo Reassembling {base_name}...\n")
              bat.write(f"copy /b {base_name}.part* {base_name}\n")
              bat.write(f"echo Done. Output file: {base_name}\n")
              bat.write(f"pause\n")
          print(f"✓ Created reassemble.bat in '{chunks_dir}/'")

          # --- Step 3: Upload chunks and batch file via GitHub API ---
          print(f"\n[3/3] Uploading files via GitHub API...")
          headers = {"Authorization": f"token {token}"}
          repo_api_base = f"https://api.github.com/repos/{repo}/contents"

          # Upload each chunk
          for chunk_path, chunk_filename, chunk_bytes in chunk_files:
              print(f"  Uploading {chunk_filename} ({chunk_bytes / (1024**2):.1f} MB)...")
              with open(chunk_path, "rb") as cf:
                  content_b64 = base64.b64encode(cf.read()).decode("utf-8")
              api_url = f"{repo_api_base}/{chunks_dir}/{chunk_filename}"
              resp = requests.get(api_url, headers=headers)
              sha = resp.json().get("sha") if resp.status_code == 200 else None
              payload = {
                  "message": f"Add {chunk_filename}",
                  "content": content_b64,
                  "branch": branch,
              }
              if sha:
                  payload["sha"] = sha
              max_retries = 3
              for attempt in range(max_retries):
                  put_resp = requests.put(api_url, headers=headers, json=payload)
                  if put_resp.status_code in (200, 201):
                      print(f"    ✓ Uploaded")
                      break
                  else:
                      if attempt == max_retries - 1:
                          print(f"    ✗ Failed: {put_resp.status_code} - {put_resp.text}")
                          sys.exit(1)
                      else:
                          print(f"    Retrying in 10 seconds...")
                          time.sleep(10)

          # Upload reassemble.bat
          print("  Uploading reassemble.bat...")
          with open(bat_path, "rb") as bf:
              bat_b64 = base64.b64encode(bf.read()).decode("utf-8")
          api_url = f"{repo_api_base}/{chunks_dir}/reassemble.bat"
          resp = requests.get(api_url, headers=headers)
          sha = resp.json().get("sha") if resp.status_code == 200 else None
          payload = {
              "message": "Add reassemble.bat",
              "content": bat_b64,
              "branch": branch,
          }
          if sha:
              payload["sha"] = sha
          put_resp = requests.put(api_url, headers=headers, json=payload)
          if put_resp.status_code not in (200, 201):
              print(f"  ✗ Failed to upload reassemble.bat: {put_resp.status_code}")
              sys.exit(1)
          else:
              print(f"    ✓ Uploaded reassemble.bat")

          # --- Cleanup ---
          os.remove(temp_file)
          print("\n" + "=" * 50)
          print("✅ SUCCESS! All files uploaded.")
          print(f"📁 Repository: https://github.com/{repo}")
          print(f"📂 Files are in the '{chunks_dir}/' folder.")
          print("\n📥 To reassemble on Windows:")
          print(f"   Double-click the 'reassemble.bat' file inside the folder.")
          print("=" * 50)
          EOF
