name: Download With Direct Link

on:
  workflow_dispatch:
    inputs:
      file_url1:
        description: 'URL #1 (required)'
        required: true
      file_url2:
        description: 'URL #2 (optional)'
        required: false
        default: ''
      file_url3:
        description: 'URL #3 (optional)'
        required: false
        default: ''
      file_url4:
        description: 'URL #4 (optional)'
        required: false
        default: ''
      file_url5:
        description: 'URL #5 (optional)'
        required: false
        default: ''
      folder_name:
        description: 'Folder to store everything (default: Download)'
        required: false
        default: 'Download'

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log url_list.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Write URLs to file
        run: |
          > url_list.txt
          for url in "${{ github.event.inputs.file_url1 }}" \
                     "${{ github.event.inputs.file_url2 }}" \
                     "${{ github.event.inputs.file_url3 }}" \
                     "${{ github.event.inputs.file_url4 }}" \
                     "${{ github.event.inputs.file_url5 }}"; do
            [ -n "$url" ] && echo "$url" >> url_list.txt
          done
          echo "URL list created with $(wc -l < url_list.txt) entries."

      - name: Download files with detailed logging
        id: download
        continue-on-error: true
        run: |
          exec > >(tee -a download.log) 2>&1
          echo "=== Download Started at $(date) ==="

          urls=$(cat url_list.txt | grep -v '^[[:space:]]*$')
          if [ -z "$urls" ]; then
            echo "No URLs provided."
            exit 0
          fi

          download_count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            download_count=$((download_count + 1))
            echo -e "\n--- URL #$download_count: $url ---"

            # Use curl with 10 redirects, a browser-like user-agent, and cookie support
            http_code=$(curl -L -o "downloaded_${download_count}.file" \
              -w "%{http_code}" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -b /tmp/cookies.txt -c /tmp/cookies.txt \
              -s -S --max-time 60 \
              "$url" 2>&1)

            # Check if curl succeeded (http_code will be numeric or 000 on failure)
            if [[ "$http_code" =~ ^[0-9]+$ ]] && [ "$http_code" -lt 400 ]; then
              file="downloaded_${download_count}.file"
              if [ -f "$file" ] && [ -s "$file" ]; then
                # Try to extract filename from URL or Content-Disposition
                filename=$(basename "$url" | sed 's/?.*//')
                if [ -z "$filename" ] || [ "$filename" = "/" ]; then
                  filename="downloaded_file_${download_count}"
                fi
                mv "$file" "$filename"
                size=$(du -h "$filename" | cut -f1)
                echo "✓ Downloaded: $filename ($size)"
                echo "$filename" >> video_list.txt
              else
                echo "✗ File empty or missing after download."
              fi
            else
              echo "✗ HTTP error/redirect failed (code: $http_code)"
              # If curl output contains an error message, log it
              if [ -n "$http_code" ]; then
                echo "   Error detail: $http_code"
              fi
              # Remove empty file if exists
              rm -f "downloaded_${download_count}.file"
            fi
          done <<< "$urls"

          if [ $download_count -eq 0 ]; then
            echo "No files were downloaded."
          fi
        shell: /usr/bin/bash {0}

      - name: Commit download log & file list (always)
        if: always()
        run: |
          git add download.log video_list.txt 2>/dev/null || true
          git commit -m "Update download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true

      - name: Split and upload everything (if any)
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            Write-Host $msg
            Add-Content -Path $logFile -Value $msg
          }

          $videoList = @(Get-Content video_list.txt -ErrorAction SilentlyContinue | Where-Object { $_ -and $_ -ne '' })
          if ($videoList.Count -eq 0) {
            Write-Log "No files to upload. Exiting."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $fileInfos = [System.Collections.Generic.List[hashtable]]::new()
          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                return
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "FATAL: upload failed after $maxRetries attempts."
                  exit 1
                }
              }
            }
          }

          for ($i = 0; $i -lt $videoList.Count; $i++) {
            $videoFile = $videoList[$i]
            if (-not (Test-Path $videoFile)) {
              Write-Log "File missing: $videoFile – skipping."
              continue
            }
            $fileSize = (Get-Item $videoFile).Length
            $fileName = [System.IO.Path]::GetFileName($videoFile)
            Write-Log "Processing $fileName ($([math]::Round($fileSize / 1MB, 1)) MB)"

            if ($fileSize -lt $chunkSize) {
              Write-Log "Small file, uploading directly."
              Upload-File -localPath $videoFile -remotePath "$chunksDir/$fileName"
              $fileInfos.Add(@{ Name = $fileName; HasChunks = $false })
            } else {
              Write-Log "Splitting into $([math]::Round($chunkSize/1MB)) MB chunks..."
              $stream = [System.IO.File]::OpenRead($videoFile)
              $partIdx = 0
              $buffer = New-Object byte[] $chunkSize
              $uploadSuccess = $true
              while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
                $chunkPath = Join-Path $chunksDir $chunkName
                [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
                Write-Log "Uploading $chunkName ($([math]::Round($n/1MB,1)) MB)"
                try {
                  Upload-File -localPath $chunkPath -remotePath "$chunksDir/$chunkName"
                } catch {
                  Write-Log "Upload failed for $chunkName. Aborting file."
                  $uploadSuccess = $false
                  break
                }
                Remove-Item $chunkPath -Force
                $partIdx++
                Start-Sleep -Milliseconds 500
              }
              $stream.Close()
              if ($uploadSuccess) {
                $fileInfos.Add(@{ Name = $fileName; HasChunks = $true; ChunkCount = $partIdx })
              }
            }
            Remove-Item $videoFile -Force
          }

          if ($fileInfos.Count -gt 0) {
            Write-Log "Generating reassemble.bat..."
            $batPath = Join-Path $chunksDir "reassemble.bat"
            $batLines = @(
              "@echo off",
              "setlocal enabledelayedexpansion",
              "echo ========================================",
              "echo  Reassembling all downloaded files...",
              "echo ========================================"
            )
            foreach ($fi in $fileInfos) {
              $name = $fi.Name
              if ($fi.HasChunks) {
                $batLines += "echo --- Rebuilding $name ---"
                $batLines += "copy /b $name.part* $name"
                $batLines += "if %errorlevel% equ 0 ("
                $batLines += "    echo Successfully created $name"
                $batLines += "    del $name.part*"
                $batLines += "    echo Deleted temporary parts for $name"
                $batLines += ") else ("
                $batLines += "    echo ERROR: Failed to reassemble $name. Parts kept intact."
                $batLines += ")"
              } else {
                $batLines += "echo $name was downloaded as a single file (no chunks)."
              }
            }
            $batLines += "echo ========================================"
            $batLines += "echo All done! Press any key to exit."
            $batLines += "pause >nul"
            $batLines | Out-File -FilePath $batPath -Encoding ASCII
            Write-Log "Uploading reassemble.bat..."
            Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat"
          } else {
            Write-Log "No files were uploaded."
          }
          Write-Log "✅ Processing complete."

      - name: Final log commit (always)
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
