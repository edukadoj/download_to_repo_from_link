name: Download With Direct Link

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the file to download'
        required: true
      folder_name:
        description: 'Folder to store chunks (default: Download)'
        required: false
        default: 'Download'

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f downloaded.file download.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Download file (with logging)
        id: download
        continue-on-error: true
        run: |
          {
            echo "=== Download Log ==="
            echo "Date: $(date)"
            echo "URL: ${{ github.event.inputs.file_url }}"
            echo "Folder: ${{ github.event.inputs.folder_name }}"
            echo ""

            # Extract filename (try Content-Disposition first, then URL)
            echo "--- Downloading file ---"
            curl -L --retry 3 --retry-delay 10 --max-time 3600 \
                 -o downloaded.file \
                 -w "%{http_code} %{filename_effective}" \
                 "${{ github.event.inputs.file_url }}"

            # Check success
            if [ ! -f downloaded.file ]; then
              echo "Download failed – no file"
              exit 1
            fi
            echo "Download completed."
            ls -lh downloaded.file
          } > download.log 2>&1

      - name: Commit download.log (always)
        if: always()
        run: |
          git add download.log
          git commit -m "Update download log" || true
          git pull --rebase
          git push || true

      - name: Fail if download failed
        if: steps.download.outcome == 'failure'
        run: |
          echo "Download failed – see download.log in repository."
          exit 1

      - name: Split and upload (robust PowerShell chunker)
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $videoFile = "downloaded.file"   # rename for consistency, but it's just a file
          if (-not (Test-Path $videoFile)) {
            Add-Content -Path download.log -Value "File missing: $videoFile"
            exit 1
          }

          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            Write-Host $msg
            Add-Content -Path $logFile -Value $msg
          }

          # Derive base name from the original URL (extract filename)
          $fileUrl = "${{ github.event.inputs.file_url }}"
          $fileName = [System.IO.Path]::GetFileName([System.Uri]::UnescapeDataString($fileUrl))
          if (-not $fileName) { $fileName = "downloaded_file" }
          Write-Log "Base filename: $fileName"

          # --- Split into chunks ---
          $fileStream = [System.IO.File]::OpenRead($videoFile)
          $partIdx = 0
          $buffer = New-Object byte[] $chunkSize
          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $chunkFiles = [System.Collections.Generic.List[hashtable]]::new()

          while (($n = $fileStream.Read($buffer, 0, $buffer.Length)) -gt 0) {
            $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
            $chunkPath = Join-Path $chunksDir $chunkName
            [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
            $chunkFiles.Add(@{ Path = $chunkPath; Name = $chunkName; Size = $n })
            $partIdx++
          }
          $fileStream.Close()
          $totalChunks = $chunkFiles.Count
          Write-Log "Split into $totalChunks chunks."

          # --- reassemble.bat ---
          $batPath = Join-Path $chunksDir "reassemble.bat"
          @"
          @echo off
          echo Reassembling $fileName...
          copy /b $fileName.part* $fileName
          echo Done. Output file: $fileName
          echo.
          echo Press any key to delete the part files...
          pause >nul
          del $fileName.part*
          pause
          "@ | Out-File -FilePath $batPath -Encoding ASCII

          # --- Upload helper ---
          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            $success = $false
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                $success = $true
                break
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "FATAL: upload failed after $maxRetries attempts."
                  exit 1
                }
              }
            }
          }

          # --- Upload all chunks ---
          for ($i = 0; $i -lt $totalChunks; $i++) {
            $chunk = $chunkFiles[$i]
            $sizeMB = [math]::Round($chunk.Size / 1MB, 1)
            Write-Log "Uploading $($chunk.Name) ($sizeMB MB)..."
            Upload-File -localPath $chunk.Path -remotePath "$chunksDir/$($chunk.Name)"
            Start-Sleep -Milliseconds 500
          }

          # --- Upload reassemble.bat ---
          Write-Log "Uploading reassemble.bat..."
          Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat"

          Write-Log "✅ All done. Chunks are in the '$chunksDir' folder."

      - name: Final log commit (always)
        if: always()
        run: |
          git add download.log
          git commit -m "Final download log" || true
          git pull --rebase
          git push || true
