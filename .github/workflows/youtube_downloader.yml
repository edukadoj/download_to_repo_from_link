name: YouTube Download (WARP + Cookie Fallback)

on:
  workflow_dispatch:
    inputs:
      youtube_url1:
        description: 'YouTube URL #1 (required)'
        required: true
        default: ''
      youtube_url2:
        description: 'YouTube URL #2 (optional)'
        required: false
        default: ''
      youtube_url3:
        description: 'YouTube URL #3 (optional)'
        required: false
        default: ''
      youtube_url4:
        description: 'YouTube URL #4 (optional)'
        required: false
        default: ''
      youtube_url5:
        description: 'YouTube URL #5 (optional)'
        required: false
        default: ''
      quality:
        description: 'Video quality'
        required: true
        type: choice
        default: '720p'
        options:
          - '144p'
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
          - 'best'
      sub_lang:
        description: 'Subtitles language'
        required: true
        type: choice
        default: 'en (English)'
        options:
          - 'en (English)'
          - 'fa (Persian)'
          - 'none'
      folder_name:
        description: 'Folder to store downloads'
        required: false
        default: 'YouTube Download'

jobs:
  download-and-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log cookies.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      # ── Cache for pip & Deno ──
      - name: Restore pip & Deno cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            /home/runner/.deno
          key: ${{ runner.os }}-pip-deno-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-deno-

      - name: Setup Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: Verify WARP connection
        run: |
          echo "Checking WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP is active."

      - name: Install dependencies (with caching)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade yt-dlp "yt-dlp[default,curl-cffi]" requests
          if [ ! -d "/home/runner/.deno" ]; then
            curl -fsSL https://deno.land/install.sh | sh
          fi
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH

      - name: Download, split & upload (all‑in‑one Python)
        id: process
        env:
          YT_URL_1: ${{ github.event.inputs.youtube_url1 }}
          YT_URL_2: ${{ github.event.inputs.youtube_url2 }}
          YT_URL_3: ${{ github.event.inputs.youtube_url3 }}
          YT_URL_4: ${{ github.event.inputs.youtube_url4 }}
          YT_URL_5: ${{ github.event.inputs.youtube_url5 }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          SUB_LANG: ${{ github.event.inputs.sub_lang }}
          QUALITY: ${{ github.event.inputs.quality }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, subprocess, base64, requests, json, traceback
          from pathlib import Path
          from urllib.parse import quote

          # ── Logging ──
          def log(msg):
              print(msg)
              with open("download.log", "a", encoding="utf-8") as f:
                  f.write(msg + "\n")

          # ── Config from environment ──
          quality = os.environ.get("QUALITY", "720p")
          cookies_secret = os.environ.get("YOUTUBE_COOKIES", "").strip()
          sub_lang_input = os.environ.get("SUB_LANG", "none").strip()
          folder_name = os.environ.get("FOLDER_NAME", "YouTube Download")
          token = os.environ.get("GITHUB_TOKEN")
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]

          # Collect URLs
          urls = []
          for i in range(1, 6):
              v = os.environ.get(f"YT_URL_{i}", "").strip()
              if v:
                  urls.append(v)

          if not urls:
              log("No URLs provided.")
              sys.exit(0)

          log(f"Processing {len(urls)} URL(s) through Cloudflare WARP")
          log(f"Quality: {quality}")
          log(f"Subtitles: {sub_lang_input}")

          # ── Quality map ──
          quality_map = {
              "144p": "bestvideo[height<=144]+bestaudio/best[height<=144]",
              "360p": "bestvideo[height<=360]+bestaudio/best[height<=360]",
              "480p": "bestvideo[height<=480]+bestaudio/best[height<=480]",
              "720p": "bestvideo[height<=720]+bestaudio/best[height<=720]",
              "1080p": "bestvideo[height<=1080]+bestaudio/best[height<=1080]",
              "best": "best"
          }
          fmt = quality_map.get(quality, "bestvideo[height<=720]+bestaudio/best[height<=720]")

          # ── Output folder ──
          out_dir = Path(folder_name)
          out_dir.mkdir(exist_ok=True)

          # ── Helper: run yt-dlp ──
          def run_ytdlp(cmd, url, extra_args=None):
              """Return (success, set of new filenames)."""
              before = set(os.listdir("."))
              final_cmd = list(cmd)
              if extra_args:
                  final_cmd.extend(extra_args)
              final_cmd.append(url)
              result = subprocess.run(final_cmd, capture_output=True, text=True, timeout=600)
              after = set(os.listdir("."))
              new_files = after - before
              return result.returncode == 0, new_files

          # ── Video-only command ──
          video_cmd = [
              "yt-dlp", "--no-playlist",
              "--format", fmt,
              "--merge-output-format", "mp4",
              "--output", "%(title).150B [%(id)s].%(ext)s",
              "--restrict-filenames", "--windows-filenames",
              "--remote-components", "ejs:github",
              "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "--extractor-retries", "3", "--retries", "3",
              "--sleep-requests", "1", "--sleep-interval", "5",
          ]

          # ── Subtitle-only command (if needed) ──
          sub_cmd = None
          if sub_lang_input != "none":
              lang_code = sub_lang_input.split()[0]
              sub_cmd = [
                  "yt-dlp", "--no-playlist", "--skip-download",
                  "--write-auto-subs", "--sub-lang", lang_code,
                  "--convert-subs", "srt",
                  "--output", "%(title).150B [%(id)s].%(ext)s",
                  "--restrict-filenames", "--windows-filenames",
                  "--remote-components", "ejs:github",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "--extractor-retries", "2", "--retries", "2",
                  "--sleep-requests", "1", "--sleep-interval", "5",
              ]

          # ── GitHub upload helper ──
          def upload_to_github(local_path, remote_path):
              """Upload a file via GitHub API. Returns True on success."""
              with open(local_path, "rb") as f:
                  b64 = base64.b64encode(f.read()).decode("utf-8")
              url = f"https://api.github.com/repos/{repo}/contents/{quote(remote_path)}"
              headers = {"Authorization": f"token {token}"}
              # Check if file exists (to get SHA for updates)
              resp = requests.get(url, headers=headers)
              sha = resp.json().get("sha") if resp.status_code == 200 else None
              body = {
                  "message": f"Add/update {Path(local_path).name}",
                  "content": b64,
                  "branch": branch,
              }
              if sha:
                  body["sha"] = sha
              for attempt in range(3):
                  r = requests.put(url, headers=headers, json=body)
                  if r.status_code in (200, 201):
                      return True
                  time.sleep(5)
              return False

          # ── Process each URL ──
          video_count = 0
          total_uploaded = 0
          chunk_size = 20 * 1024 * 1024

          for idx, url in enumerate(urls):
              video_count += 1
              log(f"\n--- URL #{video_count}: {url} ---")
              extra_args = []
              video_file = None

              # ── Try WARP ──
              log("  [Strategy 1] Cloudflare WARP (video only)...")
              ok, new_files = run_ytdlp(video_cmd, url)
              if ok:
                  log("  ✓ WARP video download succeeded")
              else:
                  log("  ✗ WARP failed")

              # ── Try cookies if needed ──
              if not ok and cookies_secret:
                  log("  [Strategy 2] Cookies (video only)...")
                  with open("cookies.txt", "w") as cf:
                      cf.write(cookies_secret)
                  extra_args = ["--cookies", "cookies.txt"]
                  ok, new_files = run_ytdlp(video_cmd, url, extra_args=extra_args)
                  if ok:
                      log("  ✓ Cookies video download succeeded")
                  else:
                      log("  ✗ Cookies video download failed")
              elif not ok:
                  log("  [Strategy 2] Skipped (no cookies secret)")

              if not ok:
                  log("  ✗ All download methods failed for this URL. Skipping.")
                  continue

              # Locate video file among new files
              for f in sorted(new_files):
                  if not f.endswith((".part", ".srt", ".ytdl", ".log", ".tmp")) and os.path.exists(f):
                      video_file = f
                      break
              if not video_file:
                  log("  ⚠ Video file not found after download.")
                  continue

              file_size = os.path.getsize(video_file)
              log(f"  ✓ Video: {video_file} ({file_size/1024/1024:.1f} MB)")

              # ── Split & upload video ──
              if file_size < chunk_size:
                  log("  Uploading small file directly...")
                  remote_path = f"{folder_name}/{video_file}"
                  if upload_to_github(video_file, remote_path):
                      log("  ✓ Uploaded small file")
                      total_uploaded += 1
                  else:
                      log("  ✗ Small file upload failed")
                      continue
              else:
                  log(f"  Splitting into {chunk_size//1024//1024} MB chunks...")
                  with open(video_file, "rb") as f:
                      part_idx = 0
                      while True:
                          data = f.read(chunk_size)
                          if not data:
                              break
                          chunk_name = f"{video_file}.part{part_idx:04d}"
                          chunk_path = out_dir / chunk_name
                          with open(chunk_path, "wb") as cf:
                              cf.write(data)
                          log(f"    Uploading {chunk_name} ({len(data)/1024/1024:.1f} MB)")
                          if not upload_to_github(str(chunk_path), f"{folder_name}/{chunk_name}"):
                              log(f"    ✗ Upload failed for {chunk_name}. Skipping remaining chunks.")
                              break
                          os.remove(chunk_path)
                          part_idx += 1
                          time.sleep(0.3)
                  log(f"  ✓ Uploaded {part_idx} chunks")
                  total_uploaded += 1

              # ── Subtitle (best effort) ──
              if sub_cmd and sub_lang_input != "none":
                  log("  [Subs] Attempting subtitle download (best effort)...")
                  try:
                      sub_ok, sub_new = run_ytdlp(sub_cmd, url, extra_args=extra_args)
                      if sub_ok:
                          sub_file = None
                          for f in sorted(sub_new):
                              if f.endswith(".srt"):
                                  sub_file = f
                                  break
                          if sub_file:
                              remote_sub = f"{folder_name}/{sub_file}"
                              if upload_to_github(sub_file, remote_sub):
                                  log(f"  ✓ Subtitle uploaded: {sub_file}")
                              else:
                                  log("  ℹ Subtitle upload failed")
                          else:
                              log("  ℹ No subtitle file found.")
                      else:
                          log("  ℹ Subtitle download failed (non‑critical).")
                  except Exception as e:
                      log(f"  ℹ Subtitle error (non‑critical): {e}")

              # Remove original video after successful upload
              try: os.remove(video_file)
              except: pass

          # ── Generate reassemble.bat (if any file uploaded) ──
          if total_uploaded > 0:
              bat_path = out_dir / "reassemble.bat"
              with open(bat_path, "w") as bat:
                  bat.write("@echo off\nsetlocal enabledelayedexpansion\n")
                  bat.write("echo ========================================\n")
                  bat.write("echo  Reassembling all downloaded files...\n")
                  bat.write("echo ========================================\n")
                  bat.write("echo If you have .part files, they will be combined.\n")
                  bat.write("echo To rebuild a file use: copy /b yourfile.mp4.part* yourfile.mp4\n")
                  bat.write("echo ========================================\n")
                  bat.write("pause\n")
              remote_bat = f"{folder_name}/reassemble.bat"
              if upload_to_github(str(bat_path), remote_bat):
                  log("  ✓ reassemble.bat uploaded.")
              else:
                  log("  ✗ reassemble.bat upload failed.")

          # ── Final log ──
          log(f"\n=== Summary ===")
          log(f"Total URLs: {len(urls)}")
          log(f"Successfully uploaded: {total_uploaded}")

          # Clean up cookies
          try: os.remove("cookies.txt")
          except: pass

          if total_uploaded == 0:
              log("\n⚠️ No videos were uploaded. Failing the workflow.")
              sys.exit(1)
          else:
              log(f"\n✅ Uploaded {total_uploaded} video(s).")
          PYEOF

      - name: Commit download.log and output folder
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
