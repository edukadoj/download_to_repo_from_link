name: YouTube Download (WARP + Cookie Fallback)

on:
  workflow_dispatch:
    inputs:
      youtube_url1:
        description: 'YouTube URL #1 (required)'
        required: true
        default: ''
      youtube_url2:
        description: 'YouTube URL #2 (optional)'
        required: false
        default: ''
      youtube_url3:
        description: 'YouTube URL #3 (optional)'
        required: false
        default: ''
      youtube_url4:
        description: 'YouTube URL #4 (optional)'
        required: false
        default: ''
      youtube_url5:
        description: 'YouTube URL #5 (optional)'
        required: false
        default: ''
      quality:
        description: 'Video quality'
        required: true
        type: choice
        default: '720p'
        options:
          - '144p'
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
          - 'best'
      sub_lang:
        description: 'Subtitles language'
        required: true
        type: choice
        default: 'en (English)'
        options:
          - 'en (English)'
          - 'fa (Persian)'
          - 'none'
      folder_name:
        description: 'Folder to store downloads'
        required: false
        default: 'YouTube Download'

jobs:
  download-and-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f video.* download.log video_list.txt sub_list.txt cookies.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Setup Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: Verify WARP connection
        run: |
          echo "Checking WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP is active."

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade yt-dlp

      - name: Download all videos (WARP first, then cookies)
        id: download
        env:
          YT_URL_1: ${{ github.event.inputs.youtube_url1 }}
          YT_URL_2: ${{ github.event.inputs.youtube_url2 }}
          YT_URL_3: ${{ github.event.inputs.youtube_url3 }}
          YT_URL_4: ${{ github.event.inputs.youtube_url4 }}
          YT_URL_5: ${{ github.event.inputs.youtube_url5 }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          SUB_LANG: ${{ github.event.inputs.sub_lang }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, subprocess

          def log(msg):
              print(msg)
              with open("download.log", "a", encoding="utf-8") as f:
                  f.write(msg + "\n")

          quality = "${{ github.event.inputs.quality }}"
          cookies_secret = os.environ.get("YOUTUBE_COOKIES", "").strip()
          sub_lang_input = os.environ.get("SUB_LANG", "none").strip()

          urls = []
          for i in range(1, 6):
              v = os.environ.get(f"YT_URL_{i}", "").strip()
              if v:
                  urls.append(v)

          if not urls:
              log("No URLs provided.")
              sys.exit(0)

          log(f"Processing {len(urls)} URL(s) through Cloudflare WARP")

          quality_map = {
              "144p": "bestvideo[height<=144]+bestaudio/best[height<=144]",
              "360p": "bestvideo[height<=360]+bestaudio/best[height<=360]",
              "480p": "bestvideo[height<=480]+bestaudio/best[height<=480]",
              "720p": "bestvideo[height<=720]+bestaudio/best[height<=720]",
              "1080p": "bestvideo[height<=1080]+bestaudio/best[height<=1080]",
              "best": "best"
          }
          fmt = quality_map.get(quality, "bestvideo[height<=720]+bestaudio/best[height<=720]")

          sub_args = []
          if sub_lang_input != "none":
              lang_code = sub_lang_input.split()[0]
              sub_args = ["--write-auto-subs", "--sub-lang", lang_code, "--convert-subs", "srt"]
              log(f"Subtitles enabled: {lang_code}")
          else:
              log("Subtitles disabled.")

          def run_ytdlp(url, extra_args=None):
              """Download with yt-dlp; return (result, set_of_new_files)."""
              before = set(os.listdir("."))
              cmd = [
                  "yt-dlp", "--no-playlist",
                  "--format", fmt,
                  "--output", "%(title).150B [%(id)s].%(ext)s",
                  "--restrict-filenames",
                  "--windows-filenames",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              ] + sub_args
              if extra_args:
                  cmd.extend(extra_args)
              cmd.append(url)
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=600)
              after = set(os.listdir("."))
              new_files = after - before
              return result, new_files

          video_count = 0
          downloaded_any = 0

          for idx, url in enumerate(urls):
              video_count += 1
              log(f"\n--- URL #{video_count}: {url} ---")
              success = False
              new_files = set()

              # Strategy 1: WARP
              log("  [Strategy 1] Downloading via Cloudflare WARP (no cookies)...")
              result, new_files = run_ytdlp(url)
              if result.returncode == 0:
                  success = True
                  log("  ✓ WARP download succeeded")
              else:
                  lines = result.stderr.splitlines()[-5:]
                  for line in lines:
                      log(f"    {line}")
                  log("  ✗ WARP download failed")

              # Strategy 2: Cookies fallback
              if not success and cookies_secret:
                  log("  [Strategy 2] Attempting with cookies...")
                  with open("cookies.txt", "w") as cf:
                      cf.write(cookies_secret)
                  result, new_files = run_ytdlp(url, extra_args=["--cookies", "cookies.txt"])
                  if result.returncode == 0:
                      success = True
                      log("  ✓ Cookies download succeeded")
                  else:
                      lines = result.stderr.splitlines()[-5:]
                      for line in lines:
                          log(f"    {line}")
                      log("  ✗ Cookies download failed")
              elif not success:
                  log("  [Strategy 2] Skipped (no cookies secret available)")

              if success:
                  # Find the video file (exclude .part, .srt, .ytdl, .log)
                  video_file = None
                  for f in sorted(new_files):
                      if not f.endswith((".part", ".srt", ".ytdl", ".log", ".tmp")):
                          video_file = f
                          break

                  if video_file:
                      size_mb = os.path.getsize(video_file) / (1024 * 1024)
                      log(f"  ✓ Video: {video_file} ({size_mb:.1f} MB)")
                      with open("video_list.txt", "a") as vl:
                          vl.write(video_file + "\n")
                      downloaded_any += 1
                  else:
                      log("  ⚠ Video file not found among new files.")

                  if sub_lang_input != "none":
                      sub_file = None
                      for f in sorted(new_files):
                          if f.endswith(".srt"):
                              sub_file = f
                              break
                      if sub_file:
                          log(f"  ✓ Subtitle: {sub_file}")
                          with open("sub_list.txt", "a") as sl:
                              sl.write(sub_file + "\n")
                      else:
                          log("  ℹ No subtitle file downloaded (may not exist for this video).")
              else:
                  log(f"  ✗ All methods failed for URL #{video_count}")

          try: os.remove("cookies.txt")
          except: pass

          log(f"\n=== Summary ===")
          log(f"Date: {time.ctime()}")
          log(f"Total URLs: {len(urls)}")
          log(f"Successfully downloaded: {downloaded_any}")

          if downloaded_any == 0:
              log("\n⚠️ No videos were downloaded.")
          else:
              log(f"\n✅ Downloaded {downloaded_any} video(s).")
          PYEOF

      - name: Commit download.log only (no list files)
        if: always()
        run: |
          git add download.log
          git commit -m "Update download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true

      - name: Split and upload everything
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            Write-Host $msg
            Add-Content -Path $logFile -Value $msg
          }

          $videoList = @(Get-Content video_list.txt -ErrorAction SilentlyContinue | Where-Object { $_ -and $_ -ne '' })
          $subList = @(Get-Content sub_list.txt -ErrorAction SilentlyContinue | Where-Object { $_ -and $_ -ne '' })

          if ($videoList.Count -eq 0) {
            Write-Log "No video files to upload. Exiting."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $fileInfos = [System.Collections.Generic.List[hashtable]]::new()
          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                return
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "FATAL: upload failed after $maxRetries attempts."
                  exit 1
                }
              }
            }
          }

          for ($i = 0; $i -lt $videoList.Count; $i++) {
            $videoFile = $videoList[$i]
            $subFile = if ($i -lt $subList.Count) { $subList[$i] } else { $null }

            if (-not (Test-Path $videoFile)) {
              Write-Log "Video file missing: $videoFile – skipping."
              continue
            }
            $fileSize = (Get-Item $videoFile).Length
            $fileName = [System.IO.Path]::GetFileName($videoFile)
            Write-Log "Processing $fileName ($([math]::Round($fileSize / 1MB, 1)) MB)"
            if ($fileSize -lt $chunkSize) {
              Write-Log "File smaller than chunk size; uploading directly."
              Upload-File -localPath $videoFile -remotePath "$chunksDir/$fileName"
              $fileInfos.Add(@{ Name = $fileName; HasChunks = $false })
            } else {
              Write-Log "Splitting into chunks..."
              $stream = [System.IO.File]::OpenRead($videoFile)
              $partIdx = 0
              $buffer = New-Object byte[] $chunkSize
              $uploadSuccess = $true
              while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
                $chunkPath = Join-Path $chunksDir $chunkName
                [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
                Write-Log "Uploading $chunkName ($([math]::Round($n/1MB,1)) MB)"
                try {
                  Upload-File -localPath $chunkPath -remotePath "$chunksDir/$chunkName"
                } catch {
                  Write-Log "Upload failed for $chunkName. Aborting remaining chunks for $fileName."
                  $uploadSuccess = $false
                  break
                }
                Remove-Item $chunkPath -Force
                $partIdx++
                Start-Sleep -Milliseconds 500
              }
              $stream.Close()
              if ($uploadSuccess) {
                $fileInfos.Add(@{ Name = $fileName; HasChunks = $true; ChunkCount = $partIdx })
              }
            }
            Remove-Item $videoFile -Force
          }

          if ($subList.Count -gt 0) {
            foreach ($sub in $subList) {
              if (Test-Path $sub) {
                $subName = [System.IO.Path]::GetFileName($sub)
                Write-Log "Uploading subtitle: $subName"
                Upload-File -localPath $sub -remotePath "$chunksDir/$subName"
              }
            }
          }

          if ($fileInfos.Count -gt 0) {
            Write-Log "Creating reassemble.bat..."
            $batPath = Join-Path $chunksDir "reassemble.bat"
            $batLines = @(
              "@echo off",
              "setlocal enabledelayedexpansion",
              "echo ========================================",
              "echo  Reassembling all downloaded files...",
              "echo ========================================"
            )
            foreach ($fi in $fileInfos) {
              $name = $fi.Name
              if ($fi.HasChunks) {
                $batLines += "echo --- Rebuilding $name ---"
                $batLines += "copy /b $name.part* $name"
                $batLines += "if %errorlevel% equ 0 ("
                $batLines += "    echo Successfully created $name"
                $batLines += "    del $name.part*"
                $batLines += "    echo Deleted temporary parts for $name"
                $batLines += ") else ("
                $batLines += "    echo ERROR: Failed to reassemble $name. Parts kept intact."
                $batLines += ")"
              } else {
                $batLines += "echo $name was downloaded as a single file (no chunks)."
              }
            }
            $batLines += "echo ========================================"
            $batLines += "echo All done! Press any key to exit."
            $batLines += "pause >nul"
            $batLines | Out-File -FilePath $batPath -Encoding ASCII
            Write-Log "Uploading reassemble.bat..."
            Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat"
          } else {
            Write-Log "No files were successfully uploaded."
          }
          Write-Log "✅ Processing complete."

          # Clean up temporary list files so they never reach the repository
          Remove-Item video_list.txt, sub_list.txt -ErrorAction SilentlyContinue

      - name: Final log commit (always)
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
