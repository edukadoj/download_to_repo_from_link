      - name: Download all videos (live console output + log)
        id: download
        run: |
          # Send all output to both the console and download.log
          exec > >(tee -a download.log) 2>&1

          echo "=== YouTube Download Log ==="
          echo "Date: $(date)"
          echo "Quality: ${{ github.event.inputs.quality }}"
          echo "Subtitles: ${{ github.event.inputs.sub_lang }}"
          echo "Folder: ${{ github.event.inputs.folder_name }}"
          echo ""

          # ---- Quality format ----
          case "${{ github.event.inputs.quality }}" in
            144p)  FORMAT='bestvideo[height<=144]+bestaudio/best[height<=144]' ;;
            360p)  FORMAT='bestvideo[height<=360]+bestaudio/best[height<=360]' ;;
            720p)  FORMAT='bestvideo[height<=720]+bestaudio/best[height<=720]' ;;
            1080p) FORMAT='bestvideo[height<=1080]+bestaudio/best[height<=1080]' ;;
            best)  FORMAT='best' ;;
            *)     FORMAT='best' ;;
          esac

          # ---- Subtitle arguments ----
          SUB_LANG="${{ github.event.inputs.sub_lang }}"
          if [ "$SUB_LANG" = "none" ]; then
            SUB_ARGS=""
          else
            SUB_ARGS="--write-auto-subs --sub-lang ${SUB_LANG%% *} --convert-subs srt"
          fi

          # ---- Download function with 10‑minute timeout ----
          try_download() {
            local extra_args="$1"
            timeout 600 yt-dlp --no-playlist --format "$FORMAT" --output "video.%(ext)s" \
              $SUB_ARGS \
              --js-runtimes deno \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              $extra_args \
              "$url"
            return $?
          }

          WORKING_PROXY=""
          VIDEO_COUNT=0
          DOWNLOADED_ANY=0

          for url in "${{ github.event.inputs.youtube_url1 }}" \
                      "${{ github.event.inputs.youtube_url2 }}" \
                      "${{ github.event.inputs.youtube_url3 }}" \
                      "${{ github.event.inputs.youtube_url4 }}" \
                      "${{ github.event.inputs.youtube_url5 }}"; do
            [ -z "$url" ] && continue
            VIDEO_COUNT=$((VIDEO_COUNT+1))
            echo "--- Processing URL #$VIDEO_COUNT: $url ---"
            SUCCESS=0

            # Attempt 1: Direct
            echo "Attempting direct download..."
            if try_download ""; then
              echo "Direct success"
              SUCCESS=1
            fi

            # Attempt 2: Known working proxy (if any)
            if [ $SUCCESS -eq 0 ] && [ -n "$WORKING_PROXY" ]; then
              echo "Attempting with known working proxy: $WORKING_PROXY"
              if try_download "--proxy $WORKING_PROXY"; then
                echo "Proxy success (reuse)"
                SUCCESS=1
              fi
            fi

            # Attempt 3: Local proxylist.txt
            if [ $SUCCESS -eq 0 ]; then
              echo "Attempting local proxies..."
              sed -i 's/\r$//; /^[[:space:]]*$/d; s/^[[:space:]]*//; s/[[:space:]]*$//' proxylist.txt
              while IFS= read -r proxy; do
                if [ -n "$proxy" ] && echo "$proxy" | grep -qE '^(http|socks4|socks5)://|^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+'; then
                  echo "Trying local proxy: $proxy"
                  if try_download "--proxy $proxy"; then
                    echo "Local proxy success ($proxy)"
                    WORKING_PROXY="$proxy"
                    SUCCESS=1
                    break
                  fi
                fi
              done < proxylist.txt
            fi

            # Attempt 4: Public proxies
            if [ $SUCCESS -eq 0 ]; then
              echo "Attempting public proxies..."
              PUBLIC_LIST=$(curl -s "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt" | head -n 15)
              if [ -n "$PUBLIC_LIST" ]; then
                while IFS= read -r proxy; do
                  if [ -n "$proxy" ] && echo "$proxy" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+'; then
                    echo "Trying public proxy: $proxy"
                    if try_download "--proxy $proxy"; then
                      echo "Public proxy success ($proxy)"
                      WORKING_PROXY="$proxy"
                      SUCCESS=1
                      break
                    fi
                  fi
                done <<< "$PUBLIC_LIST"
              fi
            fi

            # Attempt 5: Third‑party services (time‑limited)
            if [ $SUCCESS -eq 0 ]; then
              echo "Attempting third‑party services..."
              VID=$(echo "$url" | sed -n 's/.*v=\([^&]*\).*/\1/p')
              # y2mate
              ANALYZE=$(curl -s --max-time 30 -X POST "https://www.y2mate.com/mates/analyzeV2/ajax" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "k_query=https://www.youtube.com/watch?v=$VID&k_page=home&hl=en&q_auto=0")
              DL_URL=$(echo "$ANALYZE" | jq -r '.links.mp4["18"].url // .links.mp4["22"].url // .links.mp4["136"].url // empty')
              if [ -n "$DL_URL" ]; then
                echo "y2mate URL: $DL_URL"
                curl -L --max-time 60 -o video.mp4 "$DL_URL" && SUCCESS=1 || echo "y2mate download failed"
              fi
              # savefrom.net
              if [ $SUCCESS -eq 0 ]; then
                DL_URL=$(curl -s --max-time 30 "https://savefrom.net/api/convert" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "sf_url=https://www.youtube.com/watch?v=$VID" | jq -r '.list[0].download[0].url // empty')
                if [ -n "$DL_URL" ]; then
                  echo "savefrom.net URL: $DL_URL"
                  curl -L --max-time 60 -o video.mp4 "$DL_URL" && SUCCESS=1 || echo "savefrom.net download failed"
                fi
              fi
            fi

            if [ $SUCCESS -eq 1 ]; then
              DOWNLOADED_ANY=1
              VIDEO_FILE=$(ls video.* 2>/dev/null | grep -v '\.part$' | head -n1)
              VIDEO_EXT="${VIDEO_FILE##*.}"
              NEW_NAME="video_${VIDEO_COUNT}.${VIDEO_EXT}"
              mv "$VIDEO_FILE" "$NEW_NAME"
              echo "Renamed to $NEW_NAME"
              echo "$NEW_NAME" >> video_list.txt

              SUB_FILE=$(ls video.*.srt 2>/dev/null | head -n1)
              if [ -n "$SUB_FILE" ]; then
                SUB_NEW_NAME="video_${VIDEO_COUNT}.en.srt"
                mv "$SUB_FILE" "$SUB_NEW_NAME"
                echo "$SUB_NEW_NAME" >> sub_list.txt
                echo "Subtitle saved as $SUB_NEW_NAME"
              fi
            else
              echo "WARNING: Failed to download URL #$VIDEO_COUNT – skipping."
            fi
          done

          if [ $DOWNLOADED_ANY -eq 0 ]; then
            echo "No videos were downloaded. All URLs failed or were skipped."
          else
            echo "Download phase completed successfully."
          fi
        shell: /usr/bin/bash {0}
