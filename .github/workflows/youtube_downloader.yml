name: YouTube Download (WARP + Cookie Fallback)

on:
  workflow_dispatch:
    inputs:
      youtube_url1:
        description: 'YouTube URL #1 (required)'
        required: true
        default: ''
      youtube_url2:
        description: 'YouTube URL #2 (optional)'
        required: false
        default: ''
      youtube_url3:
        description: 'YouTube URL #3 (optional)'
        required: false
        default: ''
      youtube_url4:
        description: 'YouTube URL #4 (optional)'
        required: false
        default: ''
      youtube_url5:
        description: 'YouTube URL #5 (optional)'
        required: false
        default: ''
      quality:
        description: 'Video quality'
        required: true
        type: choice
        default: '720p'
        options:
          - '144p'
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
          - 'best'
      sub_lang:
        description: 'Subtitles language'
        required: true
        type: choice
        default: 'en (English)'
        options:
          - 'en (English)'
          - 'fa (Persian)'
          - 'none'
      burner_subs:
        description: 'Burn subtitles into video?'
        required: true
        type: boolean
        default: false
      use_cache:
        description: 'Enable pip & Deno caching'
        required: true
        type: boolean
        default: true
      folder_name:
        description: 'Folder to store downloads'
        required: false
        default: 'YouTube Download'

jobs:
  download-and-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log cookies.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Restore pip & Deno cache
        if: inputs.use_cache == 'true'
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            /home/runner/.deno
          key: pip-deno-cache-v1
          restore-keys: pip-deno-cache-v1

      - name: Setup Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: Verify WARP connection
        run: |
          echo "Checking WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP is active."

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade yt-dlp "yt-dlp[default,curl-cffi]" requests
          if [ ! -d "/home/runner/.deno" ]; then
            curl -fsSL https://deno.land/install.sh | sh
          fi
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH

      - name: Download, convert, split & upload (verbose)
        id: process
        env:
          YT_URL_1: ${{ github.event.inputs.youtube_url1 }}
          YT_URL_2: ${{ github.event.inputs.youtube_url2 }}
          YT_URL_3: ${{ github.event.inputs.youtube_url3 }}
          YT_URL_4: ${{ github.event.inputs.youtube_url4 }}
          YT_URL_5: ${{ github.event.inputs.youtube_url5 }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          SUB_LANG: ${{ github.event.inputs.sub_lang }}
          QUALITY: ${{ github.event.inputs.quality }}
          BURN_SUBS: ${{ github.event.inputs.burner_subs }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, subprocess, base64, requests, json, re, traceback
          from pathlib import Path
          from urllib.parse import quote

          sys.stdout.reconfigure(line_buffering=True)
          sys.stderr.reconfigure(line_buffering=True)

          def log(msg):
              print(msg, flush=True)
              with open("download.log", "a", encoding="utf-8") as f:
                  f.write(msg + "\n")

          quality = os.environ.get("QUALITY", "720p")
          cookies_secret = os.environ.get("YOUTUBE_COOKIES", "").strip()
          sub_lang_input = os.environ.get("SUB_LANG", "none").strip()
          burn_subs = os.environ.get("BURN_SUBS", "false").lower() == "true"
          folder_name = os.environ.get("FOLDER_NAME", "YouTube Download")
          token = os.environ.get("GITHUB_TOKEN")
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]

          urls = []
          for i in range(1, 6):
              v = os.environ.get(f"YT_URL_{i}", "").strip()
              if v:
                  urls.append(v)

          if not urls:
              log("❌ No URLs provided.")
              sys.exit(0)

          log(f"🚀 Processing {len(urls)} URL(s) through Cloudflare WARP")
          log(f"   Quality: {quality}")
          log(f"   Subtitles: {sub_lang_input}")
          log(f"   Burn subtitles: {burn_subs}")

          quality_map = {
              "144p": "bestvideo[height<=144]+bestaudio/best[height<=144]",
              "360p": "bestvideo[height<=360]+bestaudio/best[height<=360]",
              "480p": "bestvideo[height<=480]+bestaudio/best[height<=480]",
              "720p": "bestvideo[height<=720]+bestaudio/best[height<=720]",
              "1080p": "bestvideo[height<=1080]+bestaudio/best[height<=1080]",
              "best": "best"
          }
          fmt = quality_map.get(quality, "bestvideo[height<=720]+bestaudio/best[height<=720]")

          out_dir = Path(folder_name)
          out_dir.mkdir(exist_ok=True)

          # ------------------------------------------------------------
          # Live command runner – returns (exit code, set of new files, all output)
          # ------------------------------------------------------------
          def run_cmd_live(cmd, timeout=600):
              before = set(os.listdir("."))
              output_lines = []
              proc = subprocess.Popen(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1)
              for line in proc.stdout:
                  print(line, end="", flush=True)
                  output_lines.append(line)
              proc.wait(timeout=timeout)
              after = set(os.listdir("."))
              new_files = after - before
              return proc.returncode, new_files, "".join(output_lines)

          def run_ytdlp_and_log(base_cmd, url, extra_args=None, attempt_name=""):
              log(f"   ▶️ Starting {attempt_name} download...")
              final_cmd = list(base_cmd)
              if extra_args:
                  final_cmd.extend(extra_args)
              final_cmd.append(url)
              log(f"   🔧 Command: {' '.join(final_cmd)}")
              exit_code, new_files, all_output = run_cmd_live(final_cmd)
              if exit_code == 0:
                  log(f"   ✅ {attempt_name} download finished successfully")
              else:
                  tail = "\n".join(line.rstrip() for line in all_output.splitlines()[-10:])
                  log(f"   ❌ {attempt_name} download FAILED (exit code {exit_code}). Last output lines:\n{tail}")
              return exit_code == 0, new_files

          # ------------------------------------------------------------
          # Get video title (JSON, no download)
          # ------------------------------------------------------------
          def get_video_title(url, extra_args=None):
              title_cmd = [
                  "yt-dlp", "--no-playlist", "--dump-json",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "--remote-components", "ejs:github",
              ]
              if extra_args:
                  title_cmd.extend(extra_args)
              title_cmd.append(url)
              proc = subprocess.run(title_cmd, capture_output=True, text=True, timeout=60)
              if proc.returncode == 0 and proc.stdout.strip():
                  try:
                      metadata = json.loads(proc.stdout.strip())
                      return metadata.get("title", None)
                  except:
                      pass
              return None

          # ------------------------------------------------------------
          # Subtitle command builder
          # ------------------------------------------------------------
          def make_sub_cmd(lang):
              return [
                  "yt-dlp", "--no-playlist", "--skip-download",
                  "--write-auto-subs", "--sub-lang", lang,
                  "--convert-subs", "srt",
                  "--output", "%(title).150B [%(id)s].%(ext)s",
                  "--restrict-filenames", "--windows-filenames",
                  "--remote-components", "ejs:github",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "--extractor-retries", "2", "--retries", "2",
                  "--sleep-requests", "1", "--sleep-interval", "5",
              ]

          # ------------------------------------------------------------
          # Video download command builder
          # ------------------------------------------------------------
          def build_video_cmd(output_filename):
              return [
                  "yt-dlp", "--no-playlist",
                  "--format", fmt,
                  "--merge-output-format", "mp4",
                  "--output", output_filename,
                  "--restrict-filenames", "--windows-filenames",
                  "--remote-components", "ejs:github",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "--extractor-retries", "3", "--retries", "3",
                  "--sleep-requests", "1", "--sleep-interval", "5",
              ]

          # ------------------------------------------------------------
          # GitHub upload
          # ------------------------------------------------------------
          def upload_to_github(local_path, remote_path):
              log(f"   ⬆️  Uploading {Path(local_path).name} ...")
              with open(local_path, "rb") as f:
                  b64 = base64.b64encode(f.read()).decode("utf-8")
              url = f"https://api.github.com/repos/{repo}/contents/{quote(remote_path)}"
              headers = {"Authorization": f"token {token}"}
              resp = requests.get(url, headers=headers)
              sha = resp.json().get("sha") if resp.status_code == 200 else None
              body = {
                  "message": f"Add/update {Path(local_path).name}",
                  "content": b64,
                  "branch": branch,
              }
              if sha:
                  body["sha"] = sha
              for attempt in range(3):
                  r = requests.put(url, headers=headers, json=body)
                  if r.status_code in (200, 201):
                      log(f"   ✅ Upload successful")
                      return True
                  time.sleep(5)
              log(f"   ❌ Upload failed after 3 attempts")
              return False

          # ====================================================================
          #                         MAIN LOOP
          # ====================================================================
          video_count = 0
          total_uploaded = 0
          chunk_size = 20 * 1024 * 1024
          video_infos = []

          for idx, url in enumerate(urls):
              video_count += 1
              extra_args = []
              video_file = None
              subtitle_file = None

              # ---------------------------------------------------------------
              #  DOWNLOAD STAGE
              # ---------------------------------------------------------------
              log("")
              log("╔══════════════════════════════════════════════════════════╗")
              log(f"║               DOWNLOAD  STAGE  —  #{video_count}               ║")
              log("╚══════════════════════════════════════════════════════════╝")
              log(f"📥 URL: {url}")

              log("   🔍 Fetching video title ...")
              title = get_video_title(url)
              if title:
                  safe_title = re.sub(r'[<>:"/\\|?*]', '', title)[:150]
                  log(f"   📝 Title: {safe_title}")
              else:
                  safe_title = None
                  log("   ⚠️ Could not fetch title, will use default naming.")

              if safe_title:
                  output_file = f"{safe_title} [%(id)s].%(ext)s"
              else:
                  output_file = "%(title).150B [%(id)s].%(ext)s"
              video_cmd = build_video_cmd(output_file)

              # ---------- WARP attempt ----------
              ok, new_files = run_ytdlp_and_log(video_cmd, url, attempt_name="WARP")
              if ok:
                  log("   ✅ WARP download succeeded")
              else:
                  log("   ❌ WARP download failed")

              # ---------- Cookies fallback ----------
              if not ok and cookies_secret:
                  with open("cookies.txt", "w") as cf:
                      cf.write(cookies_secret)
                  extra_args = ["--cookies", "cookies.txt"]
                  ok, new_files = run_ytdlp_and_log(video_cmd, url, extra_args=extra_args, attempt_name="Cookies")
                  if ok:
                      log("   ✅ Cookies download succeeded")
                  else:
                      log("   ❌ Cookies download failed")
              elif not ok:
                  log("   [Strategy 2] Skipped (no cookies secret)")

              if not ok:
                  log("   ❌ All download methods failed for this URL. Skipping.")
                  continue

              # Find downloaded video file
              for f in sorted(new_files):
                  if not f.endswith((".part", ".srt", ".ytdl", ".log", ".tmp")) and os.path.exists(f):
                      video_file = f
                      break
              if not video_file:
                  log("   ⚠️ Video file not found after download.")
                  continue

              file_size = os.path.getsize(video_file)
              log(f"   📦 Video file: {video_file} ({file_size/1024**2:.1f} MB)")

              # ---------- Subtitle download ----------
              if sub_lang_input != "none":
                  lang_code = sub_lang_input.split()[0]
                  fallback_lang = "fa" if lang_code == "en" else "en"
                  subtitle_success = False

                  log(f"   📝 Attempting subtitle download for '{lang_code}' ...")
                  sub_cmd = make_sub_cmd(lang_code)
                  sub_ok, sub_new = run_ytdlp_and_log(sub_cmd, url, extra_args=extra_args, attempt_name=f"Sub ({lang_code})")
                  if sub_ok:
                      for f in sorted(sub_new):
                          if f.endswith(".srt"):
                              subtitle_file = f
                              subtitle_success = True
                              log(f"   ✅ Subtitle downloaded: {subtitle_file}")
                              break
                  if not subtitle_success:
                      log(f"   ⚠️ Subtitle for '{lang_code}' not available.")
                      log(f"   📝 Attempting fallback subtitle language '{fallback_lang}' ...")
                      sub_cmd_fallback = make_sub_cmd(fallback_lang)
                      sub_ok2, sub_new2 = run_ytdlp_and_log(sub_cmd_fallback, url, extra_args=extra_args, attempt_name=f"Sub ({fallback_lang})")
                      if sub_ok2:
                          for f in sorted(sub_new2):
                              if f.endswith(".srt"):
                                  subtitle_file = f
                                  subtitle_success = True
                                  log(f"   ✅ Fallback subtitle downloaded: {subtitle_file}")
                                  break
                      if not subtitle_success:
                          log("   ℹ️ No subtitle file found for either language.")
                  else:
                      pass

              # ---------------------------------------------------------------
              #  CONVERSION STAGE
              # ---------------------------------------------------------------
              log("")
              log("╔══════════════════════════════════════════════════════════╗")
              log(f"║              CONVERSION  STAGE  —  #{video_count}              ║")
              log("╚══════════════════════════════════════════════════════════╝")

              normalized = f"normalized_{video_file}"
              if burn_subs and subtitle_file:
                  log("   🔥 Burning subtitles and compressing (CRF 26) ...")
                  sub_abs = os.path.abspath(subtitle_file)
                  cmd_ffmpeg = [
                      "ffmpeg", "-y",
                      "-i", video_file,
                      "-vf", f"subtitles='{sub_abs}':force_style='FontName=Arial,FontSize=18,BackColour=&H66000000&,BorderStyle=4,Outline=1,Shadow=1'",
                      "-c:v", "libx264", "-crf", "26", "-preset", "medium",
                      "-c:a", "copy",
                      normalized
                  ]
              else:
                  log("   🎞️  Compressing video (CRF 26) for playability ...")
                  cmd_ffmpeg = [
                      "ffmpeg", "-y",
                      "-i", video_file,
                      "-c:v", "libx264", "-crf", "26", "-preset", "medium",
                      "-c:a", "copy",
                      normalized
                  ]
              log(f"   🔧 Running: {' '.join(cmd_ffmpeg)}")
              proc = subprocess.run(cmd_ffmpeg, capture_output=True, text=True)
              if proc.returncode == 0:
                  os.remove(video_file)
                  os.rename(normalized, video_file)
                  new_size = os.path.getsize(video_file)
                  log(f"   ✅ Conversion complete. New size: {new_size/1024**2:.1f} MB")
              else:
                  log(f"   ⚠️ Conversion failed (video kept unchanged): {proc.stderr.strip()[-200:]}")
                  if burn_subs and subtitle_file:
                      log("   ℹ️ Subtitle file will be uploaded separately.")

              # ---------------------------------------------------------------
              #  UPLOAD STAGE
              # ---------------------------------------------------------------
              log("")
              log("╔══════════════════════════════════════════════════════════╗")
              log(f"║               UPLOAD  STAGE  —  #{video_count}                ║")
              log("╚══════════════════════════════════════════════════════════╝")

              file_size = os.path.getsize(video_file)

              if file_size < chunk_size:
                  log("   🚀 Uploading small file directly ...")
                  remote_path = f"{folder_name}/{video_file}"
                  if upload_to_github(video_file, remote_path):
                      video_infos.append({"name": video_file, "chunks": 0})
                      total_uploaded += 1
              else:
                  log(f"   ✂️ Splitting into {chunk_size//1024//1024} MB chunks ...")
                  part_idx = 0
                  with open(video_file, "rb") as f:
                      while True:
                          data = f.read(chunk_size)
                          if not data:
                              break
                          chunk_name = f"{video_file}.part{part_idx:04d}"
                          chunk_path = out_dir / chunk_name
                          with open(chunk_path, "wb") as cf:
                              cf.write(data)
                          log(f"      ⬆️ Chunk {part_idx+1}: {chunk_name} ({len(data)/1024**2:.1f} MB)")
                          if not upload_to_github(str(chunk_path), f"{folder_name}/{chunk_name}"):
                              log(f"      ❌ Upload failed for {chunk_name}. Skipping remaining chunks.")
                              break
                          os.remove(chunk_path)
                          part_idx += 1
                          time.sleep(0.3)
                  if part_idx > 0:
                      video_infos.append({"name": video_file, "chunks": part_idx})
                      log(f"   ✅ {part_idx} chunks uploaded")
                      total_uploaded += 1
                  else:
                      log("   ❌ No chunks uploaded, skipping.")

              # Always upload subtitle file if it exists
              if subtitle_file:
                  log(f"   ⬆️  Uploading subtitle file ...")
                  remote_sub = f"{folder_name}/{subtitle_file}"
                  upload_to_github(subtitle_file, remote_sub)

              # Clean up local video
              try: os.remove(video_file)
              except: pass

          # ====================================================================
          #  Generate reassemble.bat  (FIXED: build lines list, join with \r\n)
          # ====================================================================
          if video_infos:
              log("\n📄 Creating reassemble.bat ...")
              bat_path = out_dir / "reassemble.bat"
              bat_lines = []
              bat_lines.append("@echo off")
              bat_lines.append("setlocal enabledelayedexpansion")
              bat_lines.append("echo ========================================")
              bat_lines.append("echo  Reassembling all downloaded files...")
              bat_lines.append("echo ========================================")
              for info in video_infos:
                  name = info["name"]
                  if info["chunks"] > 0:
                      bat_lines.append(f'echo --- Rebuilding "{name}" ---')
                      bat_lines.append(f'copy /b "{name}.part*" "{name}"')
                      bat_lines.append("if %errorlevel% equ 0 (")
                      bat_lines.append(f'    echo Successfully created "{name}"')
                      bat_lines.append(f'    del "{name}.part*"')
                      bat_lines.append("    echo Deleted temporary parts")
                      bat_lines.append(") else (")
                      bat_lines.append(f'    echo ERROR: Failed to reassemble "{name}". Parts kept intact.')
                      bat_lines.append(")")
                  else:
                      bat_lines.append(f'echo "{name}" was downloaded as a single file (no chunks).')
              bat_lines.append("echo ========================================")
              bat_lines.append("echo All done! Press any key to exit.")
              bat_lines.append("pause >nul")

              with open(bat_path, "w", encoding="utf-8") as bat:
                  bat.write("\r\n".join(bat_lines) + "\r\n")

              log("   ⬆️ Uploading reassemble.bat ...")
              upload_to_github(str(bat_path), f"{folder_name}/reassemble.bat")

          log(f"\n📊 Summary")
          log(f"   Total URLs: {len(urls)}")
          log(f"   Successfully uploaded: {total_uploaded}")

          try: os.remove("cookies.txt")
          except: pass

          if total_uploaded == 0:
              log("\n❌ No videos were uploaded. The workflow will be marked as failed.")
              sys.exit(1)
          else:
              log(f"\n✅ Uploaded {total_uploaded} video(s) successfully.")
          PYEOF

      - name: Commit download.log and output folder
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
