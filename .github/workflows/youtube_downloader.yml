name: Download VS 2026 Community Offline Mode

on:
  workflow_dispatch:
    inputs:
      # ... (keep all existing workload checkboxes) ...
      include_android_sdk:
        description: 'Include Android SDK setup'
        type: boolean
        default: false
      clear_cache:                                 # <-- NEW INPUT
        description: 'Delete existing cache and rebuild layout from scratch'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write                               # <-- REQUIRED TO DELETE CACHES
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # ... (keep all steps up to "Compute cache key") ...

      - name: Compute cache key
        id: cache-key
        shell: pwsh
        run: |
          $key = "vs-layout-v6-" +
            "web-${{ inputs.workload_web }}" +
            # ... (same key construction) ...
            "-androidsdk-${{ inputs.include_android_sdk }}"
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # --- NEW: Delete cache if the checkbox is ticked ---
      - name: Clear cache (if requested)
        if: ${{ inputs.clear_cache == true }}
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $key  = "${{ steps.cache-key.outputs.key }}"
          $headers = @{
            Authorization = "Bearer ${{ github.token }}"
            Accept = "application/vnd.github+json"
          }
          Write-Host "Deleting cache entries for key: $key"
          # List all caches
          $caches = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/actions/caches?key=$key"
          if ($caches.total_count -gt 0 -and $caches.actions_caches) {
            foreach ($cache in $caches.actions_caches) {
              Write-Host "Deleting cache $($cache.id)..."
              Invoke-RestMethod -Method Delete -Headers $headers -Uri "https://api.github.com/repos/$repo/actions/caches/$($cache.id)"
            }
          } else {
            Write-Host "No matching cache found."
          }

      - name: Restore cached layout
        id: cache-restore
        if: ${{ inputs.clear_cache != true }}       # only restore if not clearing
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}\vs_layout
          key: ${{ steps.cache-key.outputs.key }}

      # ... (keep "Create offline layout" step) ...

      # ... (keep "Package layout into zip" step) ...

      # ... (keep "Split zip and upload chunks" step) ...

      - name: Save layout cache
        if: ${{ steps.layout.outputs.layout-created == 'true' && inputs.clear_cache != true }}  # don't save while clearing
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}\vs_layout
          key: ${{ steps.cache-key.outputs.key }}
