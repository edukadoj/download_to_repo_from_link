# =============================================================================
# Workflow version: 1.2.2
# Name: Make a website offline
# Description: Downloads dynamic websites (including Telegram channels) using a
#              headless browser, creates a self-contained offline copy, zips it,
#              splits the archive if needed, and uploads everything to the
#              repository. A Windows batch file (reassemble.bat) is generated
#              that rebuilds the archive (with chcp 65001 for UTF‑8 support).
#
# Changelog:
#   1.2.2 – Fixed ZIP path; replaced PowerShell upload with Python (PyGithub);
#           added pip caching.
#   1.2.1 – Fixed npm install error when package.json is missing; use
#           `npm install` only (no `npm ci`).
#   1.2.0 – Fixed Puppeteer `waitForTimeout` error (replaced with setTimeout);
#           added caching of Node modules and Chromium for faster re-runs.
#   1.1.1 – Added URL normalization (automatically adds https:// if missing)
#           to prevent Puppeteer "invalid URL" errors.
#   1.1.0 – Replaced wget with Puppeteer for dynamic sites; added Telegram support;
#           introduced single-file-cli for full page snapshots.
#   1.0.0 – Initial version using wget mirror mode.
# =============================================================================

name: Make a website offline

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'Website or Telegram channel URL (required)'
        required: true
        type: string
      max_depth:
        description: 'Maximum link depth (1-5) – ignored for Telegram'
        required: false
        default: '2'
        type: choice
        options: ['1', '2', '3', '4', '5']
      max_total_size:
        description: 'Maximum total download size (e.g., 500M, 2G)'
        required: false
        default: '2G'
        type: string
      folder_name:
        description: 'Output folder (default: offline_site)'
        required: false
        default: 'offline_site'
        type: string
      include_assets:
        description: 'Download CSS/JS/images? (always true for headless)'
        required: false
        default: true
        type: boolean
      user_agent:
        description: 'User-Agent string'
        required: false
        default: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
        type: string
      telegram_posts:
        description: 'Number of recent Telegram posts to download (0 = not a Telegram URL)'
        required: false
        default: '20'
        type: string

jobs:
  mirror-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up previous runs and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log url_list.txt file_list.txt pending_urls.txt "${{ github.event.inputs.folder_name }}.zip"
          echo "" > download.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      # -------------------------------------------------------------------
      # Normalise the URL: add https:// if missing (Puppeteer requirement)
      # -------------------------------------------------------------------
      - name: Normalize URL
        id: normalize
        run: |
          raw_url="${{ github.event.inputs.website_url }}"
          if [[ ! "$raw_url" =~ ^https?:// ]]; then
            normalized_url="https://${raw_url}"
          else
            normalized_url="$raw_url"
          fi
          echo "SITE_URL=$normalized_url" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------------------
      # Cache Node modules and Chromium for faster subsequent runs
      # -------------------------------------------------------------------
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer
          restore-keys: |
            ${{ runner.os }}-puppeteer

      - name: Install system dependencies (Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser zip unzip
          echo "CHROMIUM_PATH=$(which chromium-browser)" >> $GITHUB_ENV

      - name: Install Node dependencies
        run: |
          npm install puppeteer single-file-cli

      # -------------------------------------------------------------------
      #  Node.js driver – crawls the site or Telegram channel
      # -------------------------------------------------------------------
      - name: Download website with headless browser
        shell: bash
        env:
          SITE_URL: ${{ env.SITE_URL }}
          MAX_DEPTH: ${{ github.event.inputs.max_depth }}
          MAX_SIZE: ${{ github.event.inputs.max_total_size }}
          FOLDER: ${{ github.event.inputs.folder_name }}
          INCLUDE_ASSETS: ${{ github.event.inputs.include_assets }}
          USER_AGENT: ${{ github.event.inputs.user_agent }}
          TELEGRAM_POSTS: ${{ github.event.inputs.telegram_posts }}
        run: |
          cat << 'SCRIPT' > crawl_and_save.js
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const {
            SITE_URL,
            MAX_DEPTH = '2',
            MAX_SIZE = '2G',
            FOLDER,
            INCLUDE_ASSETS = 'true',
            USER_AGENT,
            TELEGRAM_POSTS = '20'
          } = process.env;

          const maxDepth = parseInt(MAX_DEPTH, 10);
          const maxBytes = parseSize(MAX_SIZE);
          let downloadedBytes = 0;
          const outDir = path.resolve(FOLDER);
          if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

          const isTelegram = /^(https?:\/\/)?(www\.)?t(elegram)?\.me\//.test(SITE_URL) && parseInt(TELEGRAM_POSTS) > 0;

          function parseSize(str) {
            const match = str.match(/^(\d+(?:\.\d+)?)\s*(K|M|G|T)?B?$/i);
            if (!match) return 2 * 1024 * 1024 * 1024;
            const num = parseFloat(match[1]);
            const unit = (match[2] || 'M').toUpperCase();
            const multiplier = { K: 1024, M: 1024 ** 2, G: 1024 ** 3, T: 1024 ** 4 };
            return num * multiplier[unit];
          }

          async function main() {
            const browser = await puppeteer.launch({
              headless: 'new',
              executablePath: process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });

            if (isTelegram) {
              await handleTelegram(browser);
            } else {
              await handleGenericSite(browser);
            }
            await browser.close();
          }

          async function handleTelegram(browser) {
            console.log('📡 Downloading Telegram channel using headless browser...');
            const page = await browser.newPage();
            await page.setUserAgent(USER_AGENT);
            await page.goto(SITE_URL, { waitUntil: 'networkidle2', timeout: 60000 });

            const postsToLoad = parseInt(TELEGRAM_POSTS, 10);
            let prevScrollHeight = 0;
            let loadedPosts = 0;
            while (loadedPosts < postsToLoad) {
              loadedPosts = await page.evaluate(() => document.querySelectorAll('.tgme_widget_message_wrap').length);
              console.log(`Loaded ${loadedPosts} posts so far...`);
              if (loadedPosts >= postsToLoad) break;
              await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
              // Replacing page.waitForTimeout with a simple Promise sleep
              await new Promise(resolve => setTimeout(resolve, 2000));
              const newScrollHeight = await page.evaluate(() => document.body.scrollHeight);
              if (newScrollHeight === prevScrollHeight) break;
              prevScrollHeight = newScrollHeight;
            }

            const posts = await page.evaluate((limit) => {
              const wraps = document.querySelectorAll('.tgme_widget_message_wrap');
              return Array.from(wraps).slice(0, limit).map(wrap => {
                const textEl = wrap.querySelector('.tgme_widget_message_text');
                const text = textEl ? textEl.innerText : '';
                const dateEl = wrap.querySelector('.tgme_widget_message_date time');
                const date = dateEl ? dateEl.getAttribute('datetime') : '';
                const mediaEls = wrap.querySelectorAll('.tgme_widget_message_photo_wrap, .tgme_widget_message_video, .tgme_widget_message_document');
                const media = Array.from(mediaEls).map(el => {
                  if (el.classList.contains('tgme_widget_message_photo_wrap')) {
                    const img = el.querySelector('img');
                    return { type: 'photo', src: img ? img.src : '' };
                  } else if (el.classList.contains('tgme_widget_message_video')) {
                    const video = el.querySelector('video');
                    return { type: 'video', src: video ? video.src : '', poster: video ? video.poster : '' };
                  } else if (el.classList.contains('tgme_widget_message_document')) {
                    const a = el.querySelector('.tgme_widget_message_document_wrap a');
                    return { type: 'document', href: a ? a.href : '', title: a ? a.innerText : '' };
                  }
                  return null;
                }).filter(Boolean);
                return { text, date, media };
              });
            }, postsToLoad);

            let html = `<html><head><meta charset="utf-8"><title>Telegram Channel Mirror</title><style>body{font-family:sans-serif;max-width:800px;margin:auto;padding:20px;}.post{border-bottom:1px solid #ccc;padding:15px 0;}</style></head><body><h1>Telegram Channel Mirror</h1>`;
            for (const p of posts) {
              html += `<div class="post">`;
              if (p.date) html += `<p><small>${p.date}</small></p>`;
              if (p.text) html += `<p>${p.text}</p>`;
              for (const m of p.media) {
                if (m.type === 'photo' && m.src) html += `<img src="${m.src}" style="max-width:100%;"><br>`;
                if (m.type === 'video' && m.src) html += `<video src="${m.src}" controls style="max-width:100%;"></video><br>`;
                if (m.type === 'document' && m.href) html += `<a href="${m.href}">📄 ${m.title || m.href}</a><br>`;
              }
              html += `</div>`;
            }
            html += `</body></html>`;

            const filePath = path.join(outDir, 'telegram_channel.html');
            fs.writeFileSync(filePath, html, 'utf8');
            console.log(`Telegram channel saved to ${filePath}`);
          }

          async function handleGenericSite(browser) {
            console.log('🌐 Crawling generic website with SingleFile (depth ' + maxDepth + ')...');
            const visited = new Set();
            const queue = [SITE_URL];
            let depth = 0;

            while (queue.length > 0 && depth <= maxDepth) {
              const levelSize = queue.length;
              for (let i = 0; i < levelSize; i++) {
                const url = queue.shift();
                if (visited.has(url)) continue;
                visited.add(url);
                try {
                  console.log(`Downloading: ${url}`);
                  const sanitized = url.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 100);
                  const outFile = path.join(outDir, `${sanitized}.html`);
                  execSync(`npx single-file ${url} ${outFile}`, { stdio: 'inherit' });

                  const stat = fs.statSync(outFile);
                  downloadedBytes += stat.size;
                  if (downloadedBytes > maxBytes) {
                    console.log('Reached size limit. Stopping crawl.');
                    return;
                  }

                  const content = fs.readFileSync(outFile, 'utf8');
                  const linkRegex = /<a[^>]+href="([^"]*)"/gi;
                  let match;
                  while ((match = linkRegex.exec(content)) !== null) {
                    const link = match[1];
                    try {
                      const absolute = new URL(link, url).href;
                      if (absolute.startsWith(SITE_URL) && !visited.has(absolute)) {
                        queue.push(absolute);
                      }
                    } catch (_) {}
                  }
                } catch (err) {
                  console.error(`Failed to download ${url}: ${err.message}`);
                }
              }
              depth++;
            }
            console.log('Crawl finished.');
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          SCRIPT

          node crawl_and_save.js

      # -------------------------------------------------------------------
      #  Zip the whole output folder (save at workspace root)
      # -------------------------------------------------------------------
      - name: Create ZIP archive
        env:
          FOLDER: ${{ github.event.inputs.folder_name }}
        run: |
          ZIPFILE="${FOLDER}.zip"
          echo "Creating $ZIPFILE..."
          zip -r "$ZIPFILE" "$FOLDER"
          echo "Archive size: $(du -h "$ZIPFILE" | cut -f1)"
          echo "ZIPFILE=$ZIPFILE" >> $GITHUB_ENV

      # -------------------------------------------------------------------
      #  Cache pip packages for faster future runs
      # -------------------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      # -------------------------------------------------------------------
      #  Upload ZIP (split if needed) and generate reassemble.bat
      # -------------------------------------------------------------------
      - name: Upload ZIP to repository and create reassemble.bat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
          ZIPFILE: ${{ env.ZIPFILE }}
        run: |
          python << 'PYEOF'
          import os, sys, base64, math, time
          from github import Github, GithubException

          token = os.environ["GITHUB_TOKEN"]
          repo_name = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          folder_name = os.environ["FOLDER_NAME"]
          zipfile = os.environ["ZIPFILE"]  # e.g., offline_site.zip

          if not os.path.exists(zipfile):
              print(f"ZIP file not found: {zipfile}")
              sys.exit(1)

          g = Github(token)
          repo = g.get_repo(repo_name)

          chunk_size = 20 * 1024 * 1024  # 20 MB
          file_size = os.path.getsize(zipfile)
          fname = os.path.basename(zipfile)
          print(f"Processing {fname} ({file_size / 1024 / 1024:.1f} MB)")

          # Helper to upload a single file
          def upload_file(local_path: str, remote_path: str):
              with open(local_path, "rb") as f:
                  content_bytes = f.read()
              b64 = base64.b64encode(content_bytes).decode("utf-8")
              try:
                  contents = repo.get_contents(remote_path, ref=branch)
                  repo.update_file(
                      contents.path,
                      f"Update {os.path.basename(local_path)}",
                      b64,
                      contents.sha,
                      branch=branch
                  )
                  print(f"✓ Updated {remote_path}")
              except GithubException as e:
                  if e.status == 404:
                      repo.create_file(
                          remote_path,
                          f"Add {os.path.basename(local_path)}",
                          b64,
                          branch=branch
                      )
                      print(f"✓ Created {remote_path}")
                  else:
                      raise

          uploaded_parts = []
          if file_size < chunk_size:
              # Upload directly
              remote = f"{folder_name}/{fname}"
              upload_file(zipfile, remote)
              uploaded_parts.append((fname, False))
          else:
              # Split and upload chunks
              chunk_index = 0
              with open(zipfile, "rb") as f:
                  while True:
                      chunk = f.read(chunk_size)
                      if not chunk:
                          break
                      chunk_name = f"{fname}.part{chunk_index:04d}"
                      chunk_path = os.path.join(folder_name, chunk_name)
                      # Write chunk to temporary file
                      with open(chunk_path, "wb") as cf:
                          cf.write(chunk)
                      upload_file(chunk_path, f"{folder_name}/{chunk_name}")
                      os.remove(chunk_path)
                      chunk_index += 1
                      time.sleep(0.5)  # be kind to API rate limits
              uploaded_parts.append((fname, True))

          # Generate reassemble.bat (Windows batch file)
          bat_lines = [
              "@echo off",
              "chcp 65001 >nul",
              "setlocal enabledelayedexpansion",
              "echo ========================================",
              "echo Reassembling downloaded archive...",
              "echo ========================================"
          ]
          for fname, has_chunks in uploaded_parts:
              if has_chunks:
                  bat_lines.append(f"echo --- Rebuilding {fname} ---")
                  bat_lines.append(f"copy /b {fname}.part* {fname}")
                  bat_lines.append("if %errorlevel% equ 0 (")
                  bat_lines.append(f"    echo Successfully created {fname}")
                  bat_lines.append(f"    del {fname}.part*")
                  bat_lines.append(f"    echo Deleted temporary parts for {fname}")
                  bat_lines.append(") else (")
                  bat_lines.append(f"    echo ERROR: Failed to reassemble {fname}. Parts kept intact.")
                  bat_lines.append(")")
              else:
                  bat_lines.append(f"echo {fname} was downloaded as a single file (no chunks).")
          bat_lines.append("echo ========================================")
          bat_lines.append("echo All done! You can now extract the ZIP archive.")
          bat_lines.append("pause >nul")

          bat_content = "\r\n".join(bat_lines)  # Windows line endings
          bat_path = os.path.join(folder_name, "reassemble.bat")
          with open(bat_path, "wb") as bf:
              # Write without BOM (raw bytes, UTF-8 encoding ensures chcp 65001 works)
              bf.write(bat_content.encode("utf-8"))

          upload_file(bat_path, f"{folder_name}/reassemble.bat")
          print("=== Upload completed ===")
          PYEOF

      # -------------------------------------------------------------------
      #  Commit remaining files (logs, etc.)
      # -------------------------------------------------------------------
      - name: Commit download log and file list
        if: always()
        run: |
          git add download.log file_list.txt 2>/dev/null || true
          git commit -m "Update download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true

      - name: Final log commit
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
