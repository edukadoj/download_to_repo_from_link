# ==============================================================================
#  version: 2.3
#  Offline NuGet Feed Builder for Visual Studio 2026 Community
#  Downloads priority packages (with deps) + top popular packages (each attempted
#  with full restore, else downloaded as standalone), respecting a size limit.
#  MAUI workload installed for broader compatibility.
#  Finally, splits the ZIP into chunk‑files and uploads them to the repository.
# ==============================================================================

name: Download NuGet Packages Offline (Priority + Top by Downloads)

on:
  workflow_dispatch:
    inputs:
      priority_packages:
        description: |
          Priority packages – one per line (or separated by spaces).
          Optionally append @version (e.g. Newtonsoft.Json@13.0.3).
          These are downloaded FIRST and their transitive dependencies ARE included.
          Examples:
            Microsoft.Maui.Controls
            ClosedXML@0.104.2
            OpenCvSharp4
            NAudio
            Microsoft.EntityFrameworkCore.SqlServer
            Microsoft.Data.SqlClient
        type: string
        default: |
          # MAUI / cross-platform
          Microsoft.Maui.Controls
          Microsoft.Maui.Essentials
          CommunityToolkit.Maui
          CommunityToolkit.Mvvm

          # Excel / Office files
          ClosedXML@0.104.2
          EPPlus
          NPOI
          DocumentFormat.OpenXml
          CsvHelper

          # Audio / Video
          NAudio
          FFMpegCore
          Xabe.FFmpeg

          # Computer Vision / OpenCV
          OpenCvSharp4
          OpenCvSharp4.runtime.win
          OpenCvSharp4.Extensions

          # Data access
          Microsoft.Data.SqlClient
          Microsoft.EntityFrameworkCore
          Microsoft.EntityFrameworkCore.SqlServer
          Dapper

          # Web / API
          Swashbuckle.AspNetCore
          Microsoft.Identity.Web
          Microsoft.Identity.Client
          Microsoft.Graph

          # Testing
          xunit
          xunit.runner.visualstudio
          Moq
          Bogus
          FluentAssertions

          # Logging / utilities
          Serilog
          Serilog.Sinks.Console
          Serilog.Sinks.File
          AutoMapper
          Newtonsoft.Json
          System.Text.Json

      search_term:
        description: 'Search term for top-packages (leave empty for overall most popular)'
        type: string
        default: ''
      max_size_gb:
        description: 'Maximum total folder size in GB (default 10)'
        type: string
        default: '10'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 600
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK (Visual Studio 2026 compatible)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workload (for mobile package restoration)
        run: dotnet workload install maui

      - name: Compute cache key
        id: cache-key
        shell: pwsh
        run: |
          $key = "nuget-offline-feed-v23-" +
            "search-${{ inputs.search_term }}" +
            "-maxGB-${{ inputs.max_size_gb }}"
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create output directory
        shell: pwsh
        run: |
          $feedDir = '${{ github.workspace }}\nuget_offline_packages'
          New-Item -ItemType Directory -Force -Path $feedDir | Out-Null
          echo "FEED_DIR=$feedDir" >> $env:GITHUB_ENV

      # ---------------------------------------------------------------
      # 1. PRIORITY PACKAGES (full restore)
      # ---------------------------------------------------------------
      - name: Download priority packages (with transitive dependencies)
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR
          $rawInput = @"
          ${{ inputs.priority_packages }}
          "@
          $lines = $rawInput -replace '\s+', "`n" -split "`n" |
                     Where-Object { $_ -ne '' -and $_ -notmatch '^#' }

          $projXml = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
          "@
          foreach ($line in $lines) {
            $trimmed = $line.Trim()
            if ($trimmed -match '@') {
              $parts = $trimmed -split '@', 2
              $projXml += "`n    <PackageReference Include=`"$($parts[0].Trim())`" Version=`"$($parts[1].Trim())`" />"
            } else {
              $projXml += "`n    <PackageReference Include=`"$trimmed`" Version=`"*`" />"
            }
          }
          $projXml += "`n    </ItemGroup>`n</Project>"

          $projPath = Join-Path $env:RUNNER_TEMP "PriorityRestore.csproj"
          $projXml | Out-File -FilePath $projPath -Encoding UTF8
          dotnet restore $projPath --packages $feedDir
          if ($LASTEXITCODE -ne 0) { throw "Priority restore failed" }
          Write-Host "Priority packages restored."

      # ---------------------------------------------------------------
      # 2. Initial size measurement
      # ---------------------------------------------------------------
      - name: Measure current feed size
        id: measure
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR
          $size = (Get-ChildItem -Path $feedDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $mb = [math]::Round($size / 1MB, 1)
          Write-Host "Feed size: $mb MB"
          echo "CURRENT_SIZE=$size" >> $env:GITHUB_ENV

      # ---------------------------------------------------------------
      # 3. TOP POPULAR PACKAGES (individual restore or download)
      # ---------------------------------------------------------------
      - name: Fetch and process top packages
        shell: pwsh
        timeout-minutes: 540
        run: |
          $feedDir = $env:FEED_DIR
          $maxSizeBytes = [double]${{ inputs.max_size_gb }} * 1GB
          $currentSize = [long]$env:CURRENT_SIZE

          # ---- collect package IDs from NuGet search API ----
          $searchTerm = "${{ inputs.search_term }}"
          $baseUrl = "https://azuresearch-usnc.nuget.org/query"
          $ids = [System.Collections.ArrayList]::new()
          $skip = 0
          do {
            $q = if ($searchTerm) { "q=$searchTerm" } else { "q=" }
            $uri = "$baseUrl`?$q&skip=$skip&take=100&prerelease=false&sortby=totalDownloads-desc"
            Write-Host "API: $uri"
            try { $resp = Invoke-RestMethod $uri -TimeoutSec 30 } catch { break }
            if (-not $resp.data -or $resp.data.Count -eq 0) { break }
            foreach ($hit in $resp.data) {
              if ($ids.Count -ge 2000) { break }
              $ids.Add($hit.id) | Out-Null
            }
            $skip += 100
          } while ($true -and $skip -lt 5000)

          if ($ids.Count -eq 0) { Write-Host "No top packages found." ; exit 0 }
          Write-Host "Fetched $($ids.Count) top package IDs."

          # ---- process each ID ----
          $totalProcessed = 0
          foreach ($id in $ids) {
            if ($currentSize -ge $maxSizeBytes) {
              Write-Host "Size limit reached. Stopping."
              break
            }

            Write-Host "--- Processing: $id ---"
            $tempCsproj = Join-Path $env:RUNNER_TEMP "temp_$([Guid]::NewGuid()).csproj"
            @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFrameworks>net10.0;net10.0-android;net10.0-ios;net10.0-maccatalyst</TargetFrameworks>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="$id" Version="*" />
            </ItemGroup>
          </Project>
          "@ | Out-File -FilePath $tempCsproj -Encoding UTF8

            $restoreSucceeded = $false
            try {
              dotnet restore $tempCsproj --packages $feedDir 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) { $restoreSucceeded = $true }
            } catch { $restoreSucceeded = $false }

            if (-not $restoreSucceeded) {
              Write-Host "Restore failed – downloading $id as standalone .nupkg"
              # Fallback: download only the package itself (no deps)
              dotnet package download $id --output $feedDir 2>&1 | Out-Null
            }

            # Recalculate size
            $currentSize = (Get-ChildItem -Path $feedDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
            $mb = [math]::Round($currentSize / 1MB, 1)
            Write-Host "Current feed size: $mb MB"
            $totalProcessed++
          }

          Write-Host "Top packages processed: $totalProcessed"
          echo "TOP_COUNT=$totalProcessed" >> $env:GITHUB_ENV

      # ---------------------------------------------------------------
      # 4. Package into ZIP
      # ---------------------------------------------------------------
      - name: Package offline feed into ZIP
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR
          $zipPath = "${{ runner.temp }}\NuGetOfflineFeed_${{ github.run_id }}.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
          Get-ChildItem -Path $feedDir -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Substring($feedDir.Length + 1)
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $rel, 'Optimal')
          }
          $zip.Dispose()
          Write-Host "ZIP size: $([math]::Round((Get-Item $zipPath).Length/1MB,1)) MB"
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      # ---------------------------------------------------------------
      # 5. Split and upload chunks (identical to VS 2026 workflow)
      # ---------------------------------------------------------------
      - name: Split zip and upload chunks
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = $env:ZIP_PATH
          if (-not $zip) { $zip = "$env:RUNNER_TEMP\NuGetOfflineFeed_${{ github.run_id }}.zip" }
          $chunks = "nuget_offline_chunks"
          New-Item -ItemType Directory -Force -Path $chunks | Out-Null
          $stream = [System.IO.File]::OpenRead($zip)
          $buffer = New-Object byte[] (20 * 1MB)
          $idx = 0
          while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
            [System.IO.File]::WriteAllBytes("$chunks\NuGetOfflineFeed.part{0:D4}" -f $idx, $buffer[0..($n-1)])
            $idx++
          }
          $stream.Close()
          Write-Host "Total chunks: $idx"

          $batContent = @"
          @echo off
          setlocal enabledelayedexpansion
          echo ========================================
          echo  Reassembling NuGet Offline Feed...
          echo ========================================
          echo.
          echo Combining NuGetOfflineFeed.part* into NuGetOfflineFeed.zip...
          copy /b NuGetOfflineFeed.part* NuGetOfflineFeed.zip
          if %errorlevel% equ 0 (
              echo.
              echo Successfully created NuGetOfflineFeed.zip
              echo.
              echo Deleting temporary parts...
              del NuGetOfflineFeed.part*
              echo Done! You can now extract NuGetOfflineFeed.zip
          ) else (
              echo.
              echo ERROR: Failed to reassemble the ZIP file.
              echo All parts are kept intact so you can retry.
          )
          echo.
          echo ========================================
          pause
          "@
          $batContent | Out-File "$chunks\reassemble.bat" -Encoding ASCII

          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $base = "https://api.github.com/repos/$repo/contents"
          $headers = @{ Authorization = "Bearer $token" }
          for ($i=0; $i -lt $idx; $i++) {
            $f = "$chunks\NuGetOfflineFeed.part{0:D4}" -f $i
            $bytes = [System.IO.File]::ReadAllBytes($f)
            $enc = [Convert]::ToBase64String($bytes)
            $url = "$base/$($f -replace '\\','/')"
            $sha = try { (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
            $body = @{message="Upload $([System.IO.Path]::GetFileName($f))"; content=$enc; branch=$branch}
            if ($sha) { $body.sha = $sha }
            $retry = 0; $ok = $false
            do {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress) -ContentType "application/json"
                Write-Host "[OK] Chunk $($i+1)/$idx"
                $ok = $true
              } catch {
                if ($retry -lt 2) { Start-Sleep -Seconds 10; $retry++ } else { throw }
              }
            } while (-not $ok)
            Start-Sleep -Milliseconds 500
          }
          $batBytes = [System.IO.File]::ReadAllBytes("$chunks\reassemble.bat")
          $batEnc = [Convert]::ToBase64String($batBytes)
          $batUrl = "$base/$chunks/reassemble.bat"
          $shaBat = try { (Invoke-RestMethod $batUrl -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
          $batBody = @{message="Upload reassemble.bat"; content=$batEnc; branch=$branch}
          if ($shaBat) { $batBody.sha = $shaBat }
          Invoke-RestMethod $batUrl -Method Put -Headers $headers -Body ($batBody | ConvertTo-Json -Compress)
          Write-Host "All chunks uploaded."
          
