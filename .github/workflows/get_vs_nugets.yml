# ==============================================================================
#  version: 2.2
#  Offline NuGet Feed Builder for Visual Studio 2026 Community
#  Downloads priority packages (with deps) + top popular packages (with deps)
#  up to a configurable total size, then splits and uploads the ZIP as chunks.
#  FIX: Robust parsing that works even when whitespace is collapsed.
# ==============================================================================

name: Download NuGet Packages Offline (Priority + Top by Downloads)

on:
  workflow_dispatch:
    inputs:
      priority_packages:
        description: |
          Priority packages – one per line (or separated by spaces).
          Optionally append @version (e.g. Newtonsoft.Json@13.0.3).
          These are downloaded FIRST and their transitive dependencies ARE included.
          Examples:
            Microsoft.Maui.Controls
            ClosedXML@0.104.2
            OpenCvSharp4
            NAudio
            Microsoft.EntityFrameworkCore.SqlServer
            Microsoft.Data.SqlClient
        type: string
        default: |
          # MAUI / cross-platform
          Microsoft.Maui.Controls
          Microsoft.Maui.Essentials
          CommunityToolkit.Maui
          CommunityToolkit.Mvvm

          # Excel / Office files
          ClosedXML@0.104.2
          EPPlus
          NPOI
          DocumentFormat.OpenXml
          CsvHelper

          # Audio / Video
          NAudio
          FFMpegCore
          Xabe.FFmpeg

          # Computer Vision / OpenCV
          OpenCvSharp4
          OpenCvSharp4.runtime.win
          OpenCvSharp4.Extensions

          # Data access
          Microsoft.Data.SqlClient
          Microsoft.EntityFrameworkCore
          Microsoft.EntityFrameworkCore.SqlServer
          Dapper

          # Web / API
          Swashbuckle.AspNetCore
          Microsoft.Identity.Web
          Microsoft.Identity.Client
          Microsoft.Graph

          # Testing
          xunit
          xunit.runner.visualstudio
          Moq
          Bogus
          FluentAssertions

          # Logging / utilities
          Serilog
          Serilog.Sinks.Console
          Serilog.Sinks.File
          AutoMapper
          Newtonsoft.Json
          System.Text.Json

      search_term:
        description: 'Search term for top-packages (leave empty for overall most popular)'
        type: string
        default: ''
      max_size_gb:
        description: 'Maximum total folder size in GB (default 10)'
        type: string
        default: '10'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 600            # 10 hours – sufficient for a 10 GB feed
    permissions:
      contents: write
    steps:
      # ----------------------------------------------------------------
      # 1. Checkout & setup
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK (Visual Studio 2026 compatible)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'    # .NET 10 = VS 2026

      - name: Compute cache key
        id: cache-key
        shell: pwsh
        run: |
          $key = "nuget-offline-feed-v22-" +
            "search-${{ inputs.search_term }}" +
            "-maxGB-${{ inputs.max_size_gb }}"
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ----------------------------------------------------------------
      # 2. Create the offline folder
      # ----------------------------------------------------------------
      - name: Create output directory
        shell: pwsh
        run: |
          $feedDir = '${{ github.workspace }}\nuget_offline_packages'
          New-Item -ItemType Directory -Force -Path $feedDir | Out-Null
          echo "FEED_DIR=$feedDir" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # 3. Download PRIORITY packages (with transitive dependencies)
      # ----------------------------------------------------------------
      - name: Download priority packages (with transitive dependencies)
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR

          # Get the raw input – it may have lost its line breaks
          $rawInput = @"
          ${{ inputs.priority_packages }}
          "@

          # Convert ALL whitespace (spaces, tabs, newlines) into newlines,
          # then split by newline to obtain one token per line.
          $lines = $rawInput -replace '\s+', "`n" -split "`n" |
                     Where-Object { $_ -ne '' -and $_ -notmatch '^#' }

          $packageRefs = 0
          $projXml = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
          "@

          foreach ($line in $lines) {
            $trimmed = $line.Trim()
            if ($trimmed -match '@') {
              $parts = $trimmed -split '@', 2
              $projXml += "`n    <PackageReference Include=`"$($parts[0].Trim())`" Version=`"$($parts[1].Trim())`" />"
            } else {
              $projXml += "`n    <PackageReference Include=`"$trimmed`" Version=`"*`" />"
            }
            $packageRefs++
          }

          $projXml += @"
          `n    </ItemGroup>
          </Project>
          "@

          if ($packageRefs -eq 0) {
            Write-Host "No priority packages found – skipping."
            exit 0
          }

          Write-Host "Priority packages detected: $packageRefs"
          $projPath = Join-Path $env:RUNNER_TEMP "RestoreProject.csproj"
          $projXml | Out-File -FilePath $projPath -Encoding UTF8

          Write-Host "Restoring packages (including transitive dependencies) ..."
          dotnet restore $projPath --packages $feedDir
          if ($LASTEXITCODE -ne 0) {
            Write-Error "dotnet restore failed for priority packages"
            exit $LASTEXITCODE
          }
          Write-Host "Priority packages downloaded to $feedDir"

      # ----------------------------------------------------------------
      # 4. Calculate initial folder size
      # ----------------------------------------------------------------
      - name: Calculate initial feed size
        id: initial-size
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR
          $sizeBytes = (Get-ChildItem -Path $feedDir -Recurse -File |
                        Measure-Object -Property Length -Sum).Sum
          $sizeMB = [math]::Round($sizeBytes / 1MB, 1)
          $sizeGB = [math]::Round($sizeBytes / 1GB, 2)
          Write-Host "Current feed size: $sizeMB MB ($sizeGB GB)"
          echo "CURRENT_SIZE=$sizeBytes" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # 5. Fetch and download TOP packages (with transitive dependencies)
      # ----------------------------------------------------------------
      - name: Fetch and download top packages from NuGet API (with dependencies)
        shell: pwsh
        timeout-minutes: 540
        run: |
          $feedDir = $env:FEED_DIR
          $searchTerm = "${{ inputs.search_term }}"
          $maxSizeGB = [double]"${{ inputs.max_size_gb }}"
          $maxSizeBytes = $maxSizeGB * 1GB

          # Fetch all matching package IDs from the NuGet search API
          $baseUrl = "https://azuresearch-usnc.nuget.org/query"
          $skip = 0
          $take = 100
          $pkgIds = [System.Collections.ArrayList]::new()
          do {
            $queryParam = if ($searchTerm) { "q=$searchTerm" } else { "q=" }
            $uri = "$baseUrl`?$queryParam&skip=$skip&take=$take&prerelease=false&sortby=totalDownloads-desc"
            Write-Host "Querying: $uri"
            try {
              $response = Invoke-RestMethod -Uri $uri -Method Get -TimeoutSec 30
            } catch {
              Write-Warning "API call failed: $_"
              break
            }
            $hits = $response.data
            if (-not $hits -or $hits.Count -eq 0) { break }
            foreach ($hit in $hits) {
              if ($pkgIds.Count -ge 2000) { break }  # safety cap
              $pkgIds.Add($hit.id) | Out-Null
            }
            $skip += $take
            Write-Host "Collected $($pkgIds.Count) package IDs so far..."
          } while ($hits.Count -gt 0 -and $skip -lt 5000)

          if ($pkgIds.Count -eq 0) {
            Write-Host "No top packages returned – nothing to download."
            exit 0
          }

          Write-Host "Creating restore project for $($pkgIds.Count) packages..."

          # Build a temporary .csproj that references all collected packages
          $projXml = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
          "@
          foreach ($id in $pkgIds) {
            $projXml += "`n    <PackageReference Include=`"$id`" Version=`"*`" />"
          }
          $projXml += @"
          `n    </ItemGroup>
          </Project>
          "@
          $projPath = Join-Path $env:RUNNER_TEMP "TopPackagesRestore.csproj"
          $projXml | Out-File -FilePath $projPath -Encoding UTF8

          # Restore everything – all transitive dependencies will be pulled in
          $sizeBefore = (Get-ChildItem -Path $feedDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          dotnet restore $projPath --packages $feedDir
          if ($LASTEXITCODE -ne 0) {
            Write-Error "dotnet restore failed for top packages"
            exit $LASTEXITCODE
          }

          $sizeAfter = (Get-ChildItem -Path $feedDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $addedSizeMB = [math]::Round(($sizeAfter - $sizeBefore) / 1MB, 1)
          Write-Host "Restore added approximately $addedSizeMB MB to the feed."

          $totalSizeMB = [math]::Round($sizeAfter / 1MB, 1)
          $totalSizeGB = [math]::Round($sizeAfter / 1GB, 2)
          Write-Host "Current total feed size: $totalSizeMB MB ($totalSizeGB GB)"
          if ($sizeAfter -gt $maxSizeBytes) {
            Write-Warning "Feed size ($totalSizeGB GB) now exceeds the limit of $maxSizeGB GB."
            Write-Warning "You may want to reduce the number of top packages or increase the limit."
          }

          echo "TOP_PACKAGES_COUNT=$($pkgIds.Count)" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # 6. Package everything into a ZIP
      # ----------------------------------------------------------------
      - name: Package offline feed into ZIP
        shell: pwsh
        run: |
          $feedDir = $env:FEED_DIR
          $zipPath = "${{ runner.temp }}\NuGetOfflineFeed_${{ github.run_id }}.zip"

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
          Get-ChildItem -Path $feedDir -Recurse -File | ForEach-Object {
            $relativePath = $_.FullName.Substring($feedDir.Length + 1)
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $relativePath, 'Optimal')
          }
          $zip.Dispose()

          $zipSizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          Write-Host "ZIP created: $zipSizeMB MB"
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      # ----------------------------------------------------------------
      # 7. Split and upload chunks (exact same mechanism as VS 2026 workflow)
      # ----------------------------------------------------------------
      - name: Split zip and upload chunks
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = $env:ZIP_PATH
          if (-not $zip) { $zip = "$env:RUNNER_TEMP\NuGetOfflineFeed_${{ github.run_id }}.zip" }

          $chunks = "nuget_offline_chunks"
          New-Item -ItemType Directory -Force -Path $chunks | Out-Null

          $stream = [System.IO.File]::OpenRead($zip)
          $buffer = New-Object byte[] (20 * 1MB)
          $idx = 0
          while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
            [System.IO.File]::WriteAllBytes("$chunks\NuGetOfflineFeed.part{0:D4}" -f $idx, $buffer[0..($n-1)])
            $idx++
          }
          $stream.Close()
          $totalChunks = $idx
          Write-Host "Total chunks to upload: $totalChunks"

          # Smart reassemble.bat
          $batContent = @"
          @echo off
          setlocal enabledelayedexpansion
          echo ========================================
          echo  Reassembling NuGet Offline Feed...
          echo ========================================
          echo.
          echo Combining NuGetOfflineFeed.part* into NuGetOfflineFeed.zip...
          copy /b NuGetOfflineFeed.part* NuGetOfflineFeed.zip
          if %errorlevel% equ 0 (
              echo.
              echo Successfully created NuGetOfflineFeed.zip
              echo.
              echo Deleting temporary parts...
              del NuGetOfflineFeed.part*
              echo Done! You can now extract NuGetOfflineFeed.zip
          ) else (
              echo.
              echo ERROR: Failed to reassemble the ZIP file.
              echo All parts are kept intact so you can retry.
          )
          echo.
          echo ========================================
          pause
          "@
          $batContent | Out-File "$chunks\reassemble.bat" -Encoding ASCII

          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $base = "https://api.github.com/repos/$repo/contents"
          $headers = @{ Authorization = "Bearer $token" }
          $maxRetries = 3

          for ($i=0; $i -lt $totalChunks; $i++) {
            $f = "$chunks\NuGetOfflineFeed.part{0:D4}" -f $i
            $bytes = [System.IO.File]::ReadAllBytes($f)
            $enc = [Convert]::ToBase64String($bytes)
            $url = "$base/$($f -replace '\\','/')"
            $sha = try { (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
            $body = @{message="Upload $([System.IO.Path]::GetFileName($f))"; content=$enc; branch=$branch}
            if ($sha) { $body.sha = $sha }
            $success = $false
            for ($retry=0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress) -ContentType "application/json"
                Write-Host "[OK] Uploaded chunk $($i+1) of $totalChunks"
                $success = $true
                break
              } catch {
                if ($retry -lt $maxRetries-1) {
                  Write-Host "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Error "Failed to upload chunk $f after $maxRetries attempts"
                  exit 1
                }
              }
            }
            if (-not $success) { exit 1 }
            Start-Sleep -Milliseconds 500
          }

          # Upload reassemble.bat
          $batPath = "$chunks\reassemble.bat"
          $bytes = [System.IO.File]::ReadAllBytes($batPath)
          $enc = [Convert]::ToBase64String($bytes)
          $url = "$base/$chunks/reassemble.bat"
          $sha = try { (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
          $body = @{message="Upload reassemble.bat"; content=$enc; branch=$branch}
          if ($sha) { $body.sha = $sha }
          Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress) -ContentType "application/json"
          Write-Host "All chunks plus reassemble.bat uploaded successfully to folder: $chunks"
