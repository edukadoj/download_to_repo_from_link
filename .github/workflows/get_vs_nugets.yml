name: Download NuGet Packages Offline (Custom List)

on:
  workflow_dispatch:
    inputs:
      packages_list:
        description: |
          List of NuGet packages to download.
          Enter one package per line.
          Optionally append --version <number> or other dotnet package download arguments.
          Example:
            Newtonsoft.Json
            Microsoft.Extensions.Logging --version 8.0.0
        type: string
        default: |
          Newtonsoft.Json
          Microsoft.Extensions.Logging
          Microsoft.Extensions.DependencyInjection
          Microsoft.Data.SqlClient
          Microsoft.EntityFrameworkCore
          Microsoft.EntityFrameworkCore.SqlServer
          System.Text.Json
          Serilog
          Serilog.Sinks.Console
          xunit
          Moq
          # Add your own packages below
      # Uncomment to schedule this workflow
      # schedule:
      #   - cron: '0 0 1 */3 *'   # every 3 months

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 300   # large lists may take time
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'   # change to 8.x/9.x as needed

      - name: Parse package list and download
        shell: pwsh
        run: |
          $outputDir = "${{ github.workspace }}\nuget_offline_packages"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          # Read the multiline input, split into lines
          $inputText = @"
          ${{ inputs.packages_list }}
          "@
          $lines = $inputText -split "`r`n|`n"
          $count = 0
          foreach ($line in $lines) {
            $trimmed = $line.Trim()
            if ([string]::IsNullOrEmpty($trimmed) -or $trimmed.StartsWith('#')) { continue }
            Write-Host "Downloading: $trimmed"
            dotnet package download $trimmed --output $outputDir
            $count++
          }
          Write-Host "Downloaded $count packages to $outputDir"

      - name: Package offline feed into ZIP
        shell: pwsh
        run: |
          $srcDir = "${{ github.workspace }}\nuget_offline_packages"
          $zipPath = "${{ runner.temp }}\NuGetOfflineFeed.zip"
          
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
          
          Get-ChildItem -Path $srcDir -Recurse -File | ForEach-Object {
            $relativePath = $_.FullName.Substring($srcDir.Length + 1)
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $relativePath, 'Optimal')
          }
          $zip.Dispose()
          
          Write-Host "Zip size: $((Get-Item $zipPath).Length / 1MB) MB"
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Upload offline feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: NuGetOfflineFeed
          path: ${{ env.ZIP_PATH }}
          retention-days: 7
