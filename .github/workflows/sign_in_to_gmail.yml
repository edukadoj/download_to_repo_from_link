# version 10.0 – Fully separated stages, persistent logs, explicit WARP connect
name: Gmail Sign-In & Fetch (Robust Multi-Stage)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Install Chrome + Python libs
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      # ----------------------------------------------------------------
      # Setup Cloudflare WARP (with explicit connect)
      # ----------------------------------------------------------------
      - name: Setup Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: Force WARP connection & verify
        run: |
          warp-cli connect
          sleep 5
          echo "WARP status:"
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP should be active."

      # ================================================================
      # Stage 1: Enter email
      # ================================================================
      - name: Stage 1 – Enter email
        run: |
          python3 << 'PYEOF'
          import os, pickle, sys
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 1: Enter email ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              opts.add_argument("--window-size=1920,1080")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              wait = WebDriverWait(driver, 20)

              driver.get("https://accounts.google.com/signin")
              email_el = wait.until(EC.presence_of_element_located((By.ID, "identifierId")))
              email_el.send_keys(os.environ["EMAIL"])
              driver.find_element(By.ID, "identifierNext").click()
              # Wait for password page
              wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
              # Save cookies
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)
              with open(log_file, "a") as lf:
                  lf.write("Email submitted, password field visible.\n")
              print("Stage 1 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 1 FAILED: {e}\n")
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 1)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log
          git diff --cached --quiet || git commit -m "Stage 1 log"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      # ================================================================
      # Stage 2: Enter password
      # ================================================================
      - name: Stage 2 – Enter password
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 2: Enter password ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              # Load cookies & URL
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  url = f.read().strip()
              driver.get(url)
              for c in cookies:
                  driver.add_cookie(c)
              driver.get(url)
              wait = WebDriverWait(driver, 20)
              pwd = wait.until(EC.element_to_be_clickable((By.CSS_SELECTOR, "input[type='password']")))
              pwd.send_keys(os.environ["PASS"])
              driver.find_element(By.ID, "passwordNext").click()
              time.sleep(4)
              # Now should be at 2FA page – save state
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)
              with open(log_file, "a") as lf:
                  lf.write("Password submitted, reached 2FA page.\n")
              print("Stage 2 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 2 FAILED: {e}\n")
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 2)
        if: always()
        run: |
          git add gmail_yml.log
          git diff --cached --quiet || git commit -m "Stage 2 log"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      # ================================================================
      # Stage 3: Select "security code" method
      # ================================================================
      - name: Stage 3 – Select security code method
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 3: Select code method ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  url = f.read().strip()
              driver.get(url)
              for c in cookies:
                  driver.add_cookie(c)
              driver.get(url)
              time.sleep(2)
              # Try "Try another way"
              try:
                  btn = driver.find_element(By.XPATH, "//button[contains(.,'Try another way') or contains(.,'More options')]")
                  btn.click()
                  time.sleep(2)
                  with open(log_file, "a") as lf:
                      lf.write("Clicked 'Try another way'.\n")
              except:
                  pass
              # Click the code option
              selectors = [
                  "//div[@data-challengetype='12']",
                  "//div[@data-challengetype='13']",
                  "//span[contains(text(),'security code')]",
                  "//span[contains(text(),'Backup code')]",
                  "//div[@role='link' and contains(.,'code')]"
              ]
              clicked = False
              for sel in selectors:
                  try:
                      elem = driver.find_element(By.XPATH, sel)
                      elem.click()
                      time.sleep(2)
                      with open(log_file, "a") as lf:
                          lf.write(f"Selected code option: {sel}\n")
                      clicked = True
                      break
                  except:
                      continue
              if not clicked:
                  with open(log_file, "a") as lf:
                      lf.write("No clickable option found; assuming input visible.\n")
              # Save state
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)
              with open(log_file, "a") as lf:
                  lf.write("Stage 3 complete.\n")
              print("Stage 3 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 3 FAILED: {e}\n")
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 3)
        if: always()
        run: |
          git add gmail_yml.log
          git diff --cached --quiet || git commit -m "Stage 3 log"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      # ================================================================
      # Stage 4: Poll for encoded security code
      # ================================================================
      - name: Stage 4 – Wait for security code
        run: |
          python3 << 'PYEOF'
          import os, hashlib, struct, random, re, time, requests

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 4: Poll for encoded code ===\n")
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev = {v: k for k, v in enumerate(digits)}
          def decode_10(s):
              return ''.join(str(rev[int(c)]) for c in s)

          raw_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_REPOSITORY']}/main/bestlog.txt"
          last_mod = None
          decoded = None
          while not decoded:
              time.sleep(10)
              try:
                  head = requests.head(raw_url, timeout=10)
                  new_mod = head.headers.get("Last-Modified")
                  if new_mod and new_mod == last_mod:
                      continue
                  resp = requests.get(raw_url, timeout=10)
                  if resp.status_code == 200:
                      nums = re.findall(r'\d', resp.text)
                      if len(nums) >= 10:
                          encoded = ''.join(nums[:10])
                          decoded = decode_10(encoded)
                          with open(log_file, "a") as lf:
                              lf.write(f"Encoded digits found: {encoded}, decoded.\n")
                          break
                  last_mod = new_mod
              except Exception as e:
                  with open(log_file, "a") as lf:
                      lf.write(f"Poll error: {e}\n")
          with open("decoded_code.txt", "w") as f:
              f.write(decoded)
          with open(log_file, "a") as lf:
              lf.write("Code saved.\n")
          print("Stage 4 success.")
          PYEOF

      - name: Commit logs (Stage 4)
        if: always()
        run: |
          git add gmail_yml.log decoded_code.txt
          git diff --cached --quiet || git commit -m "Stage 4 log"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      # ================================================================
      # Stage 5: Enter security code
      # ================================================================
      - name: Stage 5 – Enter security code
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 5: Enter security code ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  url = f.read().strip()
              with open("decoded_code.txt") as f:
                  code = f.read().strip()
              driver.get(url)
              for c in cookies:
                  driver.add_cookie(c)
              driver.get(url)
              time.sleep(2)
              # Find code input
              code_input = None
              for fid in ["idvPin", "totpPin", "idvPreregisteredPhonePin", "backupCode"]:
                  try:
                      code_input = driver.find_element(By.ID, fid)
                      if code_input.is_displayed():
                          break
                  except:
                      continue
              if not code_input:
                  inputs = driver.find_elements(By.CSS_SELECTOR, "input[type='text'], input[type='tel']")
                  for inp in inputs:
                      if inp.is_displayed():
                          code_input = inp
                          break
              if code_input:
                  code_input.send_keys(code)
                  driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]").click()
                  time.sleep(5)
                  # Wait for inbox
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  with open(log_file, "a") as lf:
                      lf.write("Security code accepted, reached inbox.\n")
                  with open("cookies.pkl", "wb") as f:
                      pickle.dump(driver.get_cookies(), f)
                  with open("url.txt", "w") as f:
                      f.write(driver.current_url)
              else:
                  raise Exception("Code input field not found.")
              with open(log_file, "a") as lf:
                  lf.write("Stage 5 success.\n")
              print("Stage 5 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 5 FAILED: {e}\n")
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 5)
        if: always()
        run: |
          git add gmail_yml.log
          git diff --cached --quiet || git commit -m "Stage 5 log"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      # ================================================================
      # Stage 6: Fetch last two emails
      # ================================================================
      - name: Stage 6 – Fetch emails
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 6: Fetch emails ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  url = f.read().strip()
              driver.get(url)
              for c in cookies:
                  driver.add_cookie(c)
              driver.get("https://mail.google.com/mail/u/0/#inbox")
              WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
              time.sleep(4)
              rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
              with open(log_file, "a") as lf:
                  lf.write(f"Found {len(rows)} emails.\n")
              email_texts = []
              for i, row in enumerate(rows, 1):
                  row.click()
                  time.sleep(4)
                  try:
                      body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                      content = body.text
                  except:
                      content = driver.find_element(By.TAG_NAME, "body").text
                  email_texts.append(content)
                  with open(log_file, "a") as lf:
                      lf.write(f"Email {i} length: {len(content)}\n")
                  driver.get("https://mail.google.com/mail/u/0/#inbox")
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  time.sleep(4)
              with open("email.txt", "w", encoding="utf-8") as f:
                  f.write("--- Last two emails ---\n\n")
                  for i, txt in enumerate(email_texts, 1):
                      f.write(f"=== Email {i} ===\n{txt}\n\n")
              with open(log_file, "a") as lf:
                  lf.write("Email.txt saved.\n")
              print("Stage 6 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 6 FAILED: {e}\n")
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs & emails (final)
        if: always()
        run: |
          git add gmail_yml.log email.txt
          git diff --cached --quiet || git commit -m "Final logs and emails"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
