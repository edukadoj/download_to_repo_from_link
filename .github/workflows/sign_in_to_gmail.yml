# version 5.0 – sign in, poll for 2FA, fetch last 2 emails, save to repo
name: Gmail Sign‑In + Fetch Emails

on: workflow_dispatch

jobs:
  signin-and-fetch:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}               # "nHsjknhwknh"
      GH_PAT: ${{ secrets.GH_PAT }}         # PAT with repo write access
    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome & Python deps
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      - name: Sign in, wait for 2FA code, fetch last two emails
        run: |
          python3 << 'PYEOF'
          import os, time, hashlib, struct, random, re
          import requests
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options

          # --- Deterministic reverse digit mapping (matches C# encoder) ---
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev = {v: k for k, v in enumerate(digits)}

          # --- Launch headless Chrome ---
          opts = Options()
          opts.add_argument("--headless")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--disable-blink-features=AutomationControlled")
          driver = webdriver.Chrome(options=opts)

          # --- Gmail login: email + password ---
          driver.get("https://accounts.google.com/signin")
          time.sleep(2)
          driver.find_element(By.ID, "identifierId").send_keys(os.environ["EMAIL"])
          driver.find_element(By.ID, "identifierNext").click()
          time.sleep(3)
          driver.find_element(By.NAME, "password").send_keys(os.environ["PASS"])
          driver.find_element(By.ID, "passwordNext").click()
          time.sleep(5)

          # --- Poll bestlog.txt for encoded 2FA code ---
          raw_url = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/bestlog.txt"
          last_mod = None
          try:
              resp = requests.head(raw_url, timeout=10)
              last_mod = resp.headers.get("Last-Modified")
          except:
              pass

          def extract_digits(text):
              nums = re.findall(r'\d', text)
              return ''.join(nums[:10]) if len(nums) >= 10 else None

          decoded_code = None
          while not decoded_code:
              print("[*] Waiting for updated bestlog.txt (polling every 10s)...")
              time.sleep(10)
              try:
                  new_resp = requests.head(raw_url, timeout=10)
                  new_mod = new_resp.headers.get("Last-Modified")
                  if new_mod and new_mod == last_mod:
                      continue
                  resp = requests.get(raw_url, timeout=10)
                  if resp.status_code == 200:
                      code_digits = extract_digits(resp.text)
                      if code_digits and len(code_digits) == 10:
                          decoded = ''.join(str(rev[int(c)]) for c in code_digits)
                          decoded_code = decoded
                          break
                      else:
                          last_mod = new_mod
              except Exception as e:
                  print(f"[!] Polling error: {e}")

          # --- Enter security code ---
          try:
              driver.find_element(By.ID, "idvPin").send_keys(decoded_code)
              driver.find_element(By.ID, "idvPreregisteredPhoneNext").click()
          except:
              inputs = driver.find_elements(By.TAG_NAME, "input")
              for inp in inputs:
                  if inp.get_attribute("type") in ("text", "tel"):
                      inp.send_keys(decoded_code)
                      break
              driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]").click()
          time.sleep(10)

          # --- Open Gmail inbox and fetch last 2 emails ---
          driver.get("https://mail.google.com/mail/u/0/#inbox")
          time.sleep(8)

          email_texts = []
          # Find rows of the first two emails (the newest are at the top)
          rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
          for row in rows:
              row.click()
              time.sleep(4)
              # The email content is inside an iframe or a div with class "a3s"
              # We'll try the main body first
              try:
                  body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                  email_texts.append(body.text)
              except:
                  # fallback: grab whole page text (crude)
                  email_texts.append(driver.find_element(By.TAG_NAME, "body").text)
              # Go back to inbox
              driver.get("https://mail.google.com/mail/u/0/#inbox")
              time.sleep(4)

          # Write to email.txt
          with open("email.txt", "w", encoding="utf-8") as f:
              f.write("--- Last two emails ---\n\n")
              for i, txt in enumerate(email_texts, 1):
                  f.write(f"Email {i}:\n{txt}\n\n")

          driver.quit()
          print("[*] email.txt created.")
          PYEOF

      - name: Commit and push email.txt to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email.txt
          git commit -m "Update email.txt with last two emails" || echo "No changes to commit"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
