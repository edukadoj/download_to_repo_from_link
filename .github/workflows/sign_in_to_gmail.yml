# version 24.0 – Fixed push_now, success screenshots, default token
name: Gmail Sign-In & Fetch (Multi-Stage, No WARP)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for git push
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      # ----------------------------------------------------------------
      # Stage 1: Enter email (FIXED push_now + success screenshot)
      # ----------------------------------------------------------------
      - name: Stage 1 – Enter email
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess, glob
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.action_chains import ActionChains
          from selenium.common.exceptions import ElementNotInteractableException

          def push_now(*files):
              """Add and push only files that actually exist."""
              existing = [f for f in files if os.path.exists(f)]
              if not existing:
                  print("No files to push.")
                  return
              subprocess.run(["git", "add"] + existing, check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage 1 - {existing[0]}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 1: Enter email (v24) ===\n")

          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              opts.add_argument("--window-size=1920,1080")
              opts.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
              opts.add_experimental_option("excludeSwitches", ["enable-automation"])
              opts.add_experimental_option('useAutomationExtension', False)

              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              wait = WebDriverWait(driver, 30)

              driver.get("https://accounts.google.com/signin")
              time.sleep(5)

              try:
                  action = ActionChains(driver)
                  action.move_by_offset(100, 200).perform()
                  time.sleep(0.5)
              except:
                  pass

              email_field = None
              for selector in [(By.ID, "identifierId"),
                               (By.CSS_SELECTOR, "input[type='email']"),
                               (By.CSS_SELECTOR, "input[name='identifier']"),
                               (By.XPATH, "//input[@type='email' or @name='identifier']")]:
                  try:
                      elem = driver.find_element(*selector)
                      if elem.is_displayed():
                          email_field = elem
                          break
                  except:
                      continue

              if not email_field:
                  driver.execute_script("document.querySelector('input[type=\"email\"], input[name=\"identifier\"]').focus();")
                  time.sleep(1)
                  email_field = driver.switch_to.active_element
                  if not email_field or email_field.tag_name != "input":
                      email_field = None

              if not email_field:
                  raise Exception("Could not locate email input field.")

              try:
                  email_field.clear()
                  email_field.send_keys(os.environ["EMAIL"])
              except ElementNotInteractableException:
                  driver.execute_script("arguments[0].value = arguments[1];", email_field, os.environ["EMAIL"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", email_field)
                  driver.execute_script("arguments[0].dispatchEvent(new Event('change', { bubbles: true }));", email_field)

              next_btn = driver.find_element(By.ID, "identifierNext")
              next_btn.click()

              wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
              with open(log_file, "a") as lf:
                  lf.write("Email submitted, password field visible.\n")

              # Save a success screenshot
              driver.save_screenshot("stage1_password_page.png")

              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              print("Stage 1 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 1 FAILED: {e}\n")
              try:
                  driver.save_screenshot("Stage1_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
              # Push log + any screenshots (failure or success)
              push_now("gmail_yml.log", "stage1_password_page.png", "Stage1_failure.png")
          PYEOF

      # ----------------------------------------------------------------
      # Stage 2: Enter password (using same robust push_now)
      # ----------------------------------------------------------------
      - name: Stage 2 – Enter password
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException, TimeoutException

          def push_now(*files):
              existing = [f for f in files if os.path.exists(f)]
              if not existing:
                  print("No files to push.")
                  return
              subprocess.run(["git", "add"] + existing, check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage 2 - {existing[0]}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          def log(msg):
              with open(log_file, "a") as lf:
                  lf.write(msg + "\n")
              print(msg)

          log("=== Stage 2: Enter password (v24) ===")

          driver = None
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              # Load state
              log("Loading cookies and navigating to saved URL")
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()
              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except Exception as e:
                      log(f"Skipping cookie {c.get('name')}: {e}")
              driver.get(saved_url)
              time.sleep(2)
              driver.save_screenshot("stage2_loaded.png")
              push_now("stage2_loaded.png", "gmail_yml.log")
              log("Pushed stage2_loaded.png")

              # Wait for password field
              wait = WebDriverWait(driver, 20)
              try:
                  password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  log("Password field present.")
              except:
                  log("Password field not present; checking for Welcome screen.")
                  try:
                      driver.find_element(By.XPATH, "//div[contains(text(),'Welcome')]")
                      driver.find_element(By.XPATH, "//button[contains(.,'Next')]").click()
                      time.sleep(2)
                      password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                      log("Moved past Welcome screen.")
                  except:
                      driver.save_screenshot("stage2_no_password_field.png")
                      push_now("stage2_no_password_field.png", "gmail_yml.log")
                      raise Exception("Could not find password input field.")

              # Enter password
              try:
                  password_field.clear()
                  password_field.send_keys(os.environ["PASS"])
                  log("Password entered normally.")
              except ElementNotInteractableException:
                  log("Password field not interactable. Setting value via JavaScript.")
                  driver.execute_script("arguments[0].value = arguments[1];", password_field, os.environ["PASS"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", password_field)
                  driver.execute_script("arguments[0].dispatchEvent(new Event('change', { bubbles: true }));", password_field)
                  log("Password set via JS.")

              # Click Next
              log("Looking for Next button...")
              next_btn = None
              selectors = [
                  (By.ID, "passwordNext"),
                  (By.XPATH, "//button[contains(.,'Next')]"),
                  (By.XPATH, "//button[contains(.,'Submit')]"),
                  (By.XPATH, "//*[@id='passwordNext']")
              ]
              for method, sel in selectors:
                  try:
                      next_btn = driver.find_element(method, sel)
                      if next_btn.is_displayed() and next_btn.is_enabled():
                          break
                      else:
                          next_btn = None
                  except:
                      continue

              if next_btn:
                  next_btn.click()
                  log("Clicked Next button.")
              else:
                  log("No Next button found. Pressing Enter.")
                  password_field.send_keys(Keys.RETURN)

              time.sleep(4)
              # Save page after submission
              driver.save_screenshot("stage2_after_submit.png")
              with open("stage2_page_source.txt", "w", encoding="utf-8") as f:
                  f.write(driver.page_source[:3000])
              push_now("stage2_after_submit.png", "stage2_page_source.txt", "gmail_yml.log")
              log("Pushed after-submit screenshot and page source.")

              # Check for error messages
              log("Checking for login errors...")
              error_msgs = []
              error_selectors = [
                  "//div[contains(@class, 'o6cuMc')]",
                  "//span[contains(text(),'Wrong password')]",
                  "//span[contains(text(),'Try again')]",
                  "//div[contains(text(),'CAPTCHA')]",
                  "//div[contains(text(),'unusual activity')]",
                  "//div[contains(text(),'verify')]"
              ]
              for sel in error_selectors:
                  try:
                      el = driver.find_element(By.XPATH, sel)
                      if el.is_displayed():
                          error_msgs.append(el.text)
                  except:
                      pass
              if error_msgs:
                  error_text = ' '.join(error_msgs)
                  log(f"ERROR: Google displayed message: {error_text}")
                  with open("stage2_error_info.txt", "w") as f:
                      f.write(f"Error messages: {error_text}\nURL: {driver.current_url}\n")
                  driver.save_screenshot("stage2_error.png")
                  push_now("stage2_error.png", "stage2_error_info.txt", "gmail_yml.log")
                  raise Exception(f"Login error: {error_text}")
              else:
                  log("No explicit error messages found.")

              # Verify 2FA page
              log("Verifying 2FA page...")
              try:
                  WebDriverWait(driver, 15).until(
                      EC.any_of(
                          EC.presence_of_element_located((By.ID, "idvPin")),
                          EC.presence_of_element_located((By.XPATH, "//button[contains(.,'Try another way')]")),
                          EC.presence_of_element_located((By.XPATH, "//div[@data-challengetype]"))
                      )
                  )
                  log("2FA page detected.")
              except TimeoutException:
                  if "identifier" in driver.current_url:
                      driver.save_screenshot("stage2_still_login.png")
                      push_now("stage2_still_login.png", "gmail_yml.log")
                      raise Exception("Still on sign-in page after password – likely wrong password or CAPTCHA, see screenshots.")
                  else:
                      driver.save_screenshot("stage2_not_2fa.png")
                      push_now("stage2_not_2fa.png", "gmail_yml.log")
                      raise Exception("Failed to reach 2FA page – unexpected page.")

              # Save state
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              log("Stage 2 success.")
              print("Stage 2 success.")
          except Exception as e:
              log(f"Stage 2 FAILED: {e}")
              try:
                  driver.save_screenshot("Stage2_failure.png")
                  push_now("Stage2_failure.png", "gmail_yml.log")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # (Stages 3-6 are identical to previous versions but use the fixed push_now; 
      #  they are omitted here for brevity. They can be added exactly as before,
      #  just replace their push_now definitions with the fixed version.)
