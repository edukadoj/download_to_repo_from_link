# version 18.0 – Stage‑2 fix: inject password via JS if not interactable
name: Gmail Sign-In & Fetch (Multi-Stage, No WARP)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      # ----------------------------------------------------------------
      # Stage 1: Enter email (unchanged)
      # ----------------------------------------------------------------
      - name: Stage 1 – Enter email
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.action_chains import ActionChains
          from selenium.common.exceptions import ElementNotInteractableException

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 1: Enter email (v18) ===\n")

          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              opts.add_argument("--window-size=1920,1080")
              opts.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
              opts.add_experimental_option("excludeSwitches", ["enable-automation"])
              opts.add_experimental_option('useAutomationExtension', False)

              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              wait = WebDriverWait(driver, 30)

              driver.get("https://accounts.google.com/signin")
              time.sleep(5)

              try:
                  action = ActionChains(driver)
                  action.move_by_offset(100, 200).perform()
                  time.sleep(0.5)
              except:
                  pass

              email_field = None
              for selector in [(By.ID, "identifierId"),
                               (By.CSS_SELECTOR, "input[type='email']"),
                               (By.CSS_SELECTOR, "input[name='identifier']"),
                               (By.XPATH, "//input[@type='email' or @name='identifier']")]:
                  try:
                      elem = driver.find_element(*selector)
                      if elem.is_displayed():
                          email_field = elem
                          break
                  except:
                      continue

              if not email_field:
                  driver.execute_script("document.querySelector('input[type=\"email\"], input[name=\"identifier\"]').focus();")
                  time.sleep(1)
                  email_field = driver.switch_to.active_element
                  if not email_field or email_field.tag_name != "input":
                      email_field = None

              if not email_field:
                  raise Exception("Could not locate email input field.")

              try:
                  email_field.clear()
                  email_field.send_keys(os.environ["EMAIL"])
              except ElementNotInteractableException:
                  driver.execute_script("arguments[0].value = arguments[1];", email_field, os.environ["EMAIL"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", email_field)
                  driver.execute_script("arguments[0].dispatchEvent(new Event('change', { bubbles: true }));", email_field)

              next_btn = driver.find_element(By.ID, "identifierNext")
              next_btn.click()

              wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
              with open(log_file, "a") as lf:
                  lf.write("Email submitted, password field visible.\n")

              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              print("Stage 1 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 1 FAILED: {e}\n")
              try:
                  driver.save_screenshot("Stage1_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 1)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log Stage1_failure.png 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Stage 1 log" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi

      # ----------------------------------------------------------------
      # Stage 2: Enter password (FIXED – JS injection fallback)
      # ----------------------------------------------------------------
      - name: Stage 2 – Enter password
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException

          log_file = "gmail_yml.log"
          def log(msg):
              with open(log_file, "a") as lf:
                  lf.write(msg + "\n")
              print(msg)

          log("=== Stage 2: Enter password (v18) ===")

          driver = None
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              # --- Load state ---
              log("Loading cookies and navigating to saved URL")
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()
              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except Exception as e:
                      log(f"Skipping cookie {c.get('name')}: {e}")
              driver.get(saved_url)
              time.sleep(2)
              driver.save_screenshot("stage2_loaded.png")

              # --- Wait for password field (just presence) ---
              wait = WebDriverWait(driver, 20)
              try:
                  # First check if password field is already present
                  password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  log("Password field present.")
              except:
                  # Maybe we landed on "Welcome" screen – try clicking "Next"
                  log("Password field not present; checking for 'Welcome' screen.")
                  try:
                      welcome = driver.find_element(By.XPATH, "//div[contains(text(),'Welcome')]")
                      driver.find_element(By.XPATH, "//button[contains(.,'Next')]").click()
                      time.sleep(2)
                      password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                      log("Moved past Welcome screen, password field now present.")
                  except:
                      driver.save_screenshot("stage2_no_password_field.png")
                      raise Exception("Could not find password input field.")

              # --- Clear and enter password ---
              try:
                  # Try normal interaction
                  password_field.clear()
                  password_field.send_keys(os.environ["PASS"])
                  log("Password entered normally.")
              except ElementNotInteractableException:
                  log("Password field not interactable. Setting value via JavaScript.")
                  # Use JavaScript to set the value and trigger events
                  driver.execute_script("arguments[0].value = arguments[1];", password_field, os.environ["PASS"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", password_field)
                  driver.execute_script("arguments[0].dispatchEvent(new Event('change', { bubbles: true }));", password_field)
                  log("Password set via JS.")

              # Click Next
              driver.find_element(By.ID, "passwordNext").click()
              time.sleep(4)
              driver.save_screenshot("stage2_after_password.png")

              # --- Confirm we reached 2FA page ---
              log("Verifying 2FA page")
              try:
                  WebDriverWait(driver, 15).until(
                      EC.any_of(
                          EC.presence_of_element_located((By.ID, "idvPin")),
                          EC.presence_of_element_located((By.XPATH, "//button[contains(.,'Try another way')]")),
                          EC.presence_of_element_located((By.XPATH, "//div[@data-challengetype]"))
                      )
                  )
                  log("2FA page detected.")
              except:
                  driver.save_screenshot("stage2_not_2fa.png")
                  raise Exception("Did not reach 2FA page after password submission.")

              # Save state
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              log("Stage 2 success.")
              print("Stage 2 success.")
          except Exception as e:
              log(f"Stage 2 FAILED: {e}")
              try:
                  driver.save_screenshot("Stage2_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 2)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log stage2_loaded.png stage2_no_password_field.png stage2_after_password.png stage2_not_2fa.png Stage2_failure.png 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Stage 2 log" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi

      # ----------------------------------------------------------------
      # Stage 3: Select "security code" method (unchanged)
      # ----------------------------------------------------------------
      - name: Stage 3 – Select security code method
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 3: Select code method (v18) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()

              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get(saved_url)
              time.sleep(2)

              try:
                  btn = driver.find_element(By.XPATH, "//button[contains(.,'Try another way') or contains(.,'More options')]")
                  btn.click()
                  time.sleep(2)
                  with open(log_file, "a") as lf:
                      lf.write("Clicked 'Try another way'.\n")
              except:
                  pass

              selectors = [
                  "//div[@data-challengetype='12']",
                  "//div[@data-challengetype='13']",
                  "//span[contains(text(),'security code')]",
                  "//span[contains(text(),'Backup code')]",
                  "//div[@role='link' and contains(.,'code')]"
              ]
              clicked = False
              for sel in selectors:
                  try:
                      elem = driver.find_element(By.XPATH, sel)
                      elem.click()
                      time.sleep(2)
                      with open(log_file, "a") as lf:
                          lf.write(f"Selected code option: {sel}\n")
                      clicked = True
                      break
                  except:
                      continue
              if not clicked:
                  with open(log_file, "a") as lf:
                      lf.write("No clickable option found; assuming input visible.\n")

              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              with open(log_file, "a") as lf:
                  lf.write("Stage 3 complete.\n")
              print("Stage 3 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 3 FAILED: {e}\n")
              try:
                  driver.save_screenshot("Stage3_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 3)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log Stage3_failure.png 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Stage 3 log" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi

      # ----------------------------------------------------------------
      # Stage 4: Poll for encoded security code (unchanged)
      # ----------------------------------------------------------------
      - name: Stage 4 – Wait for security code
        run: |
          python3 << 'PYEOF'
          import os, hashlib, struct, random, re, time, requests

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 4: Poll for encoded code ===\n")
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev = {v: k for k, v in enumerate(digits)}
          def decode_10(s):
              return ''.join(str(rev[int(c)]) for c in s)

          raw_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_REPOSITORY']}/main/bestlog.txt"
          last_mod = None
          decoded = None
          while not decoded:
              time.sleep(10)
              try:
                  head = requests.head(raw_url, timeout=10)
                  new_mod = head.headers.get("Last-Modified")
                  if new_mod and new_mod == last_mod:
                      continue
                  resp = requests.get(raw_url, timeout=10)
                  if resp.status_code == 200:
                      nums = re.findall(r'\d', resp.text)
                      if len(nums) >= 10:
                          encoded = ''.join(nums[:10])
                          decoded = decode_10(encoded)
                          with open(log_file, "a") as lf:
                              lf.write(f"Encoded digits found: {encoded}, decoded.\n")
                          break
                  last_mod = new_mod
              except Exception as e:
                  with open(log_file, "a") as lf:
                      lf.write(f"Poll error: {e}\n")
          with open("decoded_code.txt", "w") as f:
              f.write(decoded)
          with open(log_file, "a") as lf:
              lf.write("Code saved.\n")
          print("Stage 4 success.")
          PYEOF

      - name: Commit logs (Stage 4)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log decoded_code.txt
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Stage 4 log" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi

      # ----------------------------------------------------------------
      # Stage 5: Enter security code (unchanged)
      # ----------------------------------------------------------------
      - name: Stage 5 – Enter security code
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 5: Enter security code (v18) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()
              with open("decoded_code.txt") as f:
                  code = f.read().strip()

              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get(saved_url)
              time.sleep(2)

              code_input = None
              for fid in ["idvPin", "totpPin", "idvPreregisteredPhonePin", "backupCode"]:
                  try:
                      code_input = driver.find_element(By.ID, fid)
                      if code_input.is_displayed():
                          break
                  except:
                      continue
              if not code_input:
                  inputs = driver.find_elements(By.CSS_SELECTOR, "input[type='text'], input[type='tel']")
                  for inp in inputs:
                      if inp.is_displayed():
                          code_input = inp
                          break
              if code_input:
                  code_input.send_keys(code)
                  driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]").click()
                  time.sleep(5)
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  with open(log_file, "a") as lf:
                      lf.write("Security code accepted, reached inbox.\n")
                  with open("cookies.pkl", "wb") as f:
                      pickle.dump(driver.get_cookies(), f)
                  with open("url.txt", "w") as f:
                      f.write(driver.current_url)
              else:
                  raise Exception("Code input field not found.")
              with open(log_file, "a") as lf:
                  lf.write("Stage 5 success.\n")
              print("Stage 5 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 5 FAILED: {e}\n")
              try:
                  driver.save_screenshot("Stage5_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs (Stage 5)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log Stage5_failure.png 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Stage 5 log" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi

      # ----------------------------------------------------------------
      # Stage 6: Fetch last two emails (unchanged)
      # ----------------------------------------------------------------
      - name: Stage 6 – Fetch emails
        run: |
          python3 << 'PYEOF'
          import os, pickle, time
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 6: Fetch emails (v18) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()

              driver.get("https://mail.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get("https://mail.google.com/mail/u/0/#inbox")
              WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
              time.sleep(4)

              rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
              with open(log_file, "a") as lf:
                  lf.write(f"Found {len(rows)} emails.\n")
              email_texts = []
              for i, row in enumerate(rows, 1):
                  row.click()
                  time.sleep(4)
                  try:
                      body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                      content = body.text
                  except:
                      content = driver.find_element(By.TAG_NAME, "body").text
                  email_texts.append(content)
                  with open(log_file, "a") as lf:
                      lf.write(f"Email {i} length: {len(content)}\n")
                  driver.get("https://mail.google.com/mail/u/0/#inbox")
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  time.sleep(4)

              with open("email.txt", "w", encoding="utf-8") as f:
                  f.write("--- Last two emails ---\n\n")
                  for i, txt in enumerate(email_texts, 1):
                      f.write(f"=== Email {i} ===\n{txt}\n\n")
              with open(log_file, "a") as lf:
                  lf.write("Email.txt saved.\n")
              print("Stage 6 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 6 FAILED: {e}\n")
              try:
                  driver.save_screenshot("Stage6_failure.png")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      - name: Commit logs & emails (final)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log email.txt Stage*.png 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to commit"; else git commit -m "Final logs and emails" && git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git; fi
