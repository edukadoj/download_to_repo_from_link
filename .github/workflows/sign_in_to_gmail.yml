# version 27.0 – Fixed session restoration, sequential screenshots, full pipeline
name: Gmail Sign-In & Fetch (Multi-Stage)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git and create screenshots folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      # ================================================================
      # Stage 1 – Enter email
      # ================================================================
      - name: Stage 1 – Enter email
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException, TimeoutException

          number = [0]
          def ss(desc):
              number[0] += 1
              fname = f"screenshots/{number[0]:02d}_stage1_{desc}.png"
              driver.save_screenshot(fname)
              # push it now so you can see it even if later stage fails
              for f in [fname, "gmail_yml.log"]:
                  if os.path.exists(f):
                      subprocess.run(["git", "add", f], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage1 {desc}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 1: Enter email (v27) ===\n")

          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              opts.add_argument("--window-size=1920,1080")
              opts.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
              opts.add_experimental_option("excludeSwitches", ["enable-automation"])
              opts.add_experimental_option('useAutomationExtension', False)

              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              wait = WebDriverWait(driver, 20)

              driver.get("https://accounts.google.com/signin")
              time.sleep(3)
              ss("loaded")

              # Cookie consent
              try:
                  driver.find_element(By.XPATH, "//button[contains(.,'Accept all') or contains(.,'I agree')]").click()
                  time.sleep(1)
              except:
                  pass

              email_field = driver.find_element(By.ID, "identifierId")
              email_field.clear()
              email_field.send_keys(os.environ["EMAIL"])
              ss("email_typed")

              driver.find_element(By.ID, "identifierNext").click()
              ss("after_next_click")

              # Wait until password input is present
              try:
                  wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  ss("password_page")
                  with open(log_file, "a") as lf:
                      lf.write("Reached password page.\n")
              except TimeoutException:
                  ss("stuck_after_email")
                  raise Exception("Password field did not appear – CAPTCHA or verification required.")

              # Save cookies and the current URL (which is the password page)
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              print("Stage 1 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 1 FAILED: {e}\n")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # ================================================================
      # Stage 2 – Enter password (FIXED session restoration)
      # ================================================================
      - name: Stage 2 – Enter password
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException, TimeoutException

          number = [10]
          def ss(desc):
              number[0] += 1
              fname = f"screenshots/{number[0]:02d}_stage2_{desc}.png"
              driver.save_screenshot(fname)
              for f in [fname, "gmail_yml.log"]:
                  if os.path.exists(f):
                      subprocess.run(["git", "add", f], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage2 {desc}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          def log(msg):
              with open(log_file, "a") as lf:
                  lf.write(msg + "\n")
              print(msg)

          log("=== Stage 2: Enter password (v27) ===")

          driver = None
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              # --- Load session EXACTLY ---
              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()
              log(f"Saved URL: {saved_url}")

              # IMPORTANT: first visit a page on the same domain so we can set cookies
              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except Exception as e:
                      log(f"Skipping cookie {c.get('name')}: {e}")

              # NOW navigate to the exact password page URL
              driver.get(saved_url)
              time.sleep(3)
              ss("loaded")

              # Verify that the password field is actually present
              wait = WebDriverWait(driver, 15)
              try:
                  password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  log("Password field found.")
              except TimeoutException:
                  log("Password field missing – session restoration failed.")
                  ss("no_password_field")
                  raise Exception("Could not find password input after loading saved URL.")

              # Enter password
              try:
                  password_field.clear()
                  password_field.send_keys(os.environ["PASS"])
                  log("Password typed normally.")
              except ElementNotInteractableException:
                  log("Field not interactable, using JS.")
                  driver.execute_script("arguments[0].value = arguments[1];", password_field, os.environ["PASS"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", password_field)
              ss("password_typed")

              # Click Next
              next_btn = None
              for method, sel in [(By.ID, "passwordNext"),
                                 (By.XPATH, "//button[contains(.,'Next')]")]:
                  try:
                      next_btn = driver.find_element(method, sel)
                      if next_btn.is_displayed():
                          break
                  except:
                      continue
              if next_btn:
                  next_btn.click()
                  log("Clicked Next.")
              else:
                  password_field.send_keys(Keys.RETURN)
                  log("Pressed Enter.")
              ss("after_submit")

              time.sleep(4)

              # Check for error message
              error_msg = None
              for sel in ["//div[contains(@class, 'o6cuMc')]",
                          "//span[contains(text(),'Wrong password')]",
                          "//span[contains(text(),'Try again')]",
                          "//div[contains(text(),'CAPTCHA')]"]:
                  try:
                      el = driver.find_element(By.XPATH, sel)
                      if el.is_displayed():
                          error_msg = el.text
                          break
                  except:
                      pass
              if error_msg:
                  log(f"Error: {error_msg}")
                  ss("error_msg")
                  raise Exception(f"Login error: {error_msg}")

              # Wait for 2FA page
              try:
                  WebDriverWait(driver, 15).until(
                      EC.any_of(
                          EC.presence_of_element_located((By.ID, "idvPin")),
                          EC.presence_of_element_located((By.XPATH, "//button[contains(.,'Try another way')]")),
                          EC.presence_of_element_located((By.XPATH, "//div[@data-challengetype]"))
                      )
                  )
                  ss("2fa_page")
                  log("2FA page reached.")
              except TimeoutException:
                  ss("still_login")
                  log(f"Current URL: {driver.current_url}")
                  raise Exception("Still on login page – wrong password or verification required.")

              # Save state for next stages
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              log("Stage 2 success.")
              print("Stage 2 success.")
          except Exception as e:
              log(f"Stage 2 FAILED: {e}")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # ================================================================
      # Stage 3 – Select security code method
      # ================================================================
      - name: Stage 3 – Select security code method
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options

          number = [20]
          def ss(desc):
              number[0] += 1
              fname = f"screenshots/{number[0]:02d}_stage3_{desc}.png"
              driver.save_screenshot(fname)
              for f in [fname, "gmail_yml.log"]:
                  if os.path.exists(f):
                      subprocess.run(["git", "add", f], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage3 {desc}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 3: Select code method (v27) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()

              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get(saved_url)
              time.sleep(2)
              ss("loaded")

              # Try "Try another way"
              try:
                  driver.find_element(By.XPATH, "//button[contains(.,'Try another way') or contains(.,'More options')]").click()
                  time.sleep(2)
                  with open(log_file, "a") as lf:
                      lf.write("Clicked 'Try another way'.\n")
              except:
                  pass

              # Select code option
              clicked = False
              for sel in ["//div[@data-challengetype='12']",
                          "//div[@data-challengetype='13']",
                          "//span[contains(text(),'security code')]",
                          "//span[contains(text(),'Backup code')]",
                          "//div[@role='link' and contains(.,'code')]"]:
                  try:
                      driver.find_element(By.XPATH, sel).click()
                      time.sleep(2)
                      clicked = True
                      with open(log_file, "a") as lf:
                          lf.write(f"Selected: {sel}\n")
                      break
                  except:
                      continue
              if not clicked:
                  with open(log_file, "a") as lf:
                      lf.write("No clickable code option found; assuming input visible.\n")
              ss("after_selection")

              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              print("Stage 3 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 3 FAILED: {e}\n")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # ================================================================
      # Stage 4 – Wait for encoded security code in bestlog.txt
      # ================================================================
      - name: Stage 4 – Wait for security code
        run: |
          python3 << 'PYEOF'
          import os, hashlib, struct, random, re, time, requests, subprocess

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 4: Poll for encoded code (v27) ===\n")
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev = {v: k for k, v in enumerate(digits)}
          def decode_10(s):
              return ''.join(str(rev[int(c)]) for c in s)

          raw_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_REPOSITORY']}/main/bestlog.txt"
          last_mod = None
          decoded = None
          while not decoded:
              time.sleep(10)
              try:
                  head = requests.head(raw_url, timeout=10)
                  new_mod = head.headers.get("Last-Modified")
                  if new_mod and new_mod == last_mod:
                      continue
                  resp = requests.get(raw_url, timeout=10)
                  if resp.status_code == 200:
                      nums = re.findall(r'\d', resp.text)
                      if len(nums) >= 10:
                          encoded = ''.join(nums[:10])
                          decoded = decode_10(encoded)
                          with open(log_file, "a") as lf:
                              lf.write(f"Code found: {encoded}, decoded.\n")
                          break
                  last_mod = new_mod
              except Exception as e:
                  with open(log_file, "a") as lf:
                      lf.write(f"Poll error: {e}\n")
          with open("decoded_code.txt", "w") as f:
              f.write(decoded)
          # push log
          subprocess.run(["git", "add", log_file, "decoded_code.txt"], check=True)
          try:
              subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
          except subprocess.CalledProcessError:
              subprocess.run(["git", "commit", "-m", "Stage4 code saved"], check=True)
              subprocess.run(["git", "push"], check=True)
          print("Stage 4 success.")
          PYEOF

      # ================================================================
      # Stage 5 – Enter security code
      # ================================================================
      - name: Stage 5 – Enter security code
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          number = [40]
          def ss(desc):
              number[0] += 1
              fname = f"screenshots/{number[0]:02d}_stage5_{desc}.png"
              driver.save_screenshot(fname)
              for f in [fname, "gmail_yml.log"]:
                  if os.path.exists(f):
                      subprocess.run(["git", "add", f], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage5 {desc}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 5: Enter security code (v27) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()
              with open("decoded_code.txt") as f:
                  code = f.read().strip()

              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get(saved_url)
              time.sleep(2)
              ss("loaded")

              code_input = None
              for fid in ["idvPin", "totpPin", "idvPreregisteredPhonePin", "backupCode"]:
                  try:
                      code_input = driver.find_element(By.ID, fid)
                      if code_input.is_displayed():
                          break
                  except:
                      continue
              if not code_input:
                  for inp in driver.find_elements(By.CSS_SELECTOR, "input[type='text'], input[type='tel']"):
                      if inp.is_displayed():
                          code_input = inp
                          break
              if code_input:
                  code_input.send_keys(code)
                  driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]").click()
                  time.sleep(5)
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  ss("inbox_reached")
                  with open(log_file, "a") as lf:
                      lf.write("Security code accepted.\n")
                  with open("cookies.pkl", "wb") as f:
                      pickle.dump(driver.get_cookies(), f)
                  with open("url.txt", "w") as f:
                      f.write(driver.current_url)
              else:
                  raise Exception("Code input field not found.")
              print("Stage 5 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 5 FAILED: {e}\n")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # ================================================================
      # Stage 6 – Fetch last two emails
      # ================================================================
      - name: Stage 6 – Fetch emails
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options

          number = [50]
          def ss(desc):
              number[0] += 1
              fname = f"screenshots/{number[0]:02d}_stage6_{desc}.png"
              driver.save_screenshot(fname)
              for f in [fname, "gmail_yml.log"]:
                  if os.path.exists(f):
                      subprocess.run(["git", "add", f], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Stage6 {desc}"], check=True)
                  subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 6: Fetch emails (v27) ===\n")
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()

              driver.get("https://mail.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get("https://mail.google.com/mail/u/0/#inbox")
              WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
              time.sleep(4)
              ss("inbox")

              rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
              with open(log_file, "a") as lf:
                  lf.write(f"Found {len(rows)} emails.\n")
              email_texts = []
              for i, row in enumerate(rows, 1):
                  row.click()
                  time.sleep(4)
                  try:
                      body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                      content = body.text
                  except:
                      content = driver.find_element(By.TAG_NAME, "body").text
                  email_texts.append(content)
                  ss(f"email_{i}_read")
                  driver.get("https://mail.google.com/mail/u/0/#inbox")
                  WebDriverWait(driver, 20).until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  time.sleep(4)

              with open("email.txt", "w", encoding="utf-8") as f:
                  f.write("--- Last two emails ---\n\n")
                  for i, txt in enumerate(email_texts, 1):
                      f.write(f"=== Email {i} ===\n{txt}\n\n")
              with open(log_file, "a") as lf:
                  lf.write("Email.txt saved.\n")
              # push email.txt
              subprocess.run(["git", "add", "email.txt", log_file], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", "Final emails"], check=True)
                  subprocess.run(["git", "push"], check=True)
              print("Stage 6 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 6 FAILED: {e}\n")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF
