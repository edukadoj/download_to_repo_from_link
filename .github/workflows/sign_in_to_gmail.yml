# version 8.0 – Segmented Gmail sign‑in with logging, robust waits, and email fetch
name: Gmail Sign-In & Fetch (Logged)

on: workflow_dispatch

jobs:
  signin-and-fetch:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}                # "nHsjknhwknh"
      GH_PAT: ${{ secrets.GH_PAT }}          # PAT with repo write access
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Chrome, Python libs)
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      - name: Setup Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: Verify WARP connection
        run: |
          echo "Checking WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP is active."

      - name: Full sign-in, 2FA, poll for code, fetch emails (logged stages)
        run: |
          python3 << 'PYEOF'
          import os, time, hashlib, struct, random, re, sys, logging
          import requests
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import TimeoutException, NoSuchElementException

          # ------------------------------------------------------------
          # Setup logging to both console and a file
          # ------------------------------------------------------------
          log_file = "gmail_yml.log"
          logging.basicConfig(
              level=logging.INFO,
              format="%(asctime)s - %(levelname)s - %(message)s",
              handlers=[
                  logging.FileHandler(log_file, mode='w'),
                  logging.StreamHandler(sys.stdout)
              ]
          )
          logger = logging.getLogger()

          # ------------------------------------------------------------
          # Stage 0: Decoder setup (same as before)
          # ------------------------------------------------------------
          logger.info("=== Stage 0: Initializing decoder ===")
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev_map = {v: k for k, v in enumerate(digits)}

          def decode_10_digits(s):
              return ''.join(str(rev_map[int(c)]) for c in s)

          logger.info("Decoder ready.")

          # ------------------------------------------------------------
          # Stage 1: Browser launch
          # ------------------------------------------------------------
          logger.info("=== Stage 1: Launching Chrome ===")
          chrome_options = Options()
          chrome_options.add_argument("--headless")
          chrome_options.add_argument("--no-sandbox")
          chrome_options.add_argument("--disable-gpu")
          chrome_options.add_argument("--disable-blink-features=AutomationControlled")
          chrome_options.add_argument("--window-size=1920,1080")
          chrome_options.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
          chrome_options.add_experimental_option("excludeSwitches", ["enable-automation"])
          chrome_options.add_experimental_option('useAutomationExtension', False)

          driver = webdriver.Chrome(options=chrome_options)
          driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
          wait = WebDriverWait(driver, 20)
          logger.info("Chrome launched.")

          try:
              # ------------------------------------------------------------
              # Stage 2: Enter email
              # ------------------------------------------------------------
              logger.info("=== Stage 2: Entering email ===")
              driver.get("https://accounts.google.com/signin")
              email_field = wait.until(EC.presence_of_element_located((By.ID, "identifierId")))
              email_field.send_keys(os.environ["EMAIL"])
              driver.find_element(By.ID, "identifierNext").click()
              logger.info("Email submitted.")

              # ------------------------------------------------------------
              # Stage 3: Enter password
              # ------------------------------------------------------------
              logger.info("=== Stage 3: Entering password ===")
              password_field = wait.until(EC.element_to_be_clickable((By.CSS_SELECTOR, "input[type='password']")))
              password_field.send_keys(os.environ["PASS"])
              driver.find_element(By.ID, "passwordNext").click()
              logger.info("Password submitted.")

              # ------------------------------------------------------------
              # Stage 4: 2FA method selection
              # ------------------------------------------------------------
              logger.info("=== Stage 4: Selecting 'Use security code' method ===")
              time.sleep(4)
              # Try "Try another way"
              try:
                  another_way = driver.find_element(By.XPATH, "//button[contains(.,'Try another way') or contains(.,'More options')]")
                  another_way.click()
                  time.sleep(2)
                  logger.info("Clicked 'Try another way'.")
              except:
                  logger.info("No 'Try another way' button found.")
              # Select code option
              code_selectors = [
                  "//div[@data-challengetype='12']",
                  "//div[@data-challengetype='13']",
                  "//span[contains(text(),'security code')]",
                  "//span[contains(text(),'Backup code')]",
                  "//span[contains(text(),'Enter a verification code')]",
                  "//div[@role='link' and contains(.,'code')]"
              ]
              selected = False
              for sel in code_selectors:
                  try:
                      elem = driver.find_element(By.XPATH, sel)
                      elem.click()
                      time.sleep(2)
                      selected = True
                      logger.info(f"Selected code option via: {sel}")
                      break
                  except:
                      continue
              if not selected:
                  logger.info("No clickable code option found; assuming input already visible.")

              # ------------------------------------------------------------
              # Stage 5: Poll bestlog.txt for encoded security code
              # ------------------------------------------------------------
              logger.info("=== Stage 5: Polling for encoded security code ===")
              raw_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_REPOSITORY']}/main/bestlog.txt"
              last_mod = None
              try:
                  resp = requests.head(raw_url, timeout=10)
                  last_mod = resp.headers.get("Last-Modified")
              except:
                  pass

              def extract_10_digits(text):
                  nums = re.findall(r'\d', text)
                  return ''.join(nums[:10]) if len(nums) >= 10 else None

              decoded = None
              while not decoded:
                  time.sleep(10)
                  try:
                      head_resp = requests.head(raw_url, timeout=10)
                      new_mod = head_resp.headers.get("Last-Modified")
                      if new_mod and new_mod == last_mod:
                          continue
                      get_resp = requests.get(raw_url, timeout=10)
                      if get_resp.status_code == 200:
                          text = get_resp.text
                          digits_only = extract_10_digits(text)
                          if digits_only:
                              decoded = decode_10_digits(digits_only)
                              logger.info(f"Found 10 digits: {digits_only}, decoded to: {decoded}")
                              break
                          else:
                              last_mod = new_mod
                  except Exception as e:
                      logger.warning(f"Polling error: {e}")

              # ------------------------------------------------------------
              # Stage 6: Enter security code
              # ------------------------------------------------------------
              logger.info("=== Stage 6: Entering security code ===")
              time.sleep(2)
              code_input = None
              for fid in ["idvPin", "totpPin", "idvPreregisteredPhonePin", "backupCode"]:
                  try:
                      code_input = driver.find_element(By.ID, fid)
                      if code_input.is_displayed():
                          break
                  except:
                      continue
              if not code_input:
                  inputs = driver.find_elements(By.CSS_SELECTOR, "input[type='text'], input[type='tel']")
                  for inp in inputs:
                      if inp.is_displayed():
                          code_input = inp
                          break
              if code_input:
                  code_input.send_keys(decoded)
                  next_btn = driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]")
                  next_btn.click()
                  time.sleep(5)
                  logger.info("Security code entered.")
              else:
                  raise Exception("Could not locate security code input field.")

              # ------------------------------------------------------------
              # Stage 7: Fetch last two emails
              # ------------------------------------------------------------
              logger.info("=== Stage 7: Fetching last two emails ===")
              driver.get("https://mail.google.com/mail/u/0/#inbox")
              wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
              time.sleep(4)
              email_texts = []
              rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
              logger.info(f"Found {len(rows)} email rows.")
              for i, row in enumerate(rows, 1):
                  row.click()
                  time.sleep(4)
                  try:
                      body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                      content = body.text
                  except:
                      content = driver.find_element(By.TAG_NAME, "body").text
                  email_texts.append(content)
                  logger.info(f"Email {i} content length: {len(content)} characters.")
                  driver.get("https://mail.google.com/mail/u/0/#inbox")
                  wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  time.sleep(4)

              # ------------------------------------------------------------
              # Stage 8: Save email.txt
              # ------------------------------------------------------------
              logger.info("=== Stage 8: Saving email.txt ===")
              with open("email.txt", "w", encoding="utf-8") as f:
                  f.write("--- Last two emails fetched from Gmail ---\n\n")
                  for i, txt in enumerate(email_texts, 1):
                      f.write(f"=== Email {i} ===\n{txt}\n\n")
              logger.info("email.txt saved.")

          except Exception as e:
              logger.exception("An error occurred during sign-in process.")
              raise
          finally:
              driver.quit()
              logger.info("Chrome quit.")
          PYEOF

      - name: Commit logs and email.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gmail_yml.log email.txt
          git commit -m "Update logs and emails" || echo "No changes to commit"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
