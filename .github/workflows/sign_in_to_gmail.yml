# version 26.0 – Screenshots in screenshots/ folder, sequential numbering, stronger waits
name: Gmail Sign-In & Fetch (Multi-Stage, No WARP)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p screenshots

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      # ----------------------------------------------------------------
      # Stage 1 – Enter email (screenshots numbered 01‑04)
      # ----------------------------------------------------------------
      - name: Stage 1 – Enter email
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException, TimeoutException

          screenshot_counter = [0]   # mutable for inner function

          def ss(description):
              """Save screenshot to screenshots/ with auto‑incrementing number."""
              screenshot_counter[0] += 1
              fname = f"screenshots/{screenshot_counter[0]:02d}_{description}.png"
              driver.save_screenshot(fname)
              print(f"Saved screenshot: {fname}")
              # push immediately
              existing = [f for f in [fname, "gmail_yml.log"] if os.path.exists(f)]
              if existing:
                  subprocess.run(["git", "add"] + existing, check=True)
                  try:
                      subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
                  except subprocess.CalledProcessError:
                      subprocess.run(["git", "commit", "-m", f"Stage 1 - {fname}"], check=True)
                      subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          with open(log_file, "a") as lf:
              lf.write("=== Stage 1: Enter email (v26) ===\n")

          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              opts.add_argument("--window-size=1920,1080")
              opts.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
              opts.add_experimental_option("excludeSwitches", ["enable-automation"])
              opts.add_experimental_option('useAutomationExtension', False)

              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
              wait = WebDriverWait(driver, 20)

              driver.get("https://accounts.google.com/signin")
              time.sleep(3)
              ss("loaded")

              # Accept cookie popup if present
              try:
                  driver.find_element(By.XPATH, "//button[contains(.,'Accept all') or contains(.,'I agree')]").click()
                  time.sleep(1)
              except:
                  pass

              # Locate email field with fallbacks
              email_field = None
              for sel in [(By.ID, "identifierId"),
                          (By.CSS_SELECTOR, "input[type='email']"),
                          (By.CSS_SELECTOR, "input[name='identifier']")]:
                  try:
                      email_field = driver.find_element(*sel)
                      if email_field.is_displayed():
                          break
                  except:
                      continue
              if not email_field:
                  raise Exception("Could not find email input.")
              
              email_field.clear()
              email_field.send_keys(os.environ["EMAIL"])
              ss("email_typed")

              # Click Next
              driver.find_element(By.ID, "identifierNext").click()
              ss("after_next_click")

              # Wait for password field to appear (must happen within 20s)
              try:
                  wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  ss("password_page")
                  with open(log_file, "a") as lf:
                      lf.write("Email submitted, reached password page.\n")
              except TimeoutException:
                  ss("stuck_after_email")
                  raise Exception("Password field did not appear – likely CAPTCHA or verification.")

              # Save session state
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              print("Stage 1 success.")
          except Exception as e:
              with open(log_file, "a") as lf:
                  lf.write(f"Stage 1 FAILED: {e}\n")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # ----------------------------------------------------------------
      # Stage 2 – Enter password (screenshots 11‑14)
      # ----------------------------------------------------------------
      - name: Stage 2 – Enter password
        run: |
          python3 << 'PYEOF'
          import os, pickle, time, subprocess
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import ElementNotInteractableException, TimeoutException

          screenshot_counter = [10]   # start at 10 to avoid overlap with stage 1

          def ss(description):
              screenshot_counter[0] += 1
              fname = f"screenshots/{screenshot_counter[0]:02d}_{description}.png"
              driver.save_screenshot(fname)
              print(f"Saved screenshot: {fname}")
              existing = [f for f in [fname, "gmail_yml.log"] if os.path.exists(f)]
              if existing:
                  subprocess.run(["git", "add"] + existing, check=True)
                  try:
                      subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
                  except subprocess.CalledProcessError:
                      subprocess.run(["git", "commit", "-m", f"Stage 2 - {fname}"], check=True)
                      subprocess.run(["git", "push"], check=True)

          log_file = "gmail_yml.log"
          def log(msg):
              with open(log_file, "a") as lf:
                  lf.write(msg + "\n")
              print(msg)

          log("=== Stage 2: Enter password (v26) ===")

          driver = None
          try:
              opts = Options()
              opts.add_argument("--headless")
              opts.add_argument("--no-sandbox")
              opts.add_argument("--disable-gpu")
              opts.add_argument("--disable-blink-features=AutomationControlled")
              driver = webdriver.Chrome(options=opts)
              driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

              with open("cookies.pkl", "rb") as f:
                  cookies = pickle.load(f)
              with open("url.txt") as f:
                  saved_url = f.read().strip()

              driver.get("https://accounts.google.com")
              for c in cookies:
                  try:
                      driver.add_cookie(c)
                  except:
                      pass
              driver.get(saved_url)
              time.sleep(2)
              ss("stage2_loaded")

              wait = WebDriverWait(driver, 20)
              try:
                  password_field = wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  log("Password field present.")
              except:
                  log("Password field not found.")
                  ss("no_password")
                  raise Exception("Password field missing.")

              # Enter password
              try:
                  password_field.clear()
                  password_field.send_keys(os.environ["PASS"])
                  log("Password typed normally.")
              except ElementNotInteractableException:
                  log("Using JavaScript injection.")
                  driver.execute_script("arguments[0].value = arguments[1];", password_field, os.environ["PASS"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', { bubbles: true }));", password_field)
              ss("password_typed")

              # Click Next
              next_btn = None
              for method, sel in [(By.ID, "passwordNext"),
                                 (By.XPATH, "//button[contains(.,'Next')]")]:
                  try:
                      next_btn = driver.find_element(method, sel)
                      if next_btn.is_displayed():
                          break
                  except:
                      continue
              if next_btn:
                  next_btn.click()
                  log("Clicked Next.")
              else:
                  password_field.send_keys(Keys.RETURN)
                  log("Pressed Enter.")
              ss("after_submit")

              time.sleep(4)

              # Check for error message
              error_msg = None
              for sel in ["//div[contains(@class, 'o6cuMc')]",
                          "//span[contains(text(),'Wrong password')]",
                          "//span[contains(text(),'Try again')]",
                          "//div[contains(text(),'CAPTCHA')]"]:
                  try:
                      el = driver.find_element(By.XPATH, sel)
                      if el.is_displayed():
                          error_msg = el.text
                          break
                  except:
                      pass
              if error_msg:
                  log(f"Error message: {error_msg}")
                  ss("error_msg")
                  raise Exception(f"Login error: {error_msg}")

              # Wait for 2FA page
              try:
                  WebDriverWait(driver, 15).until(
                      EC.any_of(
                          EC.presence_of_element_located((By.ID, "idvPin")),
                          EC.presence_of_element_located((By.XPATH, "//button[contains(.,'Try another way')]")),
                          EC.presence_of_element_located((By.XPATH, "//div[@data-challengetype]"))
                      )
                  )
                  ss("2fa_page")
                  log("2FA page reached.")
              except TimeoutException:
                  ss("still_login")
                  raise Exception("Still on login page – wrong password or verification required.")

              # Save state for next stages
              with open("cookies.pkl", "wb") as f:
                  pickle.dump(driver.get_cookies(), f)
              with open("url.txt", "w") as f:
                  f.write(driver.current_url)

              log("Stage 2 success.")
          except Exception as e:
              log(f"Stage 2 FAILED: {e}")
              try:
                  ss("failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
              except:
                  pass
          PYEOF

      # (Stages 3‑6 follow the same pattern; omitted for brevity)
