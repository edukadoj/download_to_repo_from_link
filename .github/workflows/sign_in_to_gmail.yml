# version 33.0 – Clean bestlog.txt, empty file + clear wait messages
name: Gmail Sign-In & Fetch (Single Session, Stable)

on: workflow_dispatch

jobs:
  signin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASS: ${{ secrets.PASS }}
      KEY: ${{ secrets.KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git and clean screenshots + bestlog.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf screenshots
          rm -f bestlog.txt
          mkdir -p screenshots
          git add -A
          git commit -m "Clean screenshots and bestlog" || echo "Nothing to commit"
          git pull --rebase
          git push || echo "Push failed, continuing"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget gnupg python3-pip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update
          sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests

      - name: Full Sign-In and Email Fetch
        timeout-minutes: 30
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, hashlib, struct, random, re, requests
          from datetime import datetime
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          from selenium.webdriver.chrome.options import Options
          from selenium.common.exceptions import (
              ElementNotInteractableException,
              TimeoutException,
              NoSuchElementException,
              StaleElementReferenceException,
          )

          # ---- Screenshot helper ----
          counter = [0]
          def ss(desc):
              counter[0] += 1
              now = datetime.now().strftime("%H%M%S")
              fname = f"screenshots/{counter[0]:03d}_{now}_{desc}.png"
              driver.save_screenshot(fname)
              print(f"📸 {fname}")
              try:
                  subprocess.run(["git", "pull", "--rebase"], check=True, capture_output=True)
              except:
                  pass
              subprocess.run(["git", "add", fname, "gmail_yml.log"], check=True)
              try:
                  subprocess.run(["git", "diff", "--cached", "--quiet"], check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git", "commit", "-m", f"Screenshot {fname}"], check=True)
                  try:
                      subprocess.run(["git", "push"], check=True)
                  except:
                      print("Push failed (will retry)")

          # ---- Logging ----
          log_file = "gmail_yml.log"
          def log(msg):
              with open(log_file, "a") as f:
                  f.write(f"{datetime.now().strftime('%H:%M:%S')} - {msg}\n")
              print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}")

          # ---- Decoder (matches C# encoder, KEY secret) ----
          key = os.environ["KEY"]
          h = hashlib.sha256(key.encode()).digest()
          seed = struct.unpack("i", h[:4])[0]
          rng = random.Random(seed)
          digits = list(range(10))
          rng.shuffle(digits)
          rev_map = {v: k for k, v in enumerate(digits)}
          def decode_10(s):
              return ''.join(str(rev_map[int(c)]) for c in s)

          # ---- Browser ----
          log("Starting full sign-in session")
          opts = Options()
          opts.add_argument("--headless")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--disable-blink-features=AutomationControlled")
          opts.add_argument("--window-size=1920,1080")
          opts.add_argument("--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.7727.137 Safari/537.36")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option('useAutomationExtension', False)

          driver = webdriver.Chrome(options=opts)
          driver.execute_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")
          wait = WebDriverWait(driver, 20)

          try:
              # 1. Open sign-in page
              driver.get("https://accounts.google.com/signin")
              time.sleep(4)
              ss("01_signin_page")

              # Cookie consent
              try:
                  driver.find_element(By.XPATH, "//button[contains(.,'Accept all') or contains(.,'I agree')]").click()
                  time.sleep(1)
                  log("Cookie consent accepted")
                  ss("02_cookies_accepted")
              except:
                  log("No cookie popup")

              # 2. Enter email
              log("Typing email...")
              email_el = wait.until(EC.element_to_be_clickable((By.ID, "identifierId")))
              email_el.clear()
              email_el.send_keys(os.environ["EMAIL"])
              ss("03_email_typed")
              driver.find_element(By.ID, "identifierNext").click()
              log("Clicked Next after email")
              ss("04_after_email_next")

              # 3. Wait for password page
              try:
                  wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                  log("Password page reached")
                  ss("05_password_page")
              except TimeoutException:
                  # maybe Welcome screen
                  try:
                      driver.find_element(By.XPATH, "//div[contains(text(),'Welcome')]")
                      driver.find_element(By.XPATH, "//button[contains(.,'Next')]").click()
                      time.sleep(2)
                      wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "input[type='password']")))
                      log("Password page after Welcome")
                      ss("05b_password_page")
                  except:
                      ss("05_error_no_password")
                      raise Exception("Password page did not appear")

              # 4. Enter password (FIX: re-find the field right before typing)
              log("Typing password...")
              # Re-locate the password field to avoid stale element
              pwd_field = wait.until(EC.element_to_be_clickable((By.CSS_SELECTOR, "input[type='password']")))
              try:
                  pwd_field.clear()
                  pwd_field.send_keys(os.environ["PASS"])
                  log("Password entered normally")
              except (ElementNotInteractableException, StaleElementReferenceException):
                  log("Normal typing failed; injecting via JavaScript")
                  # Re-find again just in case
                  pwd_field = driver.find_element(By.CSS_SELECTOR, "input[type='password']")
                  driver.execute_script("arguments[0].value = arguments[1];", pwd_field, os.environ["PASS"])
                  driver.execute_script("arguments[0].dispatchEvent(new Event('input', {bubbles: true}));", pwd_field)
                  driver.execute_script("arguments[0].dispatchEvent(new Event('change', {bubbles: true}));", pwd_field)
              ss("06_password_typed")

              # 5. Click Next
              log("Submitting password...")
              next_btn = None
              for method, sel in [(By.ID, "passwordNext"), (By.XPATH, "//button[contains(.,'Next')]")]:
                  try:
                      next_btn = driver.find_element(method, sel)
                      if next_btn.is_displayed():
                          break
                  except:
                      continue
              if next_btn:
                  next_btn.click()
              else:
                  driver.switch_to.active_element.send_keys(Keys.RETURN)
              time.sleep(5)
              ss("07_after_password_submit")

              # 6. Check for errors
              error_found = False
              for sel in [
                  "//div[contains(@class,'o6cuMc')]",
                  "//span[contains(text(),'Wrong password')]",
                  "//span[contains(text(),'Try again')]",
                  "//div[contains(text(),'CAPTCHA')]",
                  "//div[contains(text(),'unusual activity')]",
              ]:
                  try:
                      el = driver.find_element(By.XPATH, sel)
                      if el.is_displayed():
                          log(f"ERROR: {el.text}")
                          error_found = True
                          break
                  except:
                      pass
              if error_found:
                  ss("08_error_detected")
                  with open("error_page_source.txt", "w") as f:
                      f.write(driver.page_source[:3000])
                  subprocess.run(["git", "add", "error_page_source.txt"], check=True)
                  subprocess.run(["git", "commit", "-m", "Error page source"], check=True)
                  subprocess.run(["git", "push"], check=True)
                  raise Exception("Google showed an error after password")

              # 7. Look for 2FA options
              log("Looking for 2FA options...")
              try:
                  try:
                      another = driver.find_element(By.XPATH, "//button[contains(.,'Try another way') or contains(.,'More options')]")
                      another.click()
                      time.sleep(2)
                      log("Clicked 'Try another way'")
                      ss("09_try_another_way")
                  except:
                      pass

                  # Select code option
                  for sel in [
                      "//div[@data-challengetype='12']",
                      "//div[@data-challengetype='13']",
                      "//span[contains(text(),'security code')]",
                      "//span[contains(text(),'Backup code')]",
                      "//div[@role='link' and contains(.,'code')]",
                  ]:
                      try:
                          opt = driver.find_element(By.XPATH, sel)
                          if opt.is_displayed():
                              opt.click()
                              log(f"Selected code option: {sel}")
                              time.sleep(2)
                              ss("10_code_option_selected")
                              break
                      except:
                          continue

                  # 8. Find code input field
                  code_input = None
                  for fid in ["idvPin", "totpPin", "idvPreregisteredPhonePin", "backupCode"]:
                      try:
                          code_input = driver.find_element(By.ID, fid)
                          if code_input.is_displayed():
                              break
                      except:
                          continue
                  if not code_input:
                      for inp in driver.find_elements(By.CSS_SELECTOR, "input[type='text'], input[type='tel']"):
                          if inp.is_displayed():
                              code_input = inp
                              break
                  if not code_input:
                      ss("11_no_code_input")
                      raise Exception("Could not find security code input")
                  ss("11_code_input_ready")

                  # ---- Create empty bestlog.txt before waiting ----
                  with open("bestlog.txt", "w") as f:
                      pass  # empty file
                  subprocess.run(["git", "add", "bestlog.txt"], check=True)
                  subprocess.run(["git", "commit", "-m", "Empty bestlog.txt ready for code"], check=True)
                  subprocess.run(["git", "push"], check=True)
                  log("Empty bestlog.txt created and pushed. Ready for code.")

                  # 9. Poll for encoded code
                  raw_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_REPOSITORY']}/main/bestlog.txt"
                  last_mod = None
                  decoded = None
                  log("Waiting for you to enter the code into bestlog.txt...")
                  while not decoded:
                      print("⏳ waiting for entering the code into bestlog")
                      time.sleep(10)
                      try:
                          head = requests.head(raw_url, timeout=10)
                          new_mod = head.headers.get("Last-Modified")
                          if new_mod and new_mod == last_mod:
                              continue
                          resp = requests.get(raw_url, timeout=10)
                          if resp.status_code == 200:
                              nums = re.findall(r'\d', resp.text)
                              if len(nums) >= 10:
                                  encoded = ''.join(nums[:10])
                                  decoded = decode_10(encoded)
                                  log(f"Encoded digits found: {encoded}")
                                  break
                          last_mod = new_mod
                      except Exception as e:
                          log(f"Poll error: {e}")

                  # 10. Enter and submit code
                  log("Entering decoded security code...")
                  code_input.clear()
                  code_input.send_keys(decoded)
                  ss("12_code_entered")
                  driver.find_element(By.XPATH, "//button[contains(.,'Next') or contains(.,'Verify')]").click()
                  time.sleep(5)
                  ss("13_after_code_submit")

                  # 11. Verify inbox
                  log("Waiting for inbox...")
                  wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                  log("Inbox reached!")
                  ss("14_inbox_reached")

                  # 12. Read last two emails
                  time.sleep(4)
                  rows = driver.find_elements(By.CSS_SELECTOR, "tr.zA")[:2]
                  email_texts = []
                  for i, row in enumerate(rows, 1):
                      row.click()
                      time.sleep(4)
                      try:
                          body = driver.find_element(By.CSS_SELECTOR, "div.a3s")
                          content = body.text
                      except:
                          content = driver.find_element(By.TAG_NAME, "body").text
                      email_texts.append(content)
                      ss(f"15_email_{i}_read")
                      driver.get("https://mail.google.com/mail/u/0/#inbox")
                      wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "tr.zA")))
                      time.sleep(4)

                  with open("email.txt", "w", encoding="utf-8") as f:
                      f.write("--- Last two emails ---\n\n")
                      for i, txt in enumerate(email_texts, 1):
                          f.write(f"=== Email {i} ===\n{txt}\n\n")
                  log("Email.txt saved")

                  # Final push
                  subprocess.run(["git", "add", "email.txt", log_file], check=True)
                  subprocess.run(["git", "commit", "-m", "Final - emails fetched"], check=True)
                  subprocess.run(["git", "push"], check=True)
                  log("All done!")

              except Exception as e:
                  log(f"2FA/code error: {e}")
                  ss("99_failure")
                  raise

          except Exception as e:
              log(f"Sign-in failed: {e}")
              try:
                  ss("99_failure")
              except:
                  pass
              raise
          finally:
              try:
                  driver.quit()
                  log("Browser closed")
              except:
                  pass
              # Push any remaining files
              try:
                  subprocess.run(["git", "add", "screenshots/", "gmail_yml.log", "email.txt", "error_page_source.txt"], check=True)
                  subprocess.run(["git", "commit", "-m", "Final state"], check=True)
                  subprocess.run(["git", "push"], check=True)
              except:
                  pass
          PYEOF
