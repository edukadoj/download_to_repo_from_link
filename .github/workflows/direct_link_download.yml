name: Download With Direct Link (Universal)

on:
  workflow_dispatch:
    inputs:
      file_url1:
        description: 'URL #1 (required)'
        required: true
      file_url2:
        description: 'URL #2 (optional)'
        required: false
        default: ''
      file_url3:
        description: 'URL #3 (optional)'
        required: false
        default: ''
      file_url4:
        description: 'URL #4 (optional)'
        required: false
        default: ''
      file_url5:
        description: 'URL #5 (optional)'
        required: false
        default: ''
      folder_name:
        description: 'Folder to store everything (default: Download)'
        required: false
        default: 'Download'

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f download.log url_list.txt file_list.txt downloader.js pending_urls.txt
          echo "" > download.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Write URLs to file
        run: |
          > url_list.txt
          for url in "${{ github.event.inputs.file_url1 }}" \
                     "${{ github.event.inputs.file_url2 }}" \
                     "${{ github.event.inputs.file_url3 }}" \
                     "${{ github.event.inputs.file_url4 }}" \
                     "${{ github.event.inputs.file_url5 }}"; do
            [ -n "$url" ] && echo "$url" >> url_list.txt
          done
          echo "URL list created with $(grep -cve '^\s*$' url_list.txt) entries."

      - name: Install Playwright (for fallback only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libwoff1 libopus0 libwebpdemux2 libharfbuzz-icu0 libenchant-2-2 libsecret-1-0 libhyphen0 libmanette-0.2-0 libflite1
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Download files (Invoke-WebRequest first, then Playwright fallback)
        id: download
        continue-on-error: true
        shell: pwsh
        env:
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $ErrorActionPreference = "Continue"
          $outDir = $env:FOLDER_NAME
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          function Write-Log {
            param([string]$msg)
            $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            $logLine = "[$timestamp] $msg"
            Write-Host $logLine
            Add-Content "download.log" $logLine
          }

          $urls  = Get-Content url_list.txt | Where-Object { $_ -and $_ -ne '' }
          $pendingUrls = @()

          # ---------- Phase 1: Try Invoke-WebRequest (works for most direct links) ----------
          foreach ($url in $urls) {
              $tempFile = "temp_$([guid]::NewGuid().Guid).download"
              try {
                  $response = Invoke-WebRequest -Uri $url -OutFile $tempFile -PassThru `
                                                -Headers @{"User-Agent"="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"} `
                                                -MaximumRedirection 10 -ErrorAction Stop
                  $status = $response.StatusCode
                  $contentType = $response.Headers['Content-Type'] -join '; '
                  $isHtml = $contentType -match 'text/html' -or (Select-String -Path $tempFile -Pattern '<!DOCTYPE html|<html|<head|<body' -Quiet)
                  if ($status -ge 200 -and $status -lt 400 -and -not $isHtml -and (Get-Item $tempFile).Length -gt 0) {
                      $fileName = [System.IO.Path]::GetFileName($url) -split '\?' | Select-Object -First 1
                      if (-not $fileName) { $fileName = "downloaded_file_$( (Get-Random) ).bin" }
                      $finalPath = Join-Path $outDir $fileName
                      Move-Item $tempFile $finalPath -Force
                      $sizeMB = [math]::Round((Get-Item $finalPath).Length / 1MB, 1)
                      Write-Log "✓ Direct download: $fileName ($sizeMB MB)"
                      Add-Content "file_list.txt" $fileName
                      continue
                  }
              } catch {
                  Write-Log "Invoke-WebRequest failed: $($_.Exception.Message). Will try browser."
              } finally {
                  Remove-Item $tempFile -Force -ErrorAction SilentlyContinue
              }
              Write-Log "Simple download failed for $url. Adding to browser list."
              $pendingUrls += $url
          }

          # ---------- Phase 2: Playwright fallback for problematic URLs ----------
          if ($pendingUrls.Count -gt 0) {
              Write-Log "Running headless browser for $($pendingUrls.Count) URL(s)."
              $pendingUrls | Out-File -Encoding ascii "pending_urls.txt"

              # Create the Node.js script (here-string fixed: NO leading spaces before '@)
              $script = @'
const { chromium } = require('playwright');
const fs = require('fs');
const path = require('path');
const https = require('https');
const http = require('http');

const urls = fs.readFileSync('pending_urls.txt', 'utf-8').split('\n').filter(line => line.trim() !== '');
const outDir = process.env.FOLDER_NAME || 'Download';

function log(msg) {
    const time = new Date().toISOString();
    const fullMsg = `[${time}] ${msg}`;
    console.log(fullMsg);
    fs.appendFileSync('download.log', fullMsg + '\n');
}

process.on('uncaughtException', (err) => {
    log(`FATAL UNHANDLED ERROR: ${err.message}`);
    process.exit(1);
});

async function downloadFromUrl(url, index) {
    log(`Starting browser for URL: ${url}`);
    const browser = await chromium.launch({ headless: true });
    const context = await browser.newContext({
        userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
        acceptDownloads: true
    });
    const page = await context.newPage();
    page.setDefaultNavigationTimeout(120000);

    let downloadPromise = new Promise((resolve) => {
        page.on('download', async (download) => {
            const fileName = download.suggestedFilename();
            const savePath = path.join(outDir, fileName);
            await download.saveAs(savePath);
            log(`✓ Browser download: saved as ${fileName}`);
            fs.appendFileSync('file_list.txt', fileName + '\n');
            resolve(true);
        });
    });

    try {
        log(`Navigating (domcontentloaded)...`);
        try {
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
        } catch (navError) {
            if (navError.message.includes('Download is starting')) {
                log('Download is starting – waiting for file...');
                try { await downloadPromise; } catch (e) { log(`Download error: ${e.message}`); }
                await browser.close();
                return;
            } else {
                log(`Navigation error: ${navError.message}. Trying alternative...`);
                if (url.includes('sourceforge.net')) {
                    const directUrl = url.replace('/download', '?download');
                    log(`Retrying with: ${directUrl}`);
                    await page.goto(directUrl, { waitUntil: 'domcontentloaded', timeout: 30000 });
                } else {
                    // Don't give up – just proceed with the page as is
                }
            }
        }

        log('Page loaded. Waiting 10s for JS downloads...');
        await page.waitForTimeout(10000);

        if (downloadPromise.isResolved) {
            log('Download happened during wait.');
            await browser.close();
            return;
        }

        // Extract direct links
        log('Extracting direct links...');
        const potentialLinks = await page.evaluate(() => {
            const links = Array.from(document.querySelectorAll('a[href]'));
            return links.map(a => a.href).filter(h => /\.(exe|zip|msi|dmg|tar\.gz|7z|rar|bin|iso|img|pdf|pkg)$/i.test(h));
        });
        if (potentialLinks.length > 0) {
            const downloadUrl = potentialLinks[0];
            log(`Found link: ${downloadUrl}`);
            const protocol = downloadUrl.startsWith('https') ? https : http;
            const fileStream = await new Promise((resolve, reject) => {
                protocol.get(downloadUrl, (res) => resolve(res)).on('error', reject);
            });
            let fileName = downloadUrl.split('/').pop().split('?')[0] || `downloaded_file_${index}`;
            const filePath = path.join(outDir, fileName);
            const writeStream = fs.createWriteStream(filePath);
            fileStream.pipe(writeStream);
            await new Promise((resolve, reject) => {
                writeStream.on('finish', resolve);
                writeStream.on('error', reject);
            });
            const sizeMB = (fs.statSync(filePath).size / 1024 / 1024).toFixed(2);
            log(`✓ Downloaded via extracted link: ${fileName} (${sizeMB} MB)`);
            fs.appendFileSync('file_list.txt', fileName + '\n');
        } else {
            log('No direct download link found.');
        }
    } catch (err) {
        log(`✗ Error: ${err.message}`);
    } finally {
        await browser.close();
        log('Browser closed for this URL.');
    }
}

(async () => {
    if (urls.length === 0) { log('No URLs for browser.'); process.exit(0); }
    log(`Processing ${urls.length} URL(s) with headless browser.`);
    for (let i = 0; i < urls.length; i++) {
        log(`\n--- URL #${i+1}: ${urls[i]} ---`);
        await downloadFromUrl(urls[i], i+1);
    }
    log('Browser phase completed.');
    process.exit(0);
})();
'@
              # Write the script (make sure the here-string terminator is at column 0)
              Set-Content -Path "downloader.js" -Value $script
              node downloader.js
          } else {
              Write-Log "No URLs required browser fallback."
          }

          Write-Log "Download phase complete."

      - name: Commit download log and file list
        if: always()
        run: |
          git add download.log file_list.txt 2>/dev/null || true
          git commit -m "Update download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true

      - name: Split and upload all files
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            $logLine = "[$timestamp] $msg"
            Write-Host $logLine
            Add-Content -Path $logFile -Value $logLine
          }

          $fileList = @(Get-Content file_list.txt -ErrorAction SilentlyContinue | Where-Object { $_ -and $_ -ne '' })
          if ($fileList.Count -eq 0) {
            Write-Log "No files to upload. Exiting."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $fileInfos = [System.Collections.Generic.List[hashtable]]::new()

          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                return $true
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1)/$maxRetries in 10s..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "ERROR: Upload failed after $maxRetries attempts"
                }
              }
            }
            return $false
          }

          for ($i = 0; $i -lt $fileList.Count; $i++) {
            $filePath = $fileList[$i]
            if (-not (Test-Path $filePath)) {
              Write-Log "File missing: $filePath – skipping."
              continue
            }
            $fileSize = (Get-Item $filePath).Length
            $fileName = [System.IO.Path]::GetFileName($filePath)
            Write-Log "Processing $fileName ($([math]::Round($fileSize / 1MB, 1)) MB)"

            if ($fileSize -lt $chunkSize) {
              Write-Log "Small file, uploading directly..."
              if (Upload-File -localPath $filePath -remotePath "$chunksDir/$fileName") {
                $fileInfos.Add(@{ Name = $fileName; HasChunks = $false })
                Write-Log "✓ Uploaded: $fileName"
              } else {
                Write-Log "✗ Upload failed for $fileName"
              }
            } else {
              Write-Log "Splitting into chunks..."
              $stream = [System.IO.File]::OpenRead($filePath)
              $partIdx = 0
              $buffer = New-Object byte[] $chunkSize
              $uploadSuccess = $true
              while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
                $chunkPath = Join-Path $chunksDir $chunkName
                [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
                Write-Log "Uploading $chunkName ($([math]::Round($n/1MB,1)) MB)..."
                if (Upload-File -localPath $chunkPath -remotePath "$chunksDir/$chunkName") {
                  Remove-Item $chunkPath -Force
                  $partIdx++
                  Start-Sleep -Milliseconds 500
                } else {
                  Write-Log "✗ Upload failed for $chunkName. Aborting this file."
                  $uploadSuccess = $false
                  break
                }
              }
              $stream.Close()
              if ($uploadSuccess) {
                $fileInfos.Add(@{ Name = $fileName; HasChunks = $true; ChunkCount = $partIdx })
                Write-Log "✓ Uploaded $partIdx chunks for $fileName"
              } else {
                Write-Log "✗ Incomplete upload for $fileName"
              }
            }
            Remove-Item $filePath -Force
          }

          if ($fileInfos.Count -eq 0) {
            Write-Log "No files were successfully uploaded."
          } else {
            Write-Log "Generating reassemble.bat..."
            $batPath = Join-Path $chunksDir "reassemble.bat"
            $batLines = @(
              "@echo off",
              "setlocal enabledelayedexpansion",
              "echo ========================================",
              "echo  Reassembling all downloaded files...",
              "echo ========================================"
            )
            foreach ($fi in $fileInfos) {
              $name = $fi.Name
              if ($fi.HasChunks) {
                $batLines += "echo --- Rebuilding $name ---"
                $batLines += "copy /b $name.part* $name"
                $batLines += "if %errorlevel% equ 0 ("
                $batLines += "    echo Successfully created $name"
                $batLines += "    del $name.part*"
                $batLines += "    echo Deleted temporary parts for $name"
                $batLines += ") else ("
                $batLines += "    echo ERROR: Failed to reassemble $name. Parts kept intact."
                $batLines += ")"
              } else {
                $batLines += "echo $name was downloaded as a single file (no chunks)."
              }
            }
            $batLines += "echo ========================================"
            $batLines += "echo All done! Press any key to exit."
            $batLines += "pause >nul"
            $batLines | Out-File -FilePath $batPath -Encoding ASCII

            Write-Log "Uploading reassemble.bat..."
            if (Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat") {
              Write-Log "✓ reassemble.bat uploaded."
            } else {
              Write-Log "✗ Failed to upload reassemble.bat."
            }
            Write-Log "=== Download completed ==="
          }

      - name: Final log commit
        if: always()
        run: |
          git add download.log "${{ github.event.inputs.folder_name }}" 2>/dev/null || true
          git commit -m "Final download log and files" || true
          git pull --rebase --strategy-option ours || true
          git push || true
