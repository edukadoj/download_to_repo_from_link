name: YouTube Download (PO Token + PyTubeFix)

on:
  workflow_dispatch:
    inputs:
      youtube_url1:
        description: 'YouTube URL #1 (required)'
        required: true
        default: 'https://www.youtube.com/watch?v=M0iyhwzdG3k'
      youtube_url2:
        description: 'YouTube URL #2 (optional)'
        required: false
        default: ''
      youtube_url3:
        description: 'YouTube URL #3 (optional)'
        required: false
        default: ''
      youtube_url4:
        description: 'YouTube URL #4 (optional)'
        required: false
        default: ''
      youtube_url5:
        description: 'YouTube URL #5 (optional)'
        required: false
        default: ''
      quality:
        description: 'Video quality'
        required: true
        type: choice
        default: '720p'
        options:
          - '144p'
          - '360p'
          - '720p'
          - '1080p'
          - 'best'
      folder_name:
        description: 'Folder to store downloads'
        required: false
        default: 'YouTube Download'

jobs:
  download-and-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Clean up old downloads and log
        run: |
          rm -rf "${{ github.event.inputs.folder_name }}"
          rm -f video.* download.log video_list.txt sub_list.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up old downloads" || true
          git pull --rebase
          git push || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies (yt-dlp + PO token + pytubefix)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade "yt-dlp>=2025.05.22"
          python3 -m pip install --upgrade bgutil-ytdlp-pot-provider
          python3 -m pip install --upgrade pytubefix

      - name: Install Deno (for PO token server)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "/home/runner/.deno/bin" >> $GITHUB_PATH

      - name: Clone & start PO token server (Deno)
        run: |
          git clone --single-branch --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server/
          # Start the Deno server in the background on port 4416
          /home/runner/.deno/bin/deno run --allow-net --allow-read --allow-env \
            main.ts --port 4416 &
          sleep 10   # give the server time to boot
          echo "PO Token server started."

      - name: Download all videos (yt-dlp + PO token → pytubefix fallback)
        id: download
        env:
          YT_URL_1: ${{ github.event.inputs.youtube_url1 }}
          YT_URL_2: ${{ github.event.inputs.youtube_url2 }}
          YT_URL_3: ${{ github.event.inputs.youtube_url3 }}
          YT_URL_4: ${{ github.event.inputs.youtube_url4 }}
          YT_URL_5: ${{ github.event.inputs.youtube_url5 }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, traceback

          quality = "${{ github.event.inputs.quality }}"
          folder  = "${{ github.event.inputs.folder_name }}"

          # Collect URLs from environment variables
          urls = []
          for i in range(1, 6):
              v = os.environ.get(f"YT_URL_{i}", "").strip()
              if v:
                  urls.append(v)
          if not urls:
              print("No URLs provided.")
              sys.exit(1)

          print(f"Processing {len(urls)} URL(s)")

          # --------------- Method 1: yt-dlp + PO Token ---------------
          def try_ytdlp_po_token(url, q, vid_num):
              """Attempt download with yt-dlp + PO token provider."""
              import subprocess
              quality_map = {
                  "144p": "bestvideo[height<=144]+bestaudio/best[height<=144]",
                  "360p": "bestvideo[height<=360]+bestaudio/best[height<=360]",
                  "720p": "bestvideo[height<=720]+bestaudio/best[height<=720]",
                  "1080p": "bestvideo[height<=1080]+bestaudio/best[height<=1080]",
                  "best": "best"
              }
              fmt = quality_map.get(q, "bestvideo[height<=720]+bestaudio/best[height<=720]")
              out_name = f"video_{vid_num}.%(ext)s"
              cmd = [
                  "yt-dlp", "--no-playlist",
                  "--format", fmt,
                  "--output", out_name,
                  "--extractor-args", "youtube:potoken_server_url=http://127.0.0.1:4416",
                  "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  url
              ]
              print(f"  [yt-dlp] Trying PO token method...")
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=600)
              if result.returncode == 0:
                  # Find the created file
                  for f in os.listdir("."):
                      if f.startswith(f"video_{vid_num}.") and not f.endswith(".part"):
                          return f
              else:
                  # Print abbreviated error
                  lines = result.stderr.splitlines()[-5:]
                  for line in lines:
                      print(f"    {line}")
              return None

          # --------------- Method 2: pytubefix fallback ---------------
          def try_pytubefix(url, vid_num):
              """Attempt download with pytubefix (no cookies needed)."""
              try:
                  from pytubefix import YouTube
                  from pytubefix.cli import on_progress
                  print(f"  [pytubefix] Trying...")
                  yt = YouTube(url, on_progress_callback=on_progress, use_oauth=False)
                  print(f"    Title: {yt.title}")
                  stream = yt.streams.get_highest_resolution()
                  if stream:
                      out_name = f"video_{vid_num}.mp4"
                      stream.download(filename=out_name)
                      if os.path.exists(out_name):
                          return out_name
                  print(f"    No suitable stream found.")
              except Exception as e:
                  print(f"    pytubefix error: {e}")
              return None

          # --------------- Main loop ---------------
          video_count = 0
          downloaded_any = 0

          for idx, url in enumerate(urls):
              video_count += 1
              print(f"\n--- URL #{video_count}: {url} ---")

              vid_file = None

              # Strategy 1: yt-dlp + PO token
              vid_file = try_ytdlp_po_token(url, quality, video_count)

              # Strategy 2: pytubefix fallback
              if not vid_file:
                  vid_file = try_pytubefix(url, video_count)

              if vid_file and os.path.exists(vid_file):
                  size_mb = os.path.getsize(vid_file) / (1024 * 1024)
                  print(f"  ✓ Downloaded: {vid_file} ({size_mb:.1f} MB)")
                  with open("video_list.txt", "a") as vl:
                      vl.write(vid_file + "\n")
                  downloaded_any += 1
              else:
                  print(f"  ✗ All methods failed for URL #{video_count}.")

          # Write log
          with open("download.log", "a") as log:
              log.write(f"=== YouTube Download Log ===\n")
              log.write(f"Date: {time.ctime()}\n")
              log.write(f"Total URLs: {len(urls)}\n")
              log.write(f"Successfully downloaded: {downloaded_any}\n")

          if downloaded_any == 0:
              print("\n⚠️ No videos were downloaded.")
          else:
              print(f"\n✅ Downloaded {downloaded_any} video(s).")
          PYEOF

      - name: Commit download log
        if: always()
        run: |
          git add download.log video_list.txt 2>/dev/null || true
          git commit -m "Update download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true

      - name: Split and upload everything
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $chunksDir = $env:FOLDER_NAME
          $chunkSize = 20MB
          $logFile = "download.log"

          function Write-Log {
            param([string]$msg)
            Write-Host $msg
            Add-Content -Path $logFile -Value $msg
          }

          $videoList = @(Get-Content video_list.txt -ErrorAction SilentlyContinue | Where-Object { $_ -and $_ -ne '' })
          if ($videoList.Count -eq 0) {
            Write-Log "No video files to upload. Exiting."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path $chunksDir | Out-Null
          $fileInfos = [System.Collections.Generic.List[hashtable]]::new()
          $headers = @{ Authorization = "Bearer $token" }
          $apiBase = "https://api.github.com/repos/$repo/contents"
          $maxRetries = 3

          function Upload-File {
            param([string]$localPath, [string]$remotePath)
            $bytes = [System.IO.File]::ReadAllBytes($localPath)
            $b64 = [Convert]::ToBase64String($bytes)
            $url = "$apiBase/$($remotePath -replace '\\','/')"
            try { $sha = (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $sha = $null }
            $body = @{ message = "Add $(Split-Path $localPath -Leaf)"; content = $b64; branch = $branch }
            if ($sha) { $body.sha = $sha }
            for ($retry = 0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress -Depth 10) -ContentType "application/json"
                return
              } catch {
                if ($retry -lt $maxRetries - 1) {
                  Write-Log "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Log "FATAL: upload failed after $maxRetries attempts."
                  exit 1
                }
              }
            }
          }

          for ($i = 0; $i -lt $videoList.Count; $i++) {
            $videoFile = $videoList[$i]
            if (-not (Test-Path $videoFile)) {
              Write-Log "Video file missing: $videoFile – skipping."
              continue
            }
            $fileSize = (Get-Item $videoFile).Length
            $fileName = [System.IO.Path]::GetFileName($videoFile)
            Write-Log "Processing $fileName ($([math]::Round($fileSize / 1MB, 1)) MB)"
            if ($fileSize -lt $chunkSize) {
              Write-Log "File smaller than chunk size; uploading directly."
              Upload-File -localPath $videoFile -remotePath "$chunksDir/$fileName"
              $fileInfos.Add(@{ Name = $fileName; HasChunks = $false })
            } else {
              Write-Log "Splitting into chunks..."
              $stream = [System.IO.File]::OpenRead($videoFile)
              $partIdx = 0
              $buffer = New-Object byte[] $chunkSize
              $uploadSuccess = $true
              while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $chunkName = "{0}.part{1:D4}" -f $fileName, $partIdx
                $chunkPath = Join-Path $chunksDir $chunkName
                [System.IO.File]::WriteAllBytes($chunkPath, $buffer[0..($n-1)])
                Write-Log "Uploading $chunkName ($([math]::Round($n/1MB,1)) MB)"
                try {
                  Upload-File -localPath $chunkPath -remotePath "$chunksDir/$chunkName"
                } catch {
                  Write-Log "Upload failed for $chunkName. Aborting remaining chunks for $fileName."
                  $uploadSuccess = $false
                  break
                }
                Remove-Item $chunkPath -Force
                $partIdx++
                Start-Sleep -Milliseconds 500
              }
              $stream.Close()
              if ($uploadSuccess) {
                $fileInfos.Add(@{ Name = $fileName; HasChunks = $true; ChunkCount = $partIdx })
              }
            }
            Remove-Item $videoFile -Force
          }

          if ($fileInfos.Count -gt 0) {
            Write-Log "Creating reassemble.bat..."
            $batPath = Join-Path $chunksDir "reassemble.bat"
            $batLines = @(
              "@echo off",
              "setlocal enabledelayedexpansion",
              "echo ========================================",
              "echo  Reassembling all downloaded files...",
              "echo ========================================"
            )
            foreach ($fi in $fileInfos) {
              $name = $fi.Name
              if ($fi.HasChunks) {
                $batLines += "echo --- Rebuilding $name ---"
                $batLines += "copy /b $name.part* $name"
                $batLines += "if %errorlevel% equ 0 ("
                $batLines += "    echo Successfully created $name"
                $batLines += "    del $name.part*"
                $batLines += "    echo Deleted temporary parts for $name"
                $batLines += ") else ("
                $batLines += "    echo ERROR: Failed to reassemble $name. Parts kept intact."
                $batLines += ")"
              } else {
                $batLines += "echo $name was downloaded as a single file (no chunks)."
              }
            }
            $batLines += "echo ========================================"
            $batLines += "echo All done! Press any key to exit."
            $batLines += "pause >nul"
            $batLines | Out-File -FilePath $batPath -Encoding ASCII
            Write-Log "Uploading reassemble.bat..."
            Upload-File -localPath $batPath -remotePath "$chunksDir/reassemble.bat"
          } else {
            Write-Log "No files were successfully uploaded."
          }
          Write-Log "✅ Processing complete."

      - name: Final log commit (always)
        if: always()
        run: |
          git add download.log
          git commit -m "Final download log" || true
          git pull --rebase --strategy-option ours || true
          git push || true
